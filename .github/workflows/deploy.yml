name: Deploy

# Continuous deployment: setelah workflow "CI" selesai SUKSES di main, build image
# backend & frontend, push ke GHCR, lalu SSH ke VPS untuk pull + up.
# Bisa juga dijalankan manual dari tab Actions (workflow_dispatch).
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

# Satu deploy pada satu waktu; jangan batalkan deploy yang sedang jalan.
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build-and-push:
    # Hanya deploy bila CI hijau (atau saat dipicu manual).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/ragbuaj/inventra-backend:latest
            ghcr.io/ragbuaj/inventra-backend:${{ github.event.workflow_run.head_sha || github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build & push frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/ragbuaj/inventra-frontend:latest
            ghcr.io/ragbuaj/inventra-frontend:${{ github.event.workflow_run.head_sha || github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd ~/inventra
            git pull --ff-only
            docker compose -f docker-compose.prod.yml --env-file .env.prod pull
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
            docker image prune -f
