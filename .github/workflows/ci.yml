name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/go.sum
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...

  backend-integration:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - run: go test -tags=integration ./...

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  api-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npx --yes @stoplight/spectral-cli lint backend/api/openapi.yaml --ruleset .spectral.yaml

  # End-to-end: bring up the real backend stack, seed an admin, then run the
  # Playwright login flow against a freshly built frontend.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Infra + migrations + API only — the frontend under test is the one
      # Playwright builds/serves, not the compose `frontend` service.
      - name: Start backend stack
        env:
          RATELIMIT_ENABLED: "false"
        run: docker compose up -d --build postgres redis minio migrate backend

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/go.sum

      - name: Wait for API readiness
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/health/ready >/dev/null 2>&1; then
              echo "API ready"; exit 0
            fi
            sleep 2
          done
          echo "API did not become ready in time"; docker compose logs backend; exit 1

      - name: Seed superadmin
        working-directory: backend
        env:
          DB_HOST: localhost
          DB_PORT: "5433"
          DB_USER: inventra
          DB_PASSWORD: secret
          DB_NAME: inventra_dev
          DB_SSLMODE: disable
          JWT_SECRET: ci-e2e-secret
        run: go run ./cmd/createadmin -email admin@inventra.local -password admin12345

      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      # Default apiBase (http://localhost:8080/api/v1) already targets the
      # compose API; backend CORS allows http://localhost:3000.
      - name: Run e2e
        working-directory: frontend
        run: pnpm test:e2e

      - name: Tear down stack
        if: always()
        run: docker compose down -v

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7
