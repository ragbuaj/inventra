name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Deteksi bagian repo mana yang berubah supaya job per-aplikasi hanya jalan
  # bila relevan. Filter hanya berlaku untuk pull request — push ke main selalu
  # menjalankan semua job (lihat kondisi `if` tiap job), sehingga pemicu
  # workflow Deploy (workflow_run atas "CI") tidak berubah perilakunya.
  # Job yang dilewati berstatus "skipped", yang dihitung lolos oleh required
  # status checks pada branch protection.
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      mobile: ${{ steps.filter.outputs.mobile }}
      apidocs: ${{ steps.filter.outputs.apidocs }}
      e2e: ${{ steps.filter.outputs.e2e }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          # Perubahan pada workflow ini sendiri menjalankan semua job.
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'
            mobile:
              - 'mobile/**'
              - '.github/workflows/ci.yml'
            apidocs:
              - 'backend/api/**'
              - '.spectral.yaml'
              - '.github/workflows/ci.yml'
            e2e:
              - 'backend/**'
              - 'frontend/**'
              - 'docker-compose.yml'
              - '.github/workflows/ci.yml'

  backend:
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: "1.25"
          cache-dependency-path: backend/go.sum
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...

  backend-integration:
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - run: go test -tags=integration ./...

  frontend:
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  mobile:
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.mobile == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      # Golden test dilewati: rendering font lintas-platform membuat golden
      # platform-dependent; verifikasi golden adalah gate lokal (Windows).
      - run: flutter test --exclude-tags golden
      # Runner ubuntu-latest sudah menyertakan Android SDK.
      - run: flutter build apk --debug

  api-docs:
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.apidocs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: backend/api/package-lock.json
      # Spectral is pinned + locked in backend/api (its @asyncapi/specs transitive
      # dep crashes under Node 24 when resolved fresh via `npx`); install from the
      # lockfile so the OpenAPI lint is reproducible.
      - run: npm ci
        working-directory: backend/api
      - run: npm run lint
        working-directory: backend/api

  # End-to-end: bring up the real backend stack, seed an admin, then run the
  # Playwright login flow against a freshly built frontend.
  e2e:
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.e2e == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Infra + migrations + API only — the frontend under test is the one
      # Playwright builds/serves, not the compose `frontend` service.
      - name: Start backend stack
        env:
          RATELIMIT_ENABLED: "false"
        run: docker compose up -d --build postgres redis minio migrate mailpit backend

      - uses: actions/setup-go@v7
        with:
          go-version: "1.25"
          cache-dependency-path: backend/go.sum

      - name: Wait for API readiness
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/health/ready >/dev/null 2>&1; then
              echo "API ready"; exit 0
            fi
            sleep 2
          done
          echo "API did not become ready in time"; docker compose logs backend; exit 1

      - name: Seed superadmin
        working-directory: backend
        env:
          DB_HOST: localhost
          DB_PORT: "5433"
          DB_USER: inventra
          DB_PASSWORD: secret
          DB_NAME: inventra_dev
          DB_SSLMODE: disable
          JWT_SECRET: ci-e2e-secret
        run: go run ./cmd/createadmin -email admin@inventra.local -password admin12345

      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      # Default apiBase (http://localhost:8080/api/v1) already targets the
      # compose API; backend CORS allows http://localhost:3000.
      #
      # Two phases against DIFFERENT DB states (see playwright.config.ts projects):
      #   1. `chromium` — existing specs against a CLEAN migrated DB (each builds its
      #      own fixtures; they assume a near-empty baseline).
      #   2. Seed the demo org (kantor/role per tier + aset) + FLUSH Redis authz cache
      #      (scope/permission by role_id — SQL langsung tak meng-invalidasinya).
      #   3. `lampiran` — the Lampiran A maker-checker suite against the seeded org.
      # Build once up front — the playwright webServer runs `nuxt preview` which
      # serves `.output` (the `test:e2e` script's `nuxt build` step is not used here
      # because we invoke playwright twice with different --project filters).
      - name: Build frontend (for preview)
        working-directory: frontend
        run: pnpm build

      - name: Run e2e — existing specs (clean DB)
        working-directory: frontend
        run: pnpm exec playwright test --project=chromium

      - name: Seed demo data (Lampiran A org + assets) + flush authz cache
        run: |
          docker compose exec -T -e PGPASSWORD=secret postgres \
            psql -U inventra -d inventra_dev -v ON_ERROR_STOP=1 < backend/db/seed/seed_demo.sql
          docker compose exec -T redis redis-cli FLUSHALL

      - name: Run e2e — Lampiran A (seeded DB)
        working-directory: frontend
        run: pnpm exec playwright test --project=lampiran

      - name: Tear down stack
        if: always()
        run: docker compose down -v

      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7
