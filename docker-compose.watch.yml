# Live-reload development overlay. Use it WITH the base stack:
#
#   docker compose -f docker-compose.yml -f docker-compose.watch.yml up
#
# It keeps the base infra (postgres/redis/minio/migrate) and only swaps the two
# app services into watch mode:
#   - backend  → Dockerfile.dev, runs Air (rebuilds + restarts on *.go changes)
#   - frontend → Dockerfile.dev, runs `nuxt dev` with Vite HMR
#
# Source is bind-mounted so edits on the host reload inside the containers.
# Windows/WSL2 bind mounts don't deliver filesystem events, so polling watchers
# are enabled (Air `poll` in .air.toml; CHOKIDAR_USEPOLLING here).
services:
  backend:
    build:
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/src
      - backend-go-mod:/go/pkg/mod
      - backend-go-build:/root/.cache/go-build

  frontend:
    build:
      dockerfile: Dockerfile.dev
    environment:
      # Poll the filesystem so Nuxt's Vite + chokidar watchers see edits on
      # Windows/WSL2 bind mounts (inotify events don't cross the mount there).
      NUXT_DEV_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      # Keep the container's own node_modules (Linux-native) over the bind mount.
      - frontend-node-modules:/app/node_modules

volumes:
  backend-go-mod:
  backend-go-build:
  frontend-node-modules:
