# Full-stack Inventra in Docker:
#   docker compose up --build
#
# Brings up infrastructure, runs database migrations, then starts the Go API
# and the Nuxt frontend. For infra-only (developing on the host) use
# docker-compose.dev.yml instead.
services:
  postgres:
    image: postgres:16-alpine
    container_name: inventra-postgres
    environment:
      POSTGRES_USER: inventra
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: inventra_dev
    ports:
      - "5433:5432"
    volumes:
      - inventra-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventra -d inventra_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: inventra-redis
    ports:
      - "6379:6379"
    volumes:
      - inventra-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: inventra-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - inventra-minio:/data

  mailpit:
    image: axllent/mailpit:latest
    container_name: inventra-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8025/readyz"]
      interval: 10s
      timeout: 3s
      retries: 5

  migrate:
    image: migrate/migrate:v4.19.1
    container_name: inventra-migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/db/migrations:/migrations:ro
    command:
      - "-path=/migrations"
      - "-database=postgres://inventra:secret@postgres:5432/inventra_dev?sslmode=disable"
      - "up"
    restart: "no"

  backend:
    build:
      context: ./backend
    container_name: inventra-backend
    # Load developer .env (Google OAuth secrets etc.). The `environment:` block
    # below still wins for the Docker-internal infra hosts. required:false → the
    # stack still runs when backend/.env is absent.
    env_file:
      - path: ./backend/.env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    environment:
      ENV: development
      SERVER_PORT: "8080"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: inventra
      DB_PASSWORD: secret
      DB_NAME: inventra_dev
      DB_SSLMODE: disable
      REDIS_ADDR: redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET: inventra
      MINIO_USE_SSL: "false"
      JWT_SECRET: change-me-in-production
      FRONTEND_URL: http://localhost:3000
      RATELIMIT_ENABLED: "${RATELIMIT_ENABLED:-true}"
      MAIL_ENABLED: "true"
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_TLS: "none"
      SMTP_FROM: no-reply@inventra.local
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: inventra-frontend
    depends_on:
      backend:
        condition: service_started
    environment:
      # Browser-facing API base (requests originate from the user's browser).
      NUXT_PUBLIC_API_BASE: http://localhost:8080/api/v1
    ports:
      - "3000:3000"

volumes:
  inventra-postgres:
  inventra-redis:
  inventra-minio:
