# Analyzer + lint untuk mobile/ — dasar flutter_lints diperketat sesuai
# docs/mobile/CONVENTIONS.md bagian 1. `flutter analyze` wajib nol issue (gate CI).
include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - lib/core/i18n/gen/**

linter:
  rules:
    avoid_print: true
    prefer_const_constructors: true
    prefer_final_locals: true
    unawaited_futures: true
    always_declare_return_types: true
