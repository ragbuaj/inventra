name: inventra_mobile
description: "Inventra Field Companion - aplikasi mobile pendamping sistem manajemen aset Inventra."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dio: ^5.10.0
  flutter_riverpod: ^3.3.2
  flutter_secure_storage: ^10.3.1
  freezed_annotation: ^3.1.0
  go_router: ^17.3.0
  intl: ^0.20.2
  json_annotation: ^4.12.0
  material_symbols_icons: ^4.2951.0
  mobile_scanner: ^7.3.0
  connectivity_plus: ^7.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.15.1
  flutter_lints: ^6.0.0
  freezed: ^3.2.6-dev.1
  json_serializable: ^6.14.0
  mocktail: ^1.0.5

flutter:
  uses-material-design: true

  # gen_l10n: ARB di lib/core/i18n/arb (id default + en), konfigurasi di l10n.yaml.
  generate: true

  # Inter di-bundle sebagai asset (static weights; lisensi OFL di fonts/OFL.txt).
  fonts:
    - family: Inter
      fonts:
        - asset: fonts/Inter-Regular.ttf
          weight: 400
        - asset: fonts/Inter-Medium.ttf
          weight: 500
        - asset: fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: fonts/Inter-Bold.ttf
          weight: 700
        - asset: fonts/Inter-ExtraBold.ttf
          weight: 800
