allowBuilds:
  '@parcel/watcher': false
  '@tailwindcss/oxide': false
  esbuild: false
  maplibre-gl: false
  unrs-resolver: false
  vue-demi: false

# Allowlist for pnpm's minimumReleaseAge supply-chain gate (rejects packages
# younger than the cutoff). These first-party Vue org releases were still within
# the window when the pinia v4 major landed; without the exclude, CI's
# `pnpm install --frozen-lockfile` fails the policy check. Prune entries once the
# versions have aged well past the cutoff.
minimumReleaseAgeExclude:
  - '@pinia/nuxt@1.0.0'
  - 'pinia@4.0.2'

# Force patched versions of transitive (build/dev-time) deps flagged by Dependabot.
overrides:
  # Dedupe Vue to a single copy. The nuxt 4.5 bump pulls vue 3.5.40 for the app
  # runtime while @nuxt/test-utils' peer still resolved vue 3.5.35 — two Vue
  # instances break mountSuspended (component instance is null, "reading 'ce'"
  # in the Vitest component tests). Pin one version so runtime and test-utils
  # share it. Bump this in lockstep with the nuxt/vue version going forward.
  vue: 3.5.40
  shell-quote: '>=1.8.4'
  vite: '>=7.3.5'
  esbuild: '>=0.28.1'
  tar: '>=7.5.16'
  js-yaml: '>=4.1.2'
  launch-editor: '>=2.14.1'
  '@babel/core': '>=7.29.1'
