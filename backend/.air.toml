# Air live-reload config for the Go API, used by the Docker watch stack
# (docker-compose.watch.yml). Polling is enabled because Windows/WSL2 bind
# mounts do not deliver inotify events to the container — without it Air never
# sees source changes. CGO is disabled to match the production build.
root = "."
tmp_dir = "tmp"

[build]
  cmd = "CGO_ENABLED=0 go build -o ./tmp/api ./cmd/api"
  bin = "./tmp/api"
  include_ext = ["go"]
  exclude_dir = ["tmp", "bin"]
  exclude_regex = ["_test\\.go"]
  delay = 500
  stop_on_error = true
  poll = true
  poll_interval = 500

[log]
  time = true

[misc]
  clean_on_exit = true
