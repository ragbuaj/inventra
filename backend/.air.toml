# Air live-reload config for the Go API, used by docker-compose.dev.yml
# (profile `app`) with `docker compose watch`. Watch *syncs* source onto the
# container's native filesystem, so Air sees changes via normal inotify —
# polling is no longer needed (the old Windows/WSL2 bind-mount hack is gone).
# CGO is disabled to match the production build.
root = "."
tmp_dir = "tmp"

[build]
  cmd = "CGO_ENABLED=0 go build -o ./tmp/api ./cmd/api"
  bin = "./tmp/api"
  include_ext = ["go"]
  exclude_dir = ["tmp", "bin"]
  exclude_regex = ["_test\\.go"]
  delay = 500
  stop_on_error = true
  poll = false

[log]
  time = true

[misc]
  clean_on_exit = true
