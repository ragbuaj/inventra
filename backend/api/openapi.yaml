openapi: 3.1.0
info:
  title: Inventra API
  version: 0.1.0
  description: |
    Asset management API for Inventra (see docs/PRD.md, docs/DATABASE.md).

    **Auth:** Bearer JWT. Obtain tokens via `POST /api/v1/auth/login`, then send
    `Authorization: Bearer <access_token>`. Access tokens are short-lived;
    rotate with `POST /api/v1/auth/refresh`. `POST /api/v1/auth/logout` revokes
    the current access token and the supplied refresh token.
  contact:
    name: Inventra
    url: https://github.com/ragbuaj/inventra
  license:
    name: MIT

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: Health
    description: Liveness & readiness probes
  - name: Auth
    description: Authentication & session
  - name: Users
    description: User management (requires the user.manage permission)
  - name: Master Data
    description: |
      Reference master data. Read is open to authenticated users; writes require
      `masterdata.global.manage`. `categories` (documented in full) and `brands`
      (representative of the generic reference CRUD) are shown here.

      The following reference resources share the **same generic CRUD contract**
      as `brands` (`GET/POST /api/v1/{resource}`, `GET/PUT/DELETE /api/v1/{resource}/{id}`),
      differing only in their writable fields:
      `office-types`, `departments`, `positions`, `units`, `maintenance-categories`,
      `problem-categories`, `brands`, `vendors`, `provinces`, `cities` (field `province_id`),
      `models` (field `brand_id`).

      **Offices & employees** (documented in full) are data-scoped per row.
      **Floors** (`GET /api/v1/floors?office_id=...`) and **rooms**
      (`GET /api/v1/rooms?floor_id=...`) are nested, office-scoped location
      resources (writes require `masterdata.office.manage`); see the Bruno
      collection for examples.

paths:
  /health:
    get:
      tags: [Health]
      operationId: healthLiveness
      summary: Liveness probe
      description: Returns ok if the process is up. No external dependencies.
      security: []
      responses:
        "200":
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"

  /health/ready:
    get:
      tags: [Health]
      operationId: healthReadiness
      summary: Readiness probe
      description: Verifies PostgreSQL and Redis are reachable.
      security: []
      responses:
        "200":
          description: All dependencies reachable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Readiness"
        "503":
          description: One or more dependencies unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Readiness"

  /api/v1/auth/login:
    post:
      tags: [Auth]
      operationId: authLogin
      summary: Login with email and password
      description: Verifies credentials and issues an access + refresh token pair.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Tokens issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Invalid email or password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: User is not active
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      operationId: authRefresh
      summary: Rotate refresh token for a new token pair
      description: Validates the refresh token, rotates it (single-use), and issues a new pair.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: New token pair issued; the old refresh token is invalidated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      operationId: authLogout
      summary: Revoke the current access token and a refresh token
      description: Denylists the current access token until expiry and deletes the supplied refresh token.
      security:
        - bearerJWT: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    examples: ["logged_out"]
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/me:
    get:
      tags: [Auth]
      operationId: authMe
      summary: Current authenticated user
      description: Returns the profile of the user identified by the access token.
      security:
        - bearerJWT: []
      responses:
        "200":
          description: The current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/auth/permissions:
    get:
      tags: [Auth]
      operationId: authPermissions
      summary: Effective RBAC permissions of the caller
      description: Returns the action permission keys granted to the caller's role.
      security:
        - bearerJWT: []
      responses:
        "200":
          description: Permission keys
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PermissionsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/scope/{module}:
    get:
      tags: [Auth]
      operationId: authScope
      summary: Effective data scope of the caller for a module
      description: |
        Resolves the caller's data-access scope (`global`, `office_subtree`,
        `office`, or `own`) for the given module, including the office subtree
        when applicable.
      security:
        - bearerJWT: []
      parameters:
        - name: module
          in: path
          required: true
          description: Module key (e.g. `asset`, `requests`), or `*` for the default.
          schema:
            type: string
      responses:
        "200":
          description: Effective scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Scope"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/users:
    get:
      tags: [Users]
      operationId: listUsers
      summary: List users
      description: Requires the `user.manage` permission (Superadmin by default).
      security:
        - bearerJWT: []
      parameters:
        - name: search
          in: query
          schema: { type: string }
          description: Filter by name or email (case-insensitive).
        - name: limit
          in: query
          schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
        - name: offset
          in: query
          schema: { type: integer, default: 0, minimum: 0 }
      responses:
        "200":
          description: A page of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserList"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [Users]
      operationId: createUser
      summary: Create a user
      description: Requires the `user.manage` permission.
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: Created user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Email already in use
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/users/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Users]
      operationId: getUser
      summary: Get a user by id
      description: Requires the `user.manage` permission.
      security:
        - bearerJWT: []
      responses:
        "200":
          description: The user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    put:
      tags: [Users]
      operationId: updateUser
      summary: Update a user (full replace of mutable fields)
      description: Replaces name, role, status, office, and employee. Requires the `user.manage` permission.
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    delete:
      tags: [Users]
      operationId: deleteUser
      summary: Soft-delete a user
      description: Marks the user deleted (soft delete). Requires the `user.manage` permission.
      security:
        - bearerJWT: []
      responses:
        "204": { description: Deleted }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/categories:
    get:
      tags: [Master Data]
      operationId: listCategories
      summary: List asset categories
      description: Readable by any authenticated user.
      security:
        - bearerJWT: []
      parameters:
        - { name: search, in: query, schema: { type: string } }
        - { name: limit, in: query, schema: { type: integer, default: 20, minimum: 1, maximum: 100 } }
        - { name: offset, in: query, schema: { type: integer, default: 0, minimum: 0 } }
      responses:
        "200":
          description: A page of categories
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CategoryList" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [Master Data]
      operationId: createCategory
      summary: Create an asset category
      description: Requires the `masterdata.global.manage` permission.
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CategoryRequest" }
      responses:
        "201":
          description: Created category
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Category" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Duplicate code
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/categories/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Master Data]
      operationId: getCategory
      summary: Get a category by id
      description: Readable by any authenticated user.
      security:
        - bearerJWT: []
      responses:
        "200":
          description: The category
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Category" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    put:
      tags: [Master Data]
      operationId: updateCategory
      summary: Update a category (full replace)
      description: Requires the `masterdata.global.manage` permission.
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CategoryRequest" }
      responses:
        "200":
          description: Updated category
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Category" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    delete:
      tags: [Master Data]
      operationId: deleteCategory
      summary: Soft-delete a category
      description: Requires the `masterdata.global.manage` permission.
      security:
        - bearerJWT: []
      responses:
        "204": { description: Deleted }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/brands:
    get:
      tags: [Master Data]
      operationId: listBrands
      summary: List brands (representative reference resource)
      description: Readable by any authenticated user. See the Master Data tag for the full list of resources sharing this contract.
      security: [{ bearerJWT: [] }]
      parameters:
        - { name: search, in: query, schema: { type: string } }
        - { name: limit, in: query, schema: { type: integer, default: 20, minimum: 1, maximum: 100 } }
        - { name: offset, in: query, schema: { type: integer, default: 0, minimum: 0 } }
      responses:
        "200":
          description: A page of records
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RefList" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [Master Data]
      operationId: createBrand
      summary: Create a brand
      description: Requires the `masterdata.global.manage` permission.
      security: [{ bearerJWT: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RefRequest" }
      responses:
        "201":
          description: Created record
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RefItem" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Duplicate unique value
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/brands/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Master Data]
      operationId: getBrand
      summary: Get a brand by id
      description: Readable by any authenticated user.
      security: [{ bearerJWT: [] }]
      responses:
        "200":
          description: The record
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RefItem" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    put:
      tags: [Master Data]
      operationId: updateBrand
      summary: Update a brand (full replace)
      description: Requires the `masterdata.global.manage` permission.
      security: [{ bearerJWT: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RefRequest" }
      responses:
        "200":
          description: Updated record
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RefItem" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    delete:
      tags: [Master Data]
      operationId: deleteBrand
      summary: Soft-delete a brand
      description: Requires the `masterdata.global.manage` permission.
      security: [{ bearerJWT: [] }]
      responses:
        "204": { description: Deleted }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/offices:
    get:
      tags: [Master Data]
      operationId: listOffices
      summary: List offices (data-scoped)
      description: |
        Returns offices within the caller's **data scope**: `global` sees all;
        `office_subtree` sees the caller's office and its descendants; etc.
      security: [{ bearerJWT: [] }]
      parameters:
        - { name: search, in: query, schema: { type: string } }
        - { name: limit, in: query, schema: { type: integer, default: 20, minimum: 1, maximum: 100 } }
        - { name: offset, in: query, schema: { type: integer, default: 0, minimum: 0 } }
      responses:
        "200":
          description: A page of offices in scope
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OfficeList" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [Master Data]
      operationId: createOffice
      summary: Create an office
      description: Requires the `masterdata.office.manage` permission.
      security: [{ bearerJWT: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OfficeRequest" }
      responses:
        "201":
          description: Created office
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Office" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/offices/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Master Data]
      operationId: getOffice
      summary: Get an office by id
      description: Readable by any authenticated user.
      security: [{ bearerJWT: [] }]
      responses:
        "200": { description: The office, content: { application/json: { schema: { $ref: "#/components/schemas/Office" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { description: Not found, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
    put:
      tags: [Master Data]
      operationId: updateOffice
      summary: Update an office (full replace)
      description: Requires the `masterdata.office.manage` permission.
      security: [{ bearerJWT: [] }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/OfficeRequest" } } }
      responses:
        "200": { description: Updated office, content: { application/json: { schema: { $ref: "#/components/schemas/Office" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { description: Not found, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
    delete:
      tags: [Master Data]
      operationId: deleteOffice
      summary: Soft-delete an office
      description: Requires the `masterdata.office.manage` permission.
      security: [{ bearerJWT: [] }]
      responses:
        "204": { description: Deleted }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { description: Not found, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /api/v1/employees:
    get:
      tags: [Master Data]
      operationId: listEmployees
      summary: List employees (data-scoped)
      description: Returns employees whose office is within the caller's data scope.
      security: [{ bearerJWT: [] }]
      parameters:
        - { name: search, in: query, schema: { type: string } }
        - { name: limit, in: query, schema: { type: integer, default: 20, minimum: 1, maximum: 100 } }
        - { name: offset, in: query, schema: { type: integer, default: 0, minimum: 0 } }
      responses:
        "200":
          description: A page of employees in scope
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EmployeeList" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [Master Data]
      operationId: createEmployee
      summary: Create an employee
      description: Requires the `masterdata.office.manage` permission.
      security: [{ bearerJWT: [] }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/EmployeeRequest" } } }
      responses:
        "201": { description: Created employee, content: { application/json: { schema: { $ref: "#/components/schemas/Employee" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { description: Duplicate code, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /api/v1/employees/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Master Data]
      operationId: getEmployee
      summary: Get an employee by id
      description: Readable by any authenticated user.
      security: [{ bearerJWT: [] }]
      responses:
        "200": { description: The employee, content: { application/json: { schema: { $ref: "#/components/schemas/Employee" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { description: Not found, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
    put:
      tags: [Master Data]
      operationId: updateEmployee
      summary: Update an employee (full replace)
      description: Requires the `masterdata.office.manage` permission.
      security: [{ bearerJWT: [] }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/EmployeeRequest" } } }
      responses:
        "200": { description: Updated employee, content: { application/json: { schema: { $ref: "#/components/schemas/Employee" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { description: Not found, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
    delete:
      tags: [Master Data]
      operationId: deleteEmployee
      summary: Soft-delete an employee
      description: Requires the `masterdata.office.manage` permission.
      security: [{ bearerJWT: [] }]
      responses:
        "204": { description: Deleted }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { description: Not found, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

components:
  securitySchemes:
    bearerJWT:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    BadRequest:
      description: Malformed request body
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Missing, invalid, or revoked token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Authenticated but lacking the required permission
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Human-readable error message
      examples:
        - error: invalid email or password

    Health:
      type: object
      required: [status, service, env]
      properties:
        status:
          type: string
          examples: ["ok"]
        service:
          type: string
          examples: ["inventra-api"]
        env:
          type: string
          examples: ["development"]

    Readiness:
      type: object
      required: [status, checks]
      properties:
        status:
          type: string
          enum: [ready, not_ready]
        checks:
          type: object
          properties:
            postgres:
              type: string
              description: '"ok" or an error message'
            redis:
              type: string
              description: '"ok" or an error message'

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          examples: ["admin@inventra.local"]
        password:
          type: string
          format: password
          minLength: 1
          examples: ["admin12345"]

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    LogoutRequest:
      type: object
      properties:
        refresh_token:
          type: string
          description: Optional; when supplied, this refresh token is also revoked.

    TokenResponse:
      type: object
      required: [access_token, refresh_token, token_type, expires_in]
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          examples: ["Bearer"]
        expires_in:
          type: integer
          description: Access-token lifetime in seconds
          examples: [900]

    User:
      type: object
      required: [id, name, email, role_id, status, google_linked]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        role_id:
          type: string
          format: uuid
        office_id:
          type: [string, "null"]
          format: uuid
        employee_id:
          type: [string, "null"]
          format: uuid
        status:
          type: string
          enum: [active, inactive, suspended]
        avatar_url:
          type: [string, "null"]
        google_linked:
          type: boolean
        created_at:
          type: [string, "null"]
          format: date-time
        updated_at:
          type: [string, "null"]
          format: date-time

    CreateUserRequest:
      type: object
      required: [name, email, role_id]
      properties:
        name: { type: string }
        email: { type: string, format: email }
        password:
          type: string
          format: password
          description: Optional; when omitted the user can only sign in via Google.
        role_id: { type: string, format: uuid }
        office_id: { type: [string, "null"], format: uuid }
        employee_id: { type: [string, "null"], format: uuid }

    UpdateUserRequest:
      type: object
      required: [name, role_id, status]
      properties:
        name: { type: string }
        role_id: { type: string, format: uuid }
        status: { type: string, enum: [active, inactive, suspended] }
        office_id: { type: [string, "null"], format: uuid }
        employee_id: { type: [string, "null"], format: uuid }

    UserList:
      type: object
      required: [data, total, limit, offset]
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/User" }
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }

    Category:
      type: object
      required: [id, name, is_active]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        code: { type: [string, "null"] }
        parent_id: { type: [string, "null"], format: uuid }
        default_depreciation_method:
          type: [string, "null"]
          description: One of `straight_line` or `declining_balance` (nullable).
        default_useful_life_months: { type: [integer, "null"] }
        default_salvage_rate:
          type: [string, "null"]
          description: Decimal string (e.g. "0.1000" = 10%).
        is_active: { type: boolean }
        created_at: { type: [string, "null"], format: date-time }
        updated_at: { type: [string, "null"], format: date-time }

    CategoryRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
        code: { type: [string, "null"] }
        parent_id: { type: [string, "null"], format: uuid }
        default_depreciation_method:
          type: [string, "null"]
          description: One of `straight_line` or `declining_balance` (nullable).
        default_useful_life_months: { type: [integer, "null"] }
        default_salvage_rate: { type: [string, "null"] }
        is_active: { type: boolean, default: true }

    CategoryList:
      type: object
      required: [data, total, limit, offset]
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/Category" }
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }

    RefItem:
      type: object
      description: A reference master-data record. Common fields shown; resources add their own (e.g. code, symbol, is_active, province_id, brand_id).
      required: [id, name]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        is_active: { type: boolean }
        created_at: { type: [string, "null"], format: date-time }
        updated_at: { type: [string, "null"], format: date-time }
      additionalProperties: true

    RefRequest:
      type: object
      description: Writable fields of a reference record (varies per resource; `name` is always required).
      required: [name]
      properties:
        name: { type: string }
        is_active: { type: boolean, default: true }
      additionalProperties: true

    RefList:
      type: object
      required: [data, total, limit, offset]
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/RefItem" }
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }

    Office:
      type: object
      required: [id, office_type_id, name, code, is_active]
      properties:
        id: { type: string, format: uuid }
        parent_id: { type: [string, "null"], format: uuid }
        office_type_id: { type: string, format: uuid }
        province_id: { type: [string, "null"], format: uuid }
        city_id: { type: [string, "null"], format: uuid }
        name: { type: string }
        code: { type: string }
        address: { type: [string, "null"] }
        is_active: { type: boolean }
        created_at: { type: [string, "null"], format: date-time }
        updated_at: { type: [string, "null"], format: date-time }

    OfficeRequest:
      type: object
      required: [office_type_id, name, code]
      properties:
        parent_id: { type: [string, "null"], format: uuid }
        office_type_id: { type: string, format: uuid }
        province_id: { type: [string, "null"], format: uuid }
        city_id: { type: [string, "null"], format: uuid }
        name: { type: string }
        code: { type: string }
        address: { type: [string, "null"] }
        is_active: { type: boolean, default: true }

    OfficeList:
      type: object
      required: [data, total, limit, offset]
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/Office" } }
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }

    Employee:
      type: object
      required: [id, code, name, office_id, status]
      properties:
        id: { type: string, format: uuid }
        code: { type: string }
        name: { type: string }
        email: { type: [string, "null"], format: email }
        avatar_key: { type: [string, "null"] }
        department_id: { type: [string, "null"], format: uuid }
        position_id: { type: [string, "null"], format: uuid }
        office_id: { type: string, format: uuid }
        status: { type: string, enum: [active, inactive, suspended] }
        created_at: { type: [string, "null"], format: date-time }
        updated_at: { type: [string, "null"], format: date-time }

    EmployeeRequest:
      type: object
      required: [code, name, office_id]
      properties:
        code: { type: string }
        name: { type: string }
        email: { type: [string, "null"], format: email }
        avatar_key: { type: [string, "null"] }
        department_id: { type: [string, "null"], format: uuid }
        position_id: { type: [string, "null"], format: uuid }
        office_id: { type: string, format: uuid }
        status: { type: string, enum: [active, inactive, suspended], default: active }

    EmployeeList:
      type: object
      required: [data, total, limit, offset]
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/Employee" } }
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }

    PermissionsResponse:
      type: object
      required: [permissions]
      properties:
        permissions:
          type: array
          items:
            type: string
          examples:
            - ["asset.read", "request.create", "report.view"]

    Scope:
      type: object
      required: [level]
      properties:
        level:
          type: string
          enum: [global, office_subtree, office, own]
        office_ids:
          type: array
          description: Offices in scope (for office / office_subtree levels).
          items:
            type: string
            format: uuid
