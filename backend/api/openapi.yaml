        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    delete:
      tags: [Master Data]
      operationId: deleteBrand
      summary: Soft-delete a brand
      description: Requires the `masterdata.global.manage` permission.
      security: [{ bearerJWT: [] }]
      responses:
        "204": { description: Deleted }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/offices:
    get:
      tags: [Master Data]
      operationId: listOffices
      summary: List offices (data-scoped)
      description: |
        Returns offices within the caller's **data scope**: `global` sees all;
        `office_subtree` sees the caller's office and its descendants; etc.
      security: [{ bearerJWT: [] }]
      parameters:
        - { name: search, in: query, schema: { type: string } }
        - { name: limit, in: query, schema: { type: integer, default: 20, minimum: 1, maximum: 100 } }
        - { name: offset, in: query, schema: { type: integer, default: 0, minimum: 0 } }
      responses:
        "200":
          description: A page of offices in scope
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OfficeList" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [Master Data]
      operationId: createOffice
      summary: Create an office
      description: Requires the `masterdata.office.manage` permission.
      security: [{ bearerJWT: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OfficeRequest" }
      responses:
        "201":
          description: Created office
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Office" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/offices/map:
    get:
      tags: [Master Data]
      operationId: listOfficesMap
      summary: Office map
      description: |
        Returns a geo-enriched list of active offices within the caller's **data scope**,
        with resolved office-type name, province/city names, and per-office asset count.
        No pagination — returns all in-scope offices. Used by the Peta Lokasi screen.
      security: [{ bearerJWT: [] }]
      responses:
        "200":
          description: List of in-scope offices for the map
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/OfficeMapItem" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/offices/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Master Data]
      operationId: getOffice
      summary: Get an office by id
      description: Readable by any authenticated user.
      security: [{ bearerJWT: [] }]
      responses:
        "200": { description: The office, content: { application/json: { schema: { $ref: "#/components/schemas/Office" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { description: Not found, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
    put:
      tags: [Master Data]
      operationId: updateOffice
      summary: Update an office (full replace)
      description: Requires the `masterdata.office.manage` permission.
      security: [{ bearerJWT: [] }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/OfficeRequest" } } }
      responses:
        "200": { description: Updated office, content: { application/json: { schema: { $ref: "#/components/schemas/Office" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { description: Not found, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
    delete:
      tags: [Master Data]
      operationId: deleteOffice
      summary: Soft-delete an office
      description: Requires the `masterdata.office.manage` permission.
      security: [{ bearerJWT: [] }]
      responses:
        "204": { description: Deleted }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { description: Not found, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /api/v1/employees:
    get:
      tags: [Master Data]
      operationId: listEmployees
      summary: List employees (data-scoped)
      description: Returns employees whose office is within the caller's data scope.
      security: [{ bearerJWT: [] }]
      parameters:
        - { name: search, in: query, schema: { type: string } }
        - { name: limit, in: query, schema: { type: integer, default: 20, minimum: 1, maximum: 100 } }
        - { name: offset, in: query, schema: { type: integer, default: 0, minimum: 0 } }
      responses:
        "200":
          description: A page of employees in scope
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EmployeeList" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [Master Data]
      operationId: createEmployee
      summary: Create an employee
      description: Requires the `masterdata.office.manage` permission.
      security: [{ bearerJWT: [] }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/EmployeeRequest" } } }
      responses:
        "201": { description: Created employee, content: { application/json: { schema: { $ref: "#/components/schemas/Employee" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { description: Duplicate code, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /api/v1/employees/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Master Data]
      operationId: getEmployee
      summary: Get an employee by id
      description: Readable by any authenticated user.
      security: [{ bearerJWT: [] }]
      responses:
        "200": { description: The employee, content: { application/json: { schema: { $ref: "#/components/schemas/Employee" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { description: Not found, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
    put:
      tags: [Master Data]
      operationId: updateEmployee
      summary: Update an employee (full replace)
      description: Requires the `masterdata.office.manage` permission.
      security: [{ bearerJWT: [] }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/EmployeeRequest" } } }
      responses:
        "200": { description: Updated employee, content: { application/json: { schema: { $ref: "#/components/schemas/Employee" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { description: Not found, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
    delete:
      tags: [Master Data]
      operationId: deleteEmployee
      summary: Soft-delete an employee
      description: Requires the `masterdata.office.manage` permission.
      security: [{ bearerJWT: [] }]
      responses:
        "204": { description: Deleted }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { description: Not found, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /api/v1/assets:
    get:
      tags: [Assets]
      operationId: listAssets
      summary: List assets (data-scoped)
      description: |
        Returns assets within the caller's data scope. Requires the `asset.view`
        permission. Sensitive financial fields (purchase_cost, book_value,
        accumulated_depreciation) may be masked by field-permission policies.
      security:
        - bearerJWT: []
      parameters:
        - { name: search, in: query, schema: { type: string }, description: Filter by name or asset_tag (case-insensitive). }
        - { name: limit, in: query, schema: { type: integer, default: 20, minimum: 1, maximum: 100 } }
        - { name: offset, in: query, schema: { type: integer, default: 0, minimum: 0 } }
        - name: category_id
          in: query
          schema: { type: string, format: uuid }
          description: Filter by category.
        - name: office_id
          in: query
          schema: { type: string, format: uuid }
          description: Filter by office.
        - name: status
          in: query
          schema:
            type: string
            enum: [available, assigned, under_maintenance, in_transfer, retired, disposed, lost]
          description: Filter by asset status.
        - name: asset_class
          in: query
          schema:
            type: string
            enum: [tangible, intangible]
          description: Filter by asset class.
      responses:
        "200":
          description: A page of assets
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AssetList" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/assets/by-tag/{tag}:
    parameters:
      - name: tag
        in: path
        required: true
        schema: { type: string }
        description: Asset tag (barcode / QR value) to look up.
    get:
      tags: [Assets]
      operationId: getAssetByTag
      summary: Scan-lookup — get asset by tag
      description: |
        Resolves an asset by its `asset_tag` value (scanned from a barcode or QR code).
        Requires the `asset.view` permission. Out-of-scope assets return 404 (not 403)
        to avoid tag enumeration.
      security:
        - bearerJWT: []
      responses:
        "200":
          description: The asset
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Asset" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404":
          description: Tag not found or out of caller's scope
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/assets/labels:
    post:
      tags: [Assets]
      operationId: generateLabels
      summary: Generate a label PDF for one or more assets
      description: |
        Renders a printable label PDF for the supplied assets (by id or tag).
        Provide `asset_ids` OR `tags`; if both are given, `asset_ids` takes precedence.
        Requires the `asset.view` permission.
        Returns 422 when none of the requested assets fall within the caller's scope.
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LabelRequest" }
      responses:
        "200":
          description: Label PDF
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422":
          description: No in-scope assets matched the request
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/assets/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Assets]
      operationId: getAsset
      summary: Get an asset by id
      description: Requires the `asset.view` permission. The asset must be within the caller's data scope.
      security:
        - bearerJWT: []
      responses:
        "200":
          description: The asset
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Asset" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    put:
      tags: [Assets]
      operationId: updateAsset
      summary: Update non-sensitive asset attributes
      description: |
        Replaces the mutable non-financial attributes of an asset.
        Requires the `asset.manage` permission; the asset must be within the caller's data scope.
        `purchase_cost` and `asset_class` are not updated here — they are changed via dedicated operations.
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AssetUpdate" }
      responses:
        "200":
          description: Updated asset
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Asset" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/assets/{id}/barcode:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Assets]
      operationId: getAssetBarcode
      summary: Get barcode/QR image for an asset
      description: |
        Returns a PNG image of the asset's barcode (Code-128) or QR code.
        Requires the `asset.view` permission. Out-of-scope assets return 403.
      security:
        - bearerJWT: []
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [code128, qr]
            default: code128
          description: Barcode symbology to render.
      responses:
        "200":
          description: PNG barcode image
          content:
            image/png:
              schema:
                type: string
                format: binary
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Asset not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/assets/{id}/attachments:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid }, description: Asset id }
    post:
      tags: [Assets]
      operationId: uploadAttachment
      summary: Upload an attachment to an asset
      description: |
        Attaches a file (photo or document) to the given asset.
        Requires the `asset.manage` permission.
        Returns 413 if the file exceeds the server size limit; 415 if the MIME type is not accepted.
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: The file to upload.
      responses:
        "201":
          description: Attachment created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Attachment" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "413":
          description: File too large
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "415":
          description: Unsupported media type
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    get:
      tags: [Assets]
      operationId: listAttachments
      summary: List attachments for an asset
      description: Returns all non-deleted attachments for the given asset. Requires the `asset.view` permission.
      security:
        - bearerJWT: []
      responses:
        "200":
          description: Attachment list
          content:
            application/json:
              schema:
                type: object
                required: [data, total]
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/Attachment" }
                  total: { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/assets/{id}/attachments/{aid}/content:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid }, description: Asset id }
      - { name: aid, in: path, required: true, schema: { type: string, format: uuid }, description: Attachment id }
    get:
      tags: [Assets]
      operationId: getAttachmentContent
      summary: Download the raw content of an attachment
      description: Streams the original file bytes. Requires the `asset.view` permission.
      security:
        - bearerJWT: []
      responses:
        "200":
          description: File contents
          content:
            image/jpeg:
              schema: { type: string, format: binary }
            image/png:
              schema: { type: string, format: binary }
            image/webp:
              schema: { type: string, format: binary }
            application/pdf:
              schema: { type: string, format: binary }
            application/octet-stream:
              schema: { type: string, format: binary }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Attachment not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/assets/{id}/attachments/{aid}/thumbnail:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid }, description: Asset id }
      - { name: aid, in: path, required: true, schema: { type: string, format: uuid }, description: Attachment id }
    get:
      tags: [Assets]
      operationId: getAttachmentThumbnail
      summary: Download the JPEG thumbnail of an attachment
      description: |
        Streams the thumbnail image (JPEG). Only available when `has_thumbnail` is true on the
        attachment. Requires the `asset.view` permission.
      security:
        - bearerJWT: []
      responses:
        "200":
          description: Thumbnail image
          content:
            image/jpeg:
              schema: { type: string, format: binary }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Attachment or thumbnail not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/assets/{id}/attachments/{aid}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid }, description: Asset id }
      - { name: aid, in: path, required: true, schema: { type: string, format: uuid }, description: Attachment id }
    delete:
      tags: [Assets]
      operationId: deleteAttachment
      summary: Delete an attachment
      description: Soft-deletes the attachment record and removes the backing object from storage. Requires the `asset.manage` permission.
      security:
        - bearerJWT: []
      responses:
        "204": { description: Deleted }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Attachment not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/assets/{id}/documents:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid }, description: Asset id }
    get:
      tags: [Assets]
      operationId: listDocuments
      summary: List documents for an asset
      description: Returns all non-deleted documents (BAST and other) for the given asset. Requires the `asset.view` permission.
      security:
        - bearerJWT: []
      responses:
        "200":
          description: Document list
          content:
            application/json:
              schema:
                type: object
                required: [data, total]
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/AssetDocument" }
                  total: { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [Assets]
      operationId: createDocument
      summary: Create a document record for an asset
      description: |
        Creates a document metadata record (BAST or other). A file may be attached separately
        via `PUT /assets/{id}/documents/{docId}/file`. Requires the `asset.manage` permission.
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DocumentCreateRequest" }
      responses:
        "201":
          description: Document created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AssetDocument" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/assets/{id}/documents/{docId}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid }, description: Asset id }
      - { name: docId, in: path, required: true, schema: { type: string, format: uuid }, description: Document id }
    get:
      tags: [Assets]
      operationId: getDocument
      summary: Get a document record
      description: Returns a single document belonging to the given asset. Requires the `asset.view` permission.
      security:
        - bearerJWT: []
      responses:
        "200":
          description: The document
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AssetDocument" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Document not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    put:
      tags: [Assets]
      operationId: updateDocument
      summary: Update document metadata
      description: Edits the metadata fields of a document. Does not affect any attached file. Requires the `asset.manage` permission.
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DocumentUpdateRequest" }
      responses:
        "200":
          description: Updated document
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AssetDocument" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Document not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    delete:
      tags: [Assets]
      operationId: deleteDocument
      summary: Delete a document record
      description: Soft-deletes the document record and removes any backing file from storage. Requires the `asset.manage` permission.
      security:
        - bearerJWT: []
      responses:
        "204": { description: Deleted }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Document not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/assets/{id}/documents/{docId}/file:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid }, description: Asset id }
      - { name: docId, in: path, required: true, schema: { type: string, format: uuid }, description: Document id }
    put:
      tags: [Assets]
      operationId: uploadDocumentFile
      summary: Attach a file to a document record
      description: |
        Uploads (or replaces) the file associated with the document. Accepted MIME types mirror
        the asset-attachment endpoint (image/jpeg, image/png, image/webp, application/pdf).
        Returns 413 if the file exceeds the server size limit; 415 if
        the MIME type is not accepted. Requires the `asset.manage` permission.
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: The file to attach.
      responses:
        "200":
          description: Document with file attached
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AssetDocument" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Document not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "413":
          description: File too large
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "415":
          description: Unsupported media type
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    get:
      tags: [Assets]
      operationId: downloadDocumentFile
      summary: Download the file attached to a document
      description: |
        Streams the raw file bytes with `Content-Disposition: attachment` and security headers
        (`X-Content-Type-Options: nosniff`, `Content-Security-Policy: sandbox`).
        Returns 404 when no file has been attached (`has_file` is false). Requires the `asset.view` permission.
      security:
        - bearerJWT: []
      responses:
        "200":
          description: File contents
          content:
            image/jpeg:
              schema: { type: string, format: binary }
            image/png:
              schema: { type: string, format: binary }
            image/webp:
              schema: { type: string, format: binary }
            application/pdf:
              schema: { type: string, format: binary }
            application/octet-stream:
              schema: { type: string, format: binary }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Document or file not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/requests:
    post:
      tags: [Requests]
      operationId: submitRequest
      summary: Submit an approval request
      description: Creates a new approval request and routes it to the first eligible approver. Requires the `request.create` permission.
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SubmitRequest" }
      responses:
        "201":
          description: Created request
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Request" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422":
          description: No matching approval threshold configured
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    get:
      tags: [Requests]
      operationId: listRequests
      summary: List approval requests (data-scoped)
      description: Returns requests within the caller's data scope. No special permission beyond authentication required for listing. Fields `amount`/`payload`/`reason` may be omitted per role field-permissions.
      security:
        - bearerJWT: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected, cancelled]
          description: Filter by request status.
        - name: type
          in: query
          schema:
            type: string
            enum: [asset_create, asset_disposal, asset_transfer, assignment, maintenance, valuation_exclusion]
          description: Filter by request type.
        - name: mine
          in: query
          schema: { type: boolean, default: false }
          description: |
            When `true`, returns only the caller's own submitted requests (filtered by
            requester) and bypasses office data-scope filtering — a caller can always see
            their own requests regardless of scope configuration.
        - { name: limit, in: query, schema: { type: integer, default: 20, minimum: 1, maximum: 100 } }
        - { name: offset, in: query, schema: { type: integer, default: 0, minimum: 0 } }
      responses:
        "200":
          description: A page of requests
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RequestList" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/requests/inbox:
    get:
      tags: [Requests]
      operationId: listRequestsInbox
      summary: Pending requests awaiting the caller's decision
      description: Returns requests currently at a step the caller is eligible to approve or reject. Requires the `request.decide` permission. Fields `amount`/`payload`/`reason` may be omitted per role field-permissions.
      security:
        - bearerJWT: []
      responses:
        "200":
          description: Requests in inbox
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RequestInbox" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/requests/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Requests]
      operationId: getRequest
      summary: Get a request by id (with approval steps)
      description: Returns the request and its full approval step history. Fields `amount`/`payload`/`reason` may be omitted per role field-permissions.
      security:
        - bearerJWT: []
      responses:
        "200":
          description: The request with steps
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RequestDetail" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/requests/{id}/approve:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [Requests]
      operationId: approveRequest
      summary: Approve a pending request
      description: Moves the request to the next approval step or marks it approved when all steps pass. Requires the `request.decide` permission.
      security:
        - bearerJWT: []
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DecideRequest" }
      responses:
        "200":
          description: Updated request
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Request" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "409":
          description: Request is not in a state that allows approval
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/requests/{id}/reject:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [Requests]
      operationId: rejectRequest
      summary: Reject a pending request
      description: Marks the request as rejected at the current step. Requires the `request.decide` permission.
      security:
        - bearerJWT: []
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DecideRequest" }
      responses:
        "200":
          description: Updated request
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Request" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "409":
          description: Request is not in a state that allows rejection
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/requests/{id}/cancel:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [Requests]
      operationId: cancelRequest
      summary: Cancel a request (maker only)
      description: Cancels the request. Only the original maker may cancel, and only while the request is still pending.
      security:
        - bearerJWT: []
      responses:
        "200":
          description: Cancelled request
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Request" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "409":
          description: Request cannot be cancelled in its current state
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/approval-thresholds:
    get:
      tags: [Approval Thresholds]
      operationId: listThresholds
      summary: List approval thresholds
      description: Returns all configured approval thresholds. Requires the `approval.config.manage` permission.
      security:
        - bearerJWT: []
      responses:
        "200":
          description: All thresholds
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ThresholdList" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [Approval Thresholds]
      operationId: createThreshold
      summary: Create an approval threshold
      description: Requires the `approval.config.manage` permission.
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ThresholdRequest" }
      responses:
        "201":
          description: Created threshold
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Threshold" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Duplicate threshold configuration
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/approval-thresholds/preview:
    get:
      tags: [Approval Thresholds]
      operationId: previewThresholdChain
      summary: Preview the approval chain for a request type and amount
      description: |
        Resolves the approval chain the engine would build for the given `request_type` and
        `amount` without creating anything — used by submit-side UIs to show the maker the
        chain their request will follow before they submit it. Only step order and required
        level are returned (band amounts are not exposed to non-admin callers). Requires the
        `request.create` permission.
      security:
        - bearerJWT: []
      parameters:
        - name: request_type
          in: query
          required: true
          schema:
            type: string
            enum: [asset_create, asset_disposal, asset_transfer, assignment, maintenance, valuation_exclusion]
        - name: amount
          in: query
          required: true
          schema: { type: string }
          description: IDR decimal string.
      responses:
        "200":
          description: The resolved approval chain
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ThresholdPreview" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422":
          description: No threshold band configured for this request type/amount
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/approval-thresholds/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    put:
      tags: [Approval Thresholds]
      operationId: updateThreshold
      summary: Update an approval threshold
      description: |
        Replaces mutable threshold fields (`amount_from`, `amount_to`, `required_level`,
        `step_order`, `is_active`). `request_type` is immutable after creation.
        Requires the `approval.config.manage` permission.
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ThresholdRequest" }
      responses:
        "200":
          description: Updated threshold
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Threshold" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    delete:
      tags: [Approval Thresholds]
      operationId: deleteThreshold
      summary: Delete an approval threshold
      description: Requires the `approval.config.manage` permission.
      security:
        - bearerJWT: []
      responses:
        "204": { description: Deleted }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/transfers:
    post:
      tags: [Transfers]
      operationId: submitTransfer
      summary: Submit an inter-office asset transfer (mutasi)
      description: |
        Creates an `asset_transfer` approval request for moving an asset to another office
        (and optionally a specific room). A `transfers` row is only created once the request
        is approved — see `POST /requests/{id}/approve`. Requires the `transfer.manage`
        permission.
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TransferSubmitRequest" }
      responses:
        "201":
          description: Created approval request for the transfer
          content:
            application/json:
              schema:
                type: object
                required: [request_id, status]
                properties:
                  request_id: { type: string, format: uuid }
                  status:
                    type: string
                    enum: [pending, approved, rejected, cancelled]
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422":
          description: Asset already in transit, source and destination office are the same, or an invalid reference was supplied
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    get:
      tags: [Transfers]
      operationId: listTransfers
      summary: List asset transfers (data-scoped)
      description: |
        Returns transfers within the caller's **data scope** (module `transfers`).
        Requires the `transfer.view` permission.
      security:
        - bearerJWT: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [approved, in_transit, received]
          description: Filter by transfer status.
        - { name: limit, in: query, schema: { type: integer, default: 20, minimum: 1, maximum: 100 } }
        - { name: offset, in: query, schema: { type: integer, default: 0, minimum: 0 } }
      responses:
        "200":
          description: A page of transfers in scope
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TransferList" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/transfers/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Transfers]
      operationId: getTransfer
      summary: Get a transfer by id
      description: Requires the `transfer.view` permission; the transfer must be within the caller's data scope.
      security:
        - bearerJWT: []
      responses:
        "200": { description: The transfer, content: { application/json: { schema: { $ref: "#/components/schemas/Transfer" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { description: Not found, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /api/v1/transfers/{id}/ship:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [Transfers]
      operationId: shipTransfer
      summary: Mark an approved transfer as shipped (in_transit)
      description: |
        Transitions the transfer from `approved` to `in_transit`. Requires the
        `transfer.manage` permission; the transfer's origin office must be within the
        caller's data scope.
      security:
        - bearerJWT: []
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TransferShipRequest" }
      responses:
        "200":
          description: Updated transfer
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Transfer" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "409":
          description: Transfer is not `approved`, so it cannot be shipped
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/transfers/{id}/receive:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [Transfers]
      operationId: receiveTransfer
      summary: Mark an in-transit transfer as received and relocate the asset
      description: |
        Transitions the transfer from `in_transit` to `received`, atomically moving the asset
        to `to_office_id` (and `to_room_id`, if supplied here or overriding the one submitted
        with the request). Also creates a `bast_transfer` asset-document record and, if a
        `file` part is supplied, stores it in object storage (best-effort — a storage failure
        does not roll back the receive). Requires the `transfer.manage` permission; the
        transfer's destination office must be within the caller's data scope.
      security:
        - bearerJWT: []
      requestBody:
        required: false
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                bast_no:
                  type: string
                  description: BAST (berita acara serah terima) document number.
                received_date:
                  type: string
                  format: date
                  description: 'Defaults to today if omitted. Format: YYYY-MM-DD.'
                to_room_id:
                  type: string
                  format: uuid
                  description: Overrides the room submitted with the original request, if provided.
                file:
                  type: string
                  format: binary
                  description: Optional scanned BAST file, attached to the created bast_transfer document.
      responses:
        "200":
          description: Updated (received) transfer
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Transfer" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "409":
          description: Transfer is not `in_transit`, so it cannot be received
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/transfers/{id}/reject-receive:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [Transfers]
      operationId: rejectReceiveTransfer
      summary: Decline an in-transit shipment (terminal status returned)
      description: |
        The destination office declines an `in_transit` shipment: the transfer terminates
        with status `returned` (409 when the transfer is not `in_transit`), recording an
        optional note. The asset never moved and remains at the origin (from) office.
        Requires the `transfer.manage` permission; the transfer's destination office must
        be within the caller's data scope.
      security:
        - bearerJWT: []
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RejectReceiveRequest" }
      responses:
        "200":
          description: Updated transfer with returned status
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Transfer" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "409":
          description: Transfer is not in a state that allows rejection
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/assets/{id}/transfers:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid }, description: Asset id }
    get:
      tags: [Transfers]
      operationId: listAssetTransfers
      summary: List transfer history for an asset
      description: Returns all transfers for the given asset within the caller's data scope. Requires the `transfer.view` permission.
      security:
        - bearerJWT: []
      responses:
        "200":
          description: Transfer history
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/Transfer" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Asset not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/assignments:
    post:
      tags: [Assignments]
      operationId: checkoutAssignment
      summary: Directly check-out an asset to an employee (Manager)
      description: |
        Creates an active `assignments` row immediately (no approval workflow).
        Requires the `assignment.manage` permission; the asset must be within the
        caller's data scope and currently available (not already actively assigned).
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AssignmentCheckoutRequest" }
      responses:
        "201":
          description: Created (active) assignment
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Assignment" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Asset or employee not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "409":
          description: Asset is already actively assigned
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422":
          description: Asset not available for assignment, or an invalid reference was supplied
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    get:
      tags: [Assignments]
      operationId: listAssignments
      summary: List asset assignments (data-scoped)
      description: |
        Returns assignments within the caller's **data scope** (module `assignments`).
        Requires the `assignment.view` permission.
      security:
        - bearerJWT: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, returned]
          description: Filter by assignment status.
        - { name: employee_id, in: query, schema: { type: string, format: uuid } }
        - { name: search, in: query, schema: { type: string }, description: Case-insensitive match on asset name/tag or employee name. }
        - { name: limit, in: query, schema: { type: integer, default: 20, minimum: 1, maximum: 100 } }
        - { name: offset, in: query, schema: { type: integer, default: 0, minimum: 0 } }
      responses:
        "200":
          description: A page of assignments in scope
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AssignmentList" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/assignments/available:
    get:
      tags: [Assignments]
      operationId: listAvailableAssignmentAssets
      summary: List assets available for check-out/borrow at the caller's office
      description: |
        Returns a lightweight picker list (id, asset_tag, name) of not-currently-assigned
        assets at the caller's own office, for use by the checkout/borrow forms. Requires
        the `request.create` permission. Returns an empty list if the caller has no linked
        office.
      security:
        - bearerJWT: []
      responses:
        "200":
          description: Available assets
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      required: [id, asset_tag, name]
                      properties:
                        id: { type: string, format: uuid }
                        asset_tag: { type: string }
                        name: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/assignments/mine:
    get:
      tags: [Assignments]
      operationId: listMyAssignments
      summary: List the caller's own asset assignments
      description: |
        Returns the caller's own assignments (e.g. for the Maintenance module's
        "Laporan Kerusakan" asset picker), optionally filtered by status. The
        employee id is resolved server-side from the caller's own user record —
        it is never taken from the request — so the response can only ever
        contain the caller's own rows. Requires the `request.create` permission
        (the same gate as `/assignments/available` and `/assignments/borrow`),
        **not** `assignment.view`, which a Staf role does not hold. Returns an
        empty list if the caller has no linked employee.
      security:
        - bearerJWT: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, returned]
          description: Filter by assignment status.
      responses:
        "200":
          description: A page of the caller's own assignments
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/Assignment" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/assignments/borrow:
    post:
      tags: [Assignments]
      operationId: borrowAssignment
      summary: Submit a self-service asset borrow request (Staf)
      description: |
        Creates an `assignment` approval request for borrowing an asset. An `assignments`
        row (status `active`) is only created once the request is approved — see
        `POST /requests/{id}/approve`. Requires the `request.create` permission; the
        caller must have a linked employee record (otherwise `422`).
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AssignmentBorrowRequest" }
      responses:
        "201":
          description: Created approval request for the borrow
          content:
            application/json:
              schema:
                type: object
                required: [request_id, status]
                properties:
                  request_id: { type: string, format: uuid }
                  status:
                    type: string
                    enum: [pending, approved, rejected, cancelled]
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422":
          description: Caller has no linked employee, asset not available, or an invalid reference was supplied
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/assignments/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Assignments]
      operationId: getAssignment
      summary: Get an assignment by id
      description: Requires the `assignment.view` permission; the assignment must be within the caller's data scope.
      security:
        - bearerJWT: []
      responses:
        "200": { description: The assignment, content: { application/json: { schema: { $ref: "#/components/schemas/Assignment" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/assignments/{id}/checkin:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [Assignments]
      operationId: checkinAssignment
      summary: Check-in an active assignment (return the asset)
      description: |
        Transitions the assignment from `active` to `returned`, recording the return
        condition and, if `needs_maintenance` is set, flags the asset for maintenance
        follow-up. Requires the `assignment.manage` permission; the assignment must be
        within the caller's data scope.
      security:
        - bearerJWT: []
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AssignmentCheckinRequest" }
      responses:
        "200":
          description: Updated (returned) assignment
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Assignment" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "409":
          description: Assignment is not `active`, so it cannot be checked in
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/assets/{id}/assignments:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid }, description: Asset id }
    get:
      tags: [Assignments]
      operationId: listAssetAssignments
      summary: List assignment history for an asset
      description: Returns all assignments for the given asset within the caller's data scope. Requires the `assignment.view` permission.
      security:
        - bearerJWT: []
      responses:
        "200":
          description: Assignment history
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/Assignment" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Asset not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/disposals:
    post:
      tags: [Disposals]
      operationId: submitDisposal
      summary: Submit an asset disposal (sale, auction, donation, or write-off)
      description: |
        Creates an `asset_disposal` approval request for disposing of an asset. A
        `disposals` row is only created once the request is approved — see
        `POST /requests/{id}/approve`. Requires the `disposal.manage` permission.
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DisposalSubmitRequest" }
      responses:
        "201":
          description: Created approval request for the disposal
          content:
            application/json:
              schema:
                type: object
                required: [request_id, status]
                properties:
                  request_id: { type: string, format: uuid }
                  status:
                    type: string
                    enum: [pending, approved, rejected, cancelled]
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422":
          description: Asset already disposed, already has a pending disposal, or an invalid reference was supplied
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    get:
      tags: [Disposals]
      operationId: listDisposals
      summary: List asset disposals (data-scoped)
      description: |
        Returns disposals within the caller's **data scope** (module `disposals`).
        Requires the `disposal.view` permission.
      security:
        - bearerJWT: []
      parameters:
        - { name: limit, in: query, schema: { type: integer, default: 20, minimum: 1, maximum: 100 } }
        - { name: offset, in: query, schema: { type: integer, default: 0, minimum: 0 } }
      responses:
        "200":
          description: A page of disposals in scope
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DisposalList" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/disposals/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Disposals]
      operationId: getDisposal
      summary: Get a disposal by id
      description: Requires the `disposal.view` permission; the disposal must be within the caller's data scope.
      security:
        - bearerJWT: []
      responses:
        "200": { description: The disposal, content: { application/json: { schema: { $ref: "#/components/schemas/Disposal" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { description: Not found, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /api/v1/disposals/{id}/document:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [Disposals]
      operationId: attachDisposalDocument
      summary: Attach the BAST (berita acara serah terima) document for a disposal
      description: |
        Creates a `bast_disposal` asset-document record for the disposal and, if a `file`
        part is supplied, stores it in object storage (best-effort — a storage failure does
        not fail the metadata creation). If `bast_no` is supplied, it is also persisted on
        the disposal. Requires the `disposal.manage` permission; the disposal must be within
        the caller's data scope.
      security:
        - bearerJWT: []
      requestBody:
        required: false
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                bast_no:
                  type: string
                  description: BAST (berita acara serah terima) document number.
                doc_no:
                  type: string
                  description: Document number, if different from bast_no.
                doc_date:
                  type: string
                  format: date
                  description: 'Format: YYYY-MM-DD.'
                counterparty:
                  type: string
                  description: The buyer/recipient/auction house, as applicable to the disposal method.
                file:
                  type: string
                  format: binary
                  description: Optional scanned BAST file, attached to the created bast_disposal document.
      responses:
        "200":
          description: Created document reference
          content:
            application/json:
              schema:
                type: object
                required: [document_id, disposal_id]
                properties:
                  document_id: { type: string, format: uuid }
                  disposal_id: { type: string, format: uuid }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/assets/{id}/disposal:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid }, description: Asset id }
    get:
      tags: [Disposals]
      operationId: listAssetDisposals
      summary: List disposal history for an asset
      description: Returns all disposals for the given asset within the caller's data scope. Requires the `disposal.view` permission.
      security:
        - bearerJWT: []
      responses:
        "200":
          description: Disposal history
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/Disposal" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Asset not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/depreciation/periods:
    get:
      tags: [Depreciation]
      operationId: listDepreciationPeriods
      summary: List depreciation periods
      description: |
        Returns every persisted period (newest first), plus a synthetic current-calendar-
        month row with `status: open` when it has never been computed. Requires the
        `depreciation.view` permission.
      security:
        - bearerJWT: []
      responses:
        "200":
          description: Depreciation periods
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/DepreciationPeriod" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/depreciation/periods/{period}/compute:
    parameters:
      - { name: period, in: path, required: true, schema: { type: string, pattern: '^\d{4}-(0[1-9]|1[0-2])$' }, description: 'Format: YYYY-MM.' }
    post:
      tags: [Depreciation]
      operationId: computeDepreciationPeriod
      summary: Compute (or recompute) a depreciation period
      description: |
        Idempotent: regenerates every non-closed depreciation entry (strictly after the
        closed watermark, through the target period) for every eligible asset, on BOTH
        bases (commercial PSAK 16 and fiscal PMK 72/2023), and upserts the period to
        `computed`. Safe to re-run while the period is not yet closed. Requires the
        `depreciation.manage` permission.
      security:
        - bearerJWT: []
      responses:
        "200":
          description: The computed period
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DepreciationPeriod" }
        "400":
          description: Malformed `period` path parameter (expected YYYY-MM)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: The period is already closed (immutable)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422":
          description: The period is at or before the closed watermark and cannot be (re)computed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/depreciation/periods/{period}/close:
    parameters:
      - { name: period, in: path, required: true, schema: { type: string, pattern: '^\d{4}-(0[1-9]|1[0-2])$' }, description: 'Format: YYYY-MM.' }
    post:
      tags: [Depreciation]
      operationId: closeDepreciationPeriod
      summary: Close a computed depreciation period
      description: |
        Finalizes a `computed` period as `closed`, making its entries immutable — no later
        compute will ever regenerate them. Only allowed from `computed`, and only when every
        earlier period that has a row is already `closed` (sequential close). Requires the
        `depreciation.manage` permission.
      security:
        - bearerJWT: []
      responses:
        "200":
          description: The closed period
          content:
            application/json:
              schema:
                type: object
                required: [period, status]
                properties:
                  period: { type: string, description: 'Format: YYYY-MM.' }
                  status: { type: string, enum: [closed] }
        "400":
          description: Malformed `period` path parameter (expected YYYY-MM)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: The period is already closed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422":
          description: The period has never been computed (no row, or still `open`), or an earlier period has not been closed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/depreciation/schedule:
    get:
      tags: [Depreciation]
      operationId: getDepreciationSchedule
      summary: Get the per-asset depreciation schedule for a period
      description: |
        Rows are the union of (a) entries actually posted for the period and (b) capitalized,
        parameterized assets with no entry this period because they were already fully
        depreciated earlier (rendered with `fully_depreciated: true`, `amount: "0.00"`).
        Scoped to the caller's offices (data-scope module `depreciation`); `category_id` and
        `office_id` are additional exact-match filters on top of that scope, and `search`
        matches asset name/tag case-insensitively. Requires the `depreciation.view` permission.
      security:
        - bearerJWT: []
      parameters:
        - { name: period, in: query, required: true, schema: { type: string, pattern: '^\d{4}-(0[1-9]|1[0-2])$' }, description: 'Required. Format: YYYY-MM.' }
        - { name: basis, in: query, schema: { type: string, enum: [commercial, fiscal], default: commercial }, description: Depreciation basis. Defaults to commercial when omitted. }
        - { name: search, in: query, schema: { type: string }, description: Case-insensitive match on asset name/tag. }
        - { name: category_id, in: query, schema: { type: string, format: uuid } }
        - { name: office_id, in: query, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: The schedule for the requested period/basis
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DepreciationScheduleResponse" }
        "400":
          description: Malformed `period`, `basis`, `category_id`, or `office_id`
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/depreciation/journal:
    get:
      tags: [Depreciation]
      operationId: getDepreciationJournal
      summary: Get the depreciation general-ledger journal entry for a period
      description: |
        One debit row per distinct category GL account ("Beban Penyusutan — {category}";
        categories with no configured GL account fold into a single "(tanpa akun GL)" row),
        and one credit row for the configured accumulated-depreciation GL account
        (`app_settings` key `depreciation.accumulated_gl_account`). Always balances by
        construction. Scoped to the caller's offices (data-scope module `depreciation`).
        Requires the `depreciation.view` permission.
      security:
        - bearerJWT: []
      parameters:
        - { name: period, in: query, required: true, schema: { type: string, pattern: '^\d{4}-(0[1-9]|1[0-2])$' }, description: 'Required. Format: YYYY-MM.' }
        - { name: basis, in: query, schema: { type: string, enum: [commercial, fiscal], default: commercial }, description: Depreciation basis. Defaults to commercial when omitted. }
      responses:
        "200":
          description: The journal entry for the requested period/basis
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DepreciationJournalResponse" }
        "400":
          description: Malformed `period` or `basis`
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/depreciation/journal/export:
    get:
      tags: [Depreciation]
      operationId: exportDepreciationJournal
      summary: Download the depreciation journal as xlsx or PDF
      description: |
        Renders the identical journal as `GET /depreciation/journal`, as a downloadable file
        instead of JSON. Streams with `Content-Disposition: attachment` and
        `X-Content-Type-Options: nosniff`. Gated by the same `depreciation.view` permission
        and `depreciation` data scope as the plain journal endpoint.
      security:
        - bearerJWT: []
      parameters:
        - { name: period, in: query, required: true, schema: { type: string, pattern: '^\d{4}-(0[1-9]|1[0-2])$' }, description: 'Required. Format: YYYY-MM.' }
        - { name: basis, in: query, schema: { type: string, enum: [commercial, fiscal], default: commercial }, description: Depreciation basis. Defaults to commercial when omitted. }
        - { name: format, in: query, required: true, schema: { type: string, enum: [xlsx, pdf] } }
      responses:
        "200":
          description: Journal file
          content:
            application/pdf:
              schema: { type: string, format: binary }
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema: { type: string, format: binary }
        "400":
          description: Malformed `period`, `basis`, or `format`
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/assets/{id}/depreciation:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid }, description: Asset id }
    get:
      tags: [Depreciation]
      operationId: getAssetDepreciation
      summary: Get one asset's full depreciation history and current book value
      description: |
        Returns every posted entry (both bases) plus the asset's current computed
        (commercial) book value. Requires the `asset.view` permission; the asset must be
        within the caller's data scope (module `assets`, same as the asset module). When the
        caller's role is denied view on `assets.book_value`, the response is masked:
        `masked: true`, `computed_book_value: null`, `entries: []`.
      security:
        - bearerJWT: []
      responses:
        "200":
          description: The asset's depreciation history (or a masked response — see description)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AssetDepreciationResponse" }
        "400":
          description: Malformed `id`
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Asset not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/assets/{id}/impairment:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid }, description: Asset id }
    post:
      tags: [Depreciation]
      operationId: recordAssetImpairment
      summary: Record an impairment write-down for an asset (PSAK 48)
      description: |
        Writes the asset's book value down to a tested recoverable amount:
        `impairment_loss` accumulates the shortfall (previous book value minus
        `recoverable_amount`) and `book_value` drops to `recoverable_amount`. Does not post
        a depreciation entry — impairment is a separate loss, not a depreciation expense; the
        next period compute resumes depreciation from the lower book value. Requires the
        `depreciation.manage` permission; the asset must be within the caller's data scope
        (module `depreciation`).
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ImpairmentRequest" }
      responses:
        "200":
          description: The asset's updated money fields
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ImpairmentResponse" }
        "400":
          description: Malformed `id`, request body, or `recoverable_amount`
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Asset not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422":
          description: The asset has no computed book value yet, or `recoverable_amount` is negative or not strictly below the current book value
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/authz/catalog:
    get:
      tags: [Authorization Admin]
      operationId: getAuthzCatalog
      summary: Get the canonical authorization catalog
      description: |
        Returns the complete set of assignable permission keys (grouped for the admin UI),
        valid data-scope levels, and known scope-module strings. Used to drive the
        Peran & RBAC / Data Scope / Field Permission admin screens.
        Requires the `role.manage` permission.
      security:
        - bearerJWT: []
      responses:
        "200":
          description: The authorization catalog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthzCatalog"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/authz/roles:
    get:
      tags: [Authorization Admin]
      operationId: listRoles
      summary: List roles
      description: Returns all non-deleted roles. Requires the `role.manage` permission.
      security:
        - bearerJWT: []
      responses:
        "200":
          description: All roles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleList"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [Authorization Admin]
      operationId: createRole
      summary: Create a role
      description: Creates a new non-system role. Requires the `role.manage` permission.
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleCreateRequest"
      responses:
        "201":
          description: Created role
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Role" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Duplicate role code
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/authz/roles/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Authorization Admin]
      operationId: getRole
      summary: Get a role by id
      description: Requires the `role.manage` permission.
      security:
        - bearerJWT: []
      responses:
        "200":
          description: The role
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Role" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    put:
      tags: [Authorization Admin]
      operationId: updateRole
      summary: Update a role (full replace of mutable fields)
      description: |
        Replaces `code`, `name`, and `description`. System roles (`is_system: true`)
        cannot be updated and return 409. Requires the `role.manage` permission.
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleUpdateRequest"
      responses:
        "200":
          description: Updated role
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Role" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "409":
          description: Duplicate code or attempt to mutate a system role
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    delete:
      tags: [Authorization Admin]
      operationId: deleteRole
      summary: Soft-delete a role
      description: |
        Marks the role deleted. System roles (`is_system: true`) and roles still
        assigned to any user cannot be deleted (both return 409).
        Requires the `role.manage` permission.
      security:
        - bearerJWT: []
      responses:
        "204": { description: Deleted }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "409":
          description: System role or role is still assigned to one or more users
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/authz/roles/{id}/permissions:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Authorization Admin]
      operationId: getRolePermissions
      summary: Get the permission keys assigned to a role
      description: Requires the `role.manage` permission.
      security:
        - bearerJWT: []
      responses:
        "200":
          description: Permission set for this role
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PermissionSet" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Role not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    put:
      tags: [Authorization Admin]
      operationId: setRolePermissions
      summary: Replace the full permission set of a role
      description: |
        Atomically replaces all `role_permissions` rows for this role with the
        supplied list (replace-set semantics). Deduplicates the input. All keys
        must be in the canonical catalog; unknown keys return 400.
        Invalidates the Redis RBAC cache for this role.
        Requires the `role.manage` permission.
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PermissionSet"
      responses:
        "200":
          description: Updated permission set
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PermissionSet" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Role not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/authz/roles/{id}/scope:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Authorization Admin]
      operationId: getRoleScope
      summary: Get the data-scope policies for a role
      description: Requires the `scope.manage` permission.
      security:
        - bearerJWT: []
      responses:
        "200":
          description: Scope-policy set for this role
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ScopePolicySet" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Role not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    put:
      tags: [Authorization Admin]
      operationId: setRoleScope
      summary: Replace the full data-scope policy set of a role
      description: |
        Atomically replaces all `data_scope_policies` rows for this role with the
        supplied list (replace-set semantics). `scope_level` must be one of the
        values returned by `GET /authz/catalog` (`scope_levels`); `module` must be
        one of the `scope_modules` values or `*` (the default catch-all).
        Invalidates the Redis scope cache for this role.
        Requires the `scope.manage` permission.
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScopePolicySet"
      responses:
        "200":
          description: Updated scope-policy set
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ScopePolicySet" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Role not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/authz/roles/{id}/fields:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Authorization Admin]
      operationId: getRoleFields
      summary: Get the field-permission entries for a role
      description: Requires the `fieldperm.manage` permission.
      security:
        - bearerJWT: []
      responses:
        "200":
          description: Field-permission set for this role
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FieldPermissionSet" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Role not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    put:
      tags: [Authorization Admin]
      operationId: setRoleFields
      summary: Replace the full field-permission set of a role
      description: |
        Atomically replaces all `field_permissions` rows for this role with the
        supplied list (replace-set semantics). Each entry identifies an `(entity, field)`
        pair with `can_view` and `can_edit` booleans. The default policy is allow-all —
        only entries that restrict access need to be included, but supplying a full
        explicit set is valid and idiomatic.
        Invalidates the Redis field-permission cache for this role.
        Requires the `fieldperm.manage` permission.
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FieldPermissionSet"
      responses:
        "200":
          description: Updated field-permission set
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FieldPermissionSet" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Role not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/audit:
    get:
      tags: [Audit]
      operationId: listAuditLogs
      summary: List audit-trail entries
      description: |
        Read-only audit log, newest first. Requires the `audit.view` permission.
        Results are office-scoped to the caller (global-scope callers see all rows,
        including global/no-office actions).
      security:
        - bearerJWT: []
      parameters:
        - name: search
          in: query
          schema: { type: string }
          description: Filter by entity type or entity id (case-insensitive).
        - name: actor_id
          in: query
          schema: { type: string, format: uuid }
          description: Filter by the acting user.
        - name: entity_type
          in: query
          schema: { type: string }
          description: Filter by entity type (e.g. `offices`, `users`, `brands`).
        - name: action
          in: query
          schema: { type: string, enum: [create, update, delete] }
        - name: from
          in: query
          schema: { type: string, format: date-time }
          description: Only entries at or after this time (RFC3339).
        - name: to
          in: query
          schema: { type: string, format: date-time }
          description: Only entries at or before this time (RFC3339).
        - name: limit
          in: query
          schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
        - name: offset
          in: query
          schema: { type: integer, default: 0, minimum: 0 }
      responses:
        "200":
          description: A page of audit entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditList"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/stock-opname/sessions:
    get:
      tags: [Stock Opname]
      operationId: listStockOpnameSessions
      summary: List stock-opname sessions (data-scoped)
      description: |
        Returns sessions within the caller's **data scope** (module `stockopname`),
        newest first. Requires the `stockopname.view` permission.
      security:
        - bearerJWT: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [open, counting, reconciling, closed]
          description: Filter by session status.
        - { name: limit, in: query, schema: { type: integer, default: 20, minimum: 1, maximum: 100 } }
        - { name: offset, in: query, schema: { type: integer, default: 0, minimum: 0 } }
      responses:
        "200":
          description: A page of sessions in scope
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StockOpnameSessionList" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [Stock Opname]
      operationId: createStockOpnameSession
      summary: Open a new stock-opname session
      description: |
        Opens a session with status `open` and atomically snapshots every
        in-scope, non-disposed asset of `office_id` into its item list.
        Requires the `stockopname.manage` permission; `office_id` must be
        within the caller's data scope.
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StockOpnameSessionCreateRequest" }
      responses:
        "201":
          description: Created session
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StockOpnameSession" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422":
          description: Invalid reference was supplied (e.g. unknown office_id)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/stock-opname/sessions/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Stock Opname]
      operationId: getStockOpnameSession
      summary: Get a stock-opname session by id, with KPI counters
      description: |
        Returns the session enriched with resolved office/started-by/closed-by
        display names, plus item-result KPI counters (`total`, `found`,
        `pending`, `variance`). Requires the `stockopname.view` permission;
        the session must be within the caller's data scope.
      security:
        - bearerJWT: []
      responses:
        "200": { description: The session, content: { application/json: { schema: { $ref: "#/components/schemas/StockOpnameSession" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { description: Not found, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /api/v1/stock-opname/sessions/{id}/items:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Stock Opname]
      operationId: listStockOpnameItems
      summary: List a session's items
      description: |
        Returns the session's items (enriched with asset/office/room/floor/
        counted-by display names), ordered by asset name. Requires the
        `stockopname.view` permission; the session must be within the
        caller's data scope.
      security:
        - bearerJWT: []
      parameters:
        - name: result
          in: query
          schema:
            type: string
            enum: [found, not_found, damaged, misplaced, pending]
          description: Filter by counted result.
      responses:
        "200":
          description: The session's items (unpaginated; limit/offset reflect the full result count)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StockOpnameItemList" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { description: Session not found, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /api/v1/stock-opname/sessions/{id}/start:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [Stock Opname]
      operationId: startStockOpnameSession
      summary: Start counting (open → counting)
      description: |
        Transitions the session from `open` to `counting`. Requires the
        `stockopname.manage` permission; the session must be within the
        caller's data scope.
      security:
        - bearerJWT: []
      responses:
        "200":
          description: Updated session
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StockOpnameSession" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "409":
          description: Session is not `open`, so counting cannot start
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/stock-opname/sessions/{id}/scan:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [Stock Opname]
      operationId: scanStockOpnameAsset
      summary: Resolve a scanned barcode/asset tag against a counting session
      description: |
        Looks up `asset_tag` against the session's items: if it is already in
        the snapshot, returns the existing item unchanged; otherwise, for an
        in-scope asset not in the snapshot, inserts and returns a new item
        with `expected: false` (an "unexpected" find). Only allowed while the
        session is `counting`. Requires the `stockopname.manage` permission;
        the session must be within the caller's data scope.
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StockOpnameScanRequest" }
      responses:
        "200":
          description: The resolved item (existing or newly inserted)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StockOpnameScanResult" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Session not found, or no asset exists with this asset_tag
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "409":
          description: Session is not `counting`, so scanning is not allowed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/stock-opname/sessions/{id}/items/{itemId}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: itemId, in: path, required: true, schema: { type: string, format: uuid } }
    patch:
      tags: [Stock Opname]
      operationId: setStockOpnameItemResult
      summary: Record a counted result for one item
      description: |
        Sets the item's `result` (and optional `note`), stamping
        `counted_by_id`/`counted_at`. Only allowed while the session is
        `counting`. Requires the `stockopname.manage` permission; the session
        must be within the caller's data scope.
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StockOpnameSetResultRequest" }
      responses:
        "200":
          description: Updated item
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StockOpnameItemResultResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Session or item not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "409":
          description: Session is not `counting`, so results cannot be recorded
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/stock-opname/sessions/{id}/reconcile:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [Stock Opname]
      operationId: reconcileStockOpnameSession
      summary: Move to reconciliation (counting → reconciling)
      description: |
        Transitions the session from `counting` to `reconciling`. Requires
        the `stockopname.manage` permission; the session must be within the
        caller's data scope.
      security:
        - bearerJWT: []
      responses:
        "200":
          description: Updated session
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StockOpnameSession" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "409":
          description: Session is not `counting`, so it cannot be reconciled
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/stock-opname/sessions/{id}/items/{itemId}/follow-up:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: itemId, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [Stock Opname]
      operationId: followUpStockOpnameItem
      summary: Route a variance item to a disposal/transfer request or a maintenance record
      description: |
        For an item with result `not_found`, submits an `asset_disposal`
        (`write_off`) approval request. For `misplaced`, submits an
        `asset_transfer` approval request to `to_office_id` (required; and
        optional `to_room_id`); both reuse the disposal/transfer modules' own
        `Submit`, so their asset-scope and state guards also apply. For
        `damaged`, directly creates a scheduled corrective
        `maintenance_records` row for the asset (no approval workflow) —
        `reason` becomes the record's description. Any other result
        (`pending`, `found`) is rejected. An item that already has a
        follow-up request/record is rejected. Requires the
        `stockopname.manage` permission; the session must be within the
        caller's data scope.
      security:
        - bearerJWT: []
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StockOpnameFollowupRequest" }
      responses:
        "200":
          description: Created follow-up reference (approval request for not_found/misplaced, maintenance record for damaged)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StockOpnameFollowupResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Session or item not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "409":
          description: |
            Item result does not allow a follow-up (`pending`/`found`),
            or the item already has a follow-up request/record, or the underlying
            disposal/transfer is in a conflicting state (e.g. asset already
            disposed or in transit)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422":
          description: Invalid reference was supplied (e.g. missing/unknown to_office_id for a misplaced item)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/stock-opname/sessions/{id}/close:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [Stock Opname]
      operationId: closeStockOpnameSession
      summary: Close the session (reconciling → closed)
      description: |
        Transitions the session from `reconciling` to `closed`, stamping
        `closed_by_id`/`closed_at`. Requires the `stockopname.manage`
        permission; the session must be within the caller's data scope.
      security:
        - bearerJWT: []
      responses:
        "200":
          description: Updated (closed) session
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StockOpnameSession" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "409":
          description: Session is not `reconciling`, so it cannot be closed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/maintenance/schedules:
    get:
      tags: [Maintenance]
      operationId: listMaintenanceSchedules
      summary: List preventive maintenance schedules (data-scoped)
      description: |
        Returns schedules within the caller's data scope (module `maintenance`),
        enriched with asset/office/category display names. Requires the
        `maintenance.view` permission.
      security:
        - bearerJWT: []
      parameters:
        - { name: is_active, in: query, schema: { type: string, enum: ["true", "false"] }, description: Filter by active status. }
        - { name: limit, in: query, schema: { type: integer, default: 20, minimum: 1, maximum: 100 } }
        - { name: offset, in: query, schema: { type: integer, default: 0, minimum: 0 } }
      responses:
        "200":
          description: A page of schedules in scope
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaintenanceScheduleList" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [Maintenance]
      operationId: createMaintenanceSchedule
      summary: Create a preventive maintenance schedule for an asset
      description: |
        Requires the `maintenance.manage` permission; the asset must be within
        the caller's data scope and not disposed/lost. `start_date` seeds the
        first `next_due_date`.
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MaintenanceCreateScheduleRequest" }
      responses:
        "201":
          description: Created schedule
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaintenanceSchedule" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Asset not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422":
          description: Asset is disposed/lost, `interval_months` < 1, `start_date` is invalid, or an invalid reference was supplied
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/maintenance/schedules/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    patch:
      tags: [Maintenance]
      operationId: updateMaintenanceSchedule
      summary: Update a maintenance schedule
      description: |
        Requires the `maintenance.manage` permission; the schedule must be
        within the caller's data scope. When `interval_months` changes and the
        schedule already has a `last_done_date`, `next_due_date` is
        recomputed from it.
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MaintenanceUpdateScheduleRequest" }
      responses:
        "200":
          description: Updated schedule
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaintenanceSchedule" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422":
          description: '`interval_months` < 1'
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    delete:
      tags: [Maintenance]
      operationId: deleteMaintenanceSchedule
      summary: Soft-delete a maintenance schedule
      description: Requires the `maintenance.manage` permission; the schedule must be within the caller's data scope.
      security:
        - bearerJWT: []
      responses:
        "204": { description: Deleted }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/maintenance/records:
    get:
      tags: [Maintenance]
      operationId: listMaintenanceRecords
      summary: List maintenance records (data-scoped)
      description: |
        Returns records within the caller's data scope (module `maintenance`),
        enriched with asset/office/category/problem/vendor/reporter display
        names. Requires the `maintenance.view` permission.
      security:
        - bearerJWT: []
      parameters:
        - { name: status, in: query, schema: { type: string, enum: [scheduled, in_progress, completed, cancelled] } }
        - { name: type, in: query, schema: { type: string, enum: [preventive, corrective] } }
        - { name: q, in: query, schema: { type: string }, description: Case-insensitive search across asset name/tag and description. }
        - { name: limit, in: query, schema: { type: integer, default: 20, minimum: 1, maximum: 100 } }
        - { name: offset, in: query, schema: { type: integer, default: 0, minimum: 0 } }
      responses:
        "200":
          description: A page of records in scope
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaintenanceRecordList" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [Maintenance]
      operationId: createMaintenanceRecord
      summary: Create a maintenance record (preventive or corrective)
      description: |
        Requires the `maintenance.manage` permission; the asset must be within
        the caller's data scope and not disposed/lost. When the resulting
        status is `in_progress`, the asset is flagged `under_maintenance`
        (rejected with 422 if it is currently `in_transfer`); when it lands on
        `completed`, a linked schedule's `last_done_date`/`next_due_date` are
        advanced and the asset is released back to `available` if this was its
        last active record.
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MaintenanceCreateRecordRequest" }
      responses:
        "201":
          description: Created record
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaintenanceRecord" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Asset or schedule not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422":
          description: |
            Asset is disposed/lost, in transfer (when transitioning to
            `in_progress`), the schedule belongs to another asset, or an
            invalid reference/date was supplied
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/maintenance/records/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Maintenance]
      operationId: getMaintenanceRecord
      summary: Get an enriched maintenance record by id
      description: Requires the `maintenance.view` permission; the record must be within the caller's data scope.
      security:
        - bearerJWT: []
      responses:
        "200": { description: The record, content: { application/json: { schema: { $ref: "#/components/schemas/MaintenanceRecord" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    patch:
      tags: [Maintenance]
      operationId: updateMaintenanceRecord
      summary: Update a maintenance record (status transition + fields)
      description: |
        Requires the `maintenance.manage` permission; the record must be
        within the caller's data scope. `completed`/`cancelled` records are
        terminal (409). Valid transitions: `scheduled` → any of
        `scheduled|in_progress|completed|cancelled`; `in_progress` →
        `in_progress|completed|cancelled`. Status effects (asset
        under_maintenance/available, schedule last_done/next_due) are applied
        the same way as on create.
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MaintenanceUpdateRecordRequest" }
      responses:
        "200":
          description: Updated record
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MaintenanceRecord" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "409":
          description: Record is `completed`/`cancelled` (terminal), or the requested status transition is invalid
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422":
          description: Asset is in transfer (when transitioning to `in_progress`), or an invalid reference/date was supplied
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/maintenance/attention:
    get:
      tags: [Maintenance]
      operationId: listMaintenanceAttention
      summary: List assets needing maintenance follow-up ("Perlu Tindak Lanjut")
      description: |
        Returns `under_maintenance` assets (within the caller's data scope)
        that have no active (non-terminal) maintenance record — e.g. flagged
        by an assignment check-in's `needs_maintenance` but not yet followed
        up with a record. Requires the `maintenance.view` permission.
      security:
        - bearerJWT: []
      responses:
        "200":
          description: Assets awaiting a maintenance record
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/MaintenanceAttentionItem" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/maintenance/reports:
    post:
      tags: [Maintenance]
      operationId: submitMaintenanceReport
      summary: Submit a self-service damage report (Staf)
      description: |
        Creates a `maintenance`-type approval request for a reported problem
        on an asset, with an optional photo uploaded as an asset attachment.
        A maintenance record is only created once the request is approved —
        see `POST /requests/{id}/approve`. Requires the `request.create`
        permission; the asset must be within the caller's data scope and not
        disposed/lost. Duplicate-guarded: rejected if the caller already has a
        pending report for this asset. The request body is capped at the same
        size limit as asset attachments; an oversize body is rejected with 413
        before the form is parsed.
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [asset_id, problem_category_id]
              properties:
                asset_id: { type: string, format: uuid }
                problem_category_id: { type: string, format: uuid }
                description:
                  type: [string, "null"]
                  description: Optional problem description.
                photo:
                  type: string
                  format: binary
                  description: Optional photo of the reported problem.
      responses:
        "201":
          description: Created approval request for the report
          content:
            application/json:
              schema:
                type: object
                required: [request_id, status]
                properties:
                  request_id: { type: string, format: uuid }
                  status:
                    type: string
                    enum: [pending, approved, rejected, cancelled]
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Asset not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "409":
          description: A pending report already exists for this asset (from this caller)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "413":
          description: Request body too large
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422":
          description: Asset is disposed/lost, or the uploaded photo is unsupported/too large
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/assets/{id}/maintenance:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid }, description: Asset id }
    get:
      tags: [Maintenance]
      operationId: listAssetMaintenance
      summary: List maintenance history for an asset
      description: Returns all maintenance records for the given asset within the caller's data scope. Requires the `maintenance.view` permission.
      security:
        - bearerJWT: []
      responses:
        "200":
          description: Maintenance history
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/MaintenanceRecord" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/stock-opname/sessions/{id}/report:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Stock Opname]
      operationId: getStockOpnameReport
      summary: Download the session's Berita Acara as PDF or xlsx
      description: |
        Renders the session (KPI summary + item table) as a downloadable
        Berita Acara Stock Opname. Streams with `Content-Disposition:
        attachment`. Requires the `stockopname.view` permission; the session
        must be within the caller's data scope.
      security:
        - bearerJWT: []
      parameters:
        - { name: format, in: query, schema: { type: string, enum: [pdf, xlsx], default: pdf }, description: Defaults to pdf when omitted. }
      responses:
        "200":
          description: Report file
          content:
            application/pdf:
              schema: { type: string, format: binary }
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema: { type: string, format: binary }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Session not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/search:
    get:
      tags: [Search]
      operationId: globalSearch
      summary: Global search across entities
      description: >
        Returns up to 5 matches per entity group plus the full match count.
        Groups the caller is not authorized for (permission or data scope)
        are omitted silently. Queries shorter than 2 characters return an
        empty groups array. Group order is fixed: assets, employees, offices,
        users, requests.
      security:
        - bearerJWT: []
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string, minLength: 2 }
          description: Search text (min 2 characters after trimming).
      responses:
        "200":
          description: Grouped search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  groups:
                    type: array
                    items: { $ref: "#/components/schemas/SearchGroup" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/dashboard/summary:
    get:
      tags: [Report]
      operationId: getDashboardSummary
      summary: Get the dashboard KPI/breakdown summary (cached)
      description: |
        Returns the KPI tiles (with period-over-period trend deltas), status/category/location
        breakdowns, and the maintenance-due list for the caller's scope. Cached in Redis for
        90 seconds, keyed by role + effective office scope + `office_id` filter + resolved
        period — a request with an identical key inside the window returns the cached
        snapshot instead of recomputing. Use `GET /dashboard/export` when a guaranteed-fresh
        read is required. Requires the `report.view` permission; scoped to the caller's
        offices (data-scope module `report`) unless `office_id` narrows to one in-scope office.
        Exactly one of `period` or the `date_from`+`date_to` pair must be supplied (both or
        neither is a 400).
      security:
        - bearerJWT: []
      parameters:
        - { name: period, in: query, schema: { type: string, enum: [last30, this_month, this_quarter, ytd] }, description: 'Preset window. Mutually exclusive with date_from/date_to; one of the two forms is required.' }
        - { name: date_from, in: query, schema: { type: string, format: date }, description: 'Custom window start (inclusive). Must be paired with date_to; both or neither.' }
        - { name: date_to, in: query, schema: { type: string, format: date }, description: 'Custom window end (inclusive). Must be paired with date_from; both or neither.' }
        - { name: office_id, in: query, schema: { type: string, format: uuid }, description: 'Drill down to one office. Must be within the caller''s data scope (403 otherwise).' }
        - { name: category_id, in: query, schema: { type: string, format: uuid }, description: Filter to one asset category. }
      responses:
        "200":
          description: The dashboard summary
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DashboardSummary" }
        "400":
          description: Malformed `period`, `date_from`/`date_to`, `office_id`, or `category_id`
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/dashboard/export:
    get:
      tags: [Report]
      operationId: exportDashboardSummary
      summary: Download the dashboard summary as xlsx or PDF
      description: |
        Renders the same summary as `GET /dashboard/summary`, always freshly computed
        (bypasses the 90-second cache — an export must never serve a stale snapshot).
        Streams with `Content-Disposition: attachment` and `X-Content-Type-Options: nosniff`.
        Requires the `report.export` permission; same office scope as the JSON summary.
        Exactly one of `period` or the `date_from`+`date_to` pair must be supplied (both or
        neither is a 400).
      security:
        - bearerJWT: []
      parameters:
        - { name: period, in: query, schema: { type: string, enum: [last30, this_month, this_quarter, ytd] }, description: 'Preset window. Mutually exclusive with date_from/date_to; one of the two forms is required.' }
        - { name: date_from, in: query, schema: { type: string, format: date }, description: 'Custom window start (inclusive). Must be paired with date_to; both or neither.' }
        - { name: date_to, in: query, schema: { type: string, format: date }, description: 'Custom window end (inclusive). Must be paired with date_from; both or neither.' }
        - { name: office_id, in: query, schema: { type: string, format: uuid }, description: 'Drill down to one office. Must be within the caller''s data scope (403 otherwise).' }
        - { name: category_id, in: query, schema: { type: string, format: uuid }, description: Filter to one asset category. }
        - { name: format, in: query, required: true, schema: { type: string, enum: [xlsx, pdf] } }
      responses:
        "200":
          description: Dashboard summary file
          content:
            application/pdf:
              schema: { type: string, format: binary }
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema: { type: string, format: binary }
        "400":
          description: Malformed `period`, `date_from`/`date_to`, `office_id`, `category_id`, or `format`
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/reports/{type}:
    parameters:
      - { name: type, in: path, required: true, schema: { type: string, enum: [assets, depreciation, utilization, maintenance, transfers, disposals, opname] }, description: Report type. An unrecognized value is a 400 (not 404). }
    get:
      tags: [Report]
      operationId: getReport
      summary: Get one of the 7 canned reports as JSON (row-capped)
      description: |
        Returns the report's KPI tiles, chart series, row table, and column totals for the
        caller's scope. `rows` is capped at 1000 entries (`truncated: true` when the full
        result set is larger); use `GET /reports/{type}/export` for the effectively-unbounded
        file download. Always computed fresh (no caching). Requires the `report.view`
        permission; scoped to the caller's offices (data-scope module `report`) unless
        `office_id` narrows to one in-scope office. Exactly one of `period` or the
        `date_from`+`date_to` pair must be supplied (both or neither is a 400).
      security:
        - bearerJWT: []
      parameters:
        - { name: period, in: query, schema: { type: string, enum: [last30, this_month, this_quarter, ytd] }, description: 'Preset window. Mutually exclusive with date_from/date_to; one of the two forms is required.' }
        - { name: date_from, in: query, schema: { type: string, format: date }, description: 'Custom window start (inclusive). Must be paired with date_to; both or neither.' }
        - { name: date_to, in: query, schema: { type: string, format: date }, description: 'Custom window end (inclusive). Must be paired with date_from; both or neither.' }
        - { name: office_id, in: query, schema: { type: string, format: uuid }, description: 'Drill down to one office. Must be within the caller''s data scope (403 otherwise).' }
        - { name: category_id, in: query, schema: { type: string, format: uuid }, description: Filter to one asset category. }
        - { name: status, in: query, schema: { type: string, enum: [available, assigned, under_maintenance, in_transfer, retired, disposed, lost] }, description: 'Filters the `assets` report to one status; ignored (no effect) on every other report type.' }
        - { name: basis, in: query, schema: { type: string, enum: [commercial, fiscal], default: commercial }, description: 'Depreciation basis for the `depreciation` report; ignored (no effect) on every other report type. Defaults to commercial when omitted.' }
      responses:
        "200":
          description: The report result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReportResult" }
        "400":
          description: Malformed `type`, `period`, `date_from`/`date_to`, `office_id`, `category_id`, `status`, or `basis`
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /api/v1/reports/{type}/export:
    parameters:
      - { name: type, in: path, required: true, schema: { type: string, enum: [assets, depreciation, utilization, maintenance, transfers, disposals, opname] }, description: Report type. An unrecognized value is a 400 (not 404). }
    get:
      tags: [Report]
      operationId: exportReport
      summary: Download one of the 7 canned reports as xlsx or PDF
      description: |
        Renders the same report as `GET /reports/{type}`, as a downloadable file with the row
        cap lifted (effectively unbounded), always freshly computed. Streams with
        `Content-Disposition: attachment` and `X-Content-Type-Options: nosniff`. The default
        `variant=table` renders the per-type row table (see `ReportResult`); `variant=gl_recap`
        instead renders the disposal general-ledger recap (`GlRecapResult`) and is valid ONLY
        when `type=disposals` — any other type with `variant=gl_recap`, or any `variant` outside
        `table`/`gl_recap`, is a 422. Requires the `report.export` permission; same office scope
        as the JSON report. Exactly one of `period` or the `date_from`+`date_to` pair must be
        supplied (both or neither is a 400).
      security:
        - bearerJWT: []
      parameters:
        - { name: period, in: query, schema: { type: string, enum: [last30, this_month, this_quarter, ytd] }, description: 'Preset window. Mutually exclusive with date_from/date_to; one of the two forms is required.' }
        - { name: date_from, in: query, schema: { type: string, format: date }, description: 'Custom window start (inclusive). Must be paired with date_to; both or neither.' }
        - { name: date_to, in: query, schema: { type: string, format: date }, description: 'Custom window end (inclusive). Must be paired with date_from; both or neither.' }
        - { name: office_id, in: query, schema: { type: string, format: uuid }, description: 'Drill down to one office. Must be within the caller''s data scope (403 otherwise).' }
        - { name: category_id, in: query, schema: { type: string, format: uuid }, description: Filter to one asset category. }
        - { name: status, in: query, schema: { type: string, enum: [available, assigned, under_maintenance, in_transfer, retired, disposed, lost] }, description: 'Filters the `assets` report to one status; ignored (no effect) on every other report type.' }
        - { name: basis, in: query, schema: { type: string, enum: [commercial, fiscal], default: commercial }, description: 'Depreciation basis for the `depreciation` report; ignored (no effect) on every other report type. Defaults to commercial when omitted.' }
        - { name: format, in: query, required: true, schema: { type: string, enum: [xlsx, pdf] } }
        - { name: variant, in: query, schema: { type: string, enum: [table, gl_recap], default: table }, description: '`gl_recap` is valid ONLY for `type=disposals` (422 otherwise).' }
      responses:
        "200":
          description: Report file (row table, or the disposal GL recap when `variant=gl_recap`)
          content:
            application/pdf:
              schema: { type: string, format: binary }
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema: { type: string, format: binary }
        "400":
          description: Malformed `type`, `period`, `date_from`/`date_to`, `office_id`, `category_id`, `status`, `basis`, or `format`
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422":
          description: '`variant` is not `table`/`gl_recap`, or `variant=gl_recap` was requested for a `type` other than `disposals`'
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

components:
  securitySchemes:
    bearerJWT:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    BadRequest:
      description: Malformed request body
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Missing, invalid, or revoked token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Authenticated but lacking the required permission
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    TooManyRequests:
      description: Rate limit exceeded.
      headers:
        Retry-After:
          schema: { type: integer }
          description: Seconds until the client may retry.
        RateLimit-Limit:
          schema: { type: integer }
        RateLimit-Remaining:
          schema: { type: integer }
        RateLimit-Reset:
          schema: { type: integer }
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Human-readable error message
      examples:
        - error: invalid email or password

    Health:
      type: object
      required: [status, service, env]
      properties:
        status:
          type: string
          examples: ["ok"]
        service:
          type: string
          examples: ["inventra-api"]
        env:
          type: string
          examples: ["development"]

    Readiness:
      type: object
      required: [status, checks]
      properties:
        status:
          type: string
          enum: [ready, not_ready]
        checks:
          type: object
          properties:
            postgres:
              type: string
              description: '"ok" or an error message'
            redis:
              type: string
              description: '"ok" or an error message'

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          examples: ["admin@inventra.local"]
        password:
          type: string
          format: password
          minLength: 1
          examples: ["admin12345"]

    TokenResponse:
      type: object
      required: [access_token, token_type, expires_in]
      properties:
        access_token:
          type: string
        token_type:
          type: string
          examples: ["Bearer"]
        expires_in:
          type: integer
          description: Access-token lifetime in seconds
          examples: [900]

    User:
      type: object
      required: [id, name, email, role_id, status, google_linked]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        role_id:
          type: string
          format: uuid
        office_id:
          type: [string, "null"]
          format: uuid
        employee_id:
          type: [string, "null"]
          format: uuid
        status:
          type: string
          enum: [active, inactive, suspended]
        avatar_url:
          type: [string, "null"]
        google_linked:
          type: boolean
        created_at:
          type: [string, "null"]
          format: date-time
        updated_at:
          type: [string, "null"]
          format: date-time

    CreateUserRequest:
      type: object
      required: [name, email, role_id]
      properties:
        name: { type: string }
        email: { type: string, format: email }
        password:
          type: string
          format: password
          description: Optional; when omitted the user can only sign in via Google.
        role_id: { type: string, format: uuid }
        office_id: { type: [string, "null"], format: uuid }
        employee_id: { type: [string, "null"], format: uuid }

    UpdateUserRequest:
      type: object
      required: [name, role_id, status]
      properties:
        name: { type: string }
        role_id: { type: string, format: uuid }
        status: { type: string, enum: [active, inactive, suspended] }
        office_id: { type: [string, "null"], format: uuid }
        employee_id: { type: [string, "null"], format: uuid }

    UserList:
      type: object
      required: [data, total, limit, offset]
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/User" }
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }

    AuditActor:
      type: object
      required: [id]
      properties:
        id: { type: string, format: uuid }
        name: { type: [string, "null"] }
        email: { type: [string, "null"] }

    AuditLog:
      type: object
      required: [id, entity_type, entity_id, action, created_at]
      properties:
        id: { type: string, format: uuid }
        actor: { oneOf: [{ $ref: "#/components/schemas/AuditActor" }, { type: "null" }] }
        entity_type: { type: string }
        entity_id: { type: string, format: uuid }
        action: { type: string, enum: [create, update, delete] }
        changes:
          description: "Changed fields keyed by name, each with optional before/after values (before omitted on create, after omitted on delete)."
          type: [object, "null"]
          additionalProperties: true
        ip: { type: [string, "null"] }
        office_id: { type: [string, "null"], format: uuid }
        created_at: { type: string, format: date-time }

    AuditList:
      type: object
      required: [data, total, limit, offset]
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/AuditLog" }
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }

    Category:
      type: object
      required: [id, name, is_active]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        code: { type: [string, "null"] }
        parent_id: { type: [string, "null"], format: uuid }
        default_depreciation_method:
          type: [string, "null"]
          description: One of `straight_line` or `declining_balance` (nullable).
        default_useful_life_months: { type: [integer, "null"] }
        default_salvage_rate:
          type: [string, "null"]
          description: Decimal string (e.g. "0.1000" = 10%).
        asset_class:
          type: string
          description: "`tangible` or `intangible` (PRD v1.1)."
        default_fiscal_group:
          type: [string, "null"]
          description: Fiscal/tax depreciation group (PMK 72/2023) — `kelompok_1`..`kelompok_4`, `bangunan_permanen`, `bangunan_non_permanen`, `non_susut`.
        default_fiscal_life_months: { type: [integer, "null"] }
        gl_account_code: { type: [string, "null"] }
        capitalization_threshold:
          type: [string, "null"]
          description: Decimal string (IDR). Below this, an acquisition is expensed, not capitalized.
        is_active: { type: boolean }
        created_at: { type: [string, "null"], format: date-time }
        updated_at: { type: [string, "null"], format: date-time }

    CategoryRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
        code: { type: [string, "null"] }
        parent_id: { type: [string, "null"], format: uuid }
        default_depreciation_method:
          type: [string, "null"]
          description: One of `straight_line` or `declining_balance` (nullable).
        default_useful_life_months: { type: [integer, "null"] }
        default_salvage_rate: { type: [string, "null"] }
        asset_class:
          type: [string, "null"]
          description: "`tangible` or `intangible`; defaults to `tangible` when omitted."
        default_fiscal_group:
          type: [string, "null"]
          description: "`kelompok_1`..`kelompok_4`, `bangunan_permanen`, `bangunan_non_permanen`, or `non_susut`."
        default_fiscal_life_months: { type: [integer, "null"] }
        gl_account_code: { type: [string, "null"] }
        capitalization_threshold: { type: [string, "null"] }
        is_active: { type: boolean, default: true }

    CategoryList:
      type: object
      required: [data, total, limit, offset]
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/Category" }
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }

    RefItem:
      type: object
      description: A reference master-data record. Common fields shown; resources add their own (e.g. code, symbol, is_active, province_id, brand_id).
      required: [id, name]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        tier:
          type: [string, "null"]
          enum: [pusat, wilayah, office]
          description: Office tier (drives the office-map pin category). Applies to `office-types` only.
        is_active: { type: boolean }
        created_at: { type: [string, "null"], format: date-time }
        updated_at: { type: [string, "null"], format: date-time }
      additionalProperties: true

    RefRequest:
      type: object
      description: Writable fields of a reference record (varies per resource; `name` is always required).
      required: [name]
      properties:
        name: { type: string }
        tier:
          type: [string, "null"]
          enum: [pusat, wilayah, office]
          description: Office tier (drives the office-map pin category). Applies to `office-types` only.
        is_active: { type: boolean, default: true }
      additionalProperties: true

    RefList:
      type: object
      required: [data, total, limit, offset]
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/RefItem" }
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }

    Office:
      type: object
      required: [id, office_type_id, name, code, is_active]
      properties:
        id: { type: string, format: uuid }
        parent_id: { type: [string, "null"], format: uuid }
        office_type_id: { type: string, format: uuid }
        province_id: { type: [string, "null"], format: uuid }
        city_id: { type: [string, "null"], format: uuid }
        name: { type: string }
        code: { type: string }
        address: { type: [string, "null"] }
        is_active: { type: boolean }
        latitude: { type: [number, "null"], minimum: -90, maximum: 90 }
        longitude: { type: [number, "null"], minimum: -180, maximum: 180 }
        created_at: { type: [string, "null"], format: date-time }
        updated_at: { type: [string, "null"], format: date-time }

    OfficeRequest:
      type: object
      required: [office_type_id, name, code]
      properties:
        parent_id: { type: [string, "null"], format: uuid }
        office_type_id: { type: string, format: uuid }
        province_id: { type: [string, "null"], format: uuid }
        city_id: { type: [string, "null"], format: uuid }
        name: { type: string }
        code: { type: string }
        address: { type: [string, "null"] }
        is_active: { type: boolean, default: true }
        latitude: { type: [number, "null"], minimum: -90, maximum: 90 }
        longitude: { type: [number, "null"], minimum: -180, maximum: 180 }

    OfficeMapItem:
      type: object
      required: [id, name, code, asset_count]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        code: { type: string }
        office_type_name: { type: [string, "null"] }
        tier:
          type: [string, "null"]
          enum: [pusat, wilayah, office, office_subtree]
          nullable: true
        province_name: { type: [string, "null"] }
        city_name: { type: [string, "null"] }
        address: { type: [string, "null"] }
        asset_count: { type: integer, minimum: 0 }
        latitude: { type: [number, "null"], minimum: -90, maximum: 90 }
        longitude: { type: [number, "null"], minimum: -180, maximum: 180 }

    OfficeList:
      type: object
      required: [data, total, limit, offset]
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/Office" } }
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }

    Employee:
      type: object
      required: [id, code, name, office_id, status]
      properties:
        id: { type: string, format: uuid }
        code: { type: string }
        name: { type: string }
        email: { type: [string, "null"], format: email }
        phone: { type: [string, "null"] }
        avatar_key: { type: [string, "null"] }
        department_id: { type: [string, "null"], format: uuid }
        position_id: { type: [string, "null"], format: uuid }
        office_id: { type: string, format: uuid }
        status: { type: string, enum: [active, inactive, suspended] }
        created_at: { type: [string, "null"], format: date-time }
        updated_at: { type: [string, "null"], format: date-time }

    EmployeeRequest:
      type: object
      required: [code, name, office_id]
      properties:
        code: { type: string }
        name: { type: string }
        email: { type: [string, "null"], format: email }
        phone: { type: [string, "null"] }
        avatar_key: { type: [string, "null"] }
        department_id: { type: [string, "null"], format: uuid }
        position_id: { type: [string, "null"], format: uuid }
        office_id: { type: string, format: uuid }
        status: { type: string, enum: [active, inactive, suspended], default: active }

    EmployeeList:
      type: object
      required: [data, total, limit, offset]
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/Employee" } }
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }

    PermissionsResponse:
      type: object
      required: [permissions]
      properties:
        permissions:
          type: array
          items:
            type: string
          examples:
            - ["asset.read", "request.create", "report.view"]

    Scope:
      type: object
      required: [level]
      properties:
        level:
          type: string
          enum: [global, office_subtree, office, own]
        office_ids:
          type: array
          description: Offices in scope (for office / office_subtree levels).
          items:
            type: string
            format: uuid

    Asset:
      type: object
      description: |
        A fixed asset record. Sensitive financial fields (`purchase_cost`, `book_value`,
        `accumulated_depreciation`) are included in the schema but may be omitted at
        runtime by field-permission masking depending on the caller's role.
      required: [id, asset_tag, name, category_id, office_id, status, asset_class]
      properties:
        id: { type: string, format: uuid }
        asset_tag: { type: string }
        name: { type: string }
        category_id: { type: string, format: uuid }
        office_id: { type: string, format: uuid }
        brand_id: { type: [string, "null"], format: uuid }
        model_id: { type: [string, "null"], format: uuid }
        room_id: { type: [string, "null"], format: uuid }
        unit_id: { type: [string, "null"], format: uuid }
        vendor_id: { type: [string, "null"], format: uuid }
        current_holder_employee_id: { type: [string, "null"], format: uuid }
        created_by_id: { type: [string, "null"], format: uuid }
        status:
          type: string
          enum: [available, assigned, under_maintenance, in_transfer, retired, disposed, lost]
        asset_class:
          type: string
          enum: [tangible, intangible]
        serial_number: { type: [string, "null"] }
        purchase_date: { type: [string, "null"], format: date }
        purchase_cost:
          type: [string, "null"]
          description: Decimal string (IDR). Subject to field-permission masking.
        book_value:
          type: [string, "null"]
          description: Decimal string (IDR). Subject to field-permission masking.
        accumulated_depreciation:
          type: [string, "null"]
          description: Decimal string (IDR). Subject to field-permission masking.
        salvage_value: { type: [string, "null"] }
        impairment_loss: { type: [string, "null"] }
        po_number: { type: [string, "null"] }
        funding_source: { type: [string, "null"] }
        warranty_expiry: { type: [string, "null"], format: date }
        capitalized: { type: [boolean, "null"] }
        depreciation_method: { type: [string, "null"] }
        useful_life_months: { type: [integer, "null"] }
        fiscal_group: { type: [string, "null"] }
        fiscal_life_months: { type: [integer, "null"] }
        acquisition_bast_no: { type: [string, "null"] }
        excluded_from_valuation: { type: [boolean, "null"] }
        valuation_exclusion_reason: { type: [string, "null"] }
        notes: { type: [string, "null"] }
        created_at: { type: [string, "null"], format: date-time }
        updated_at: { type: [string, "null"], format: date-time }

    AssetUpdate:
      type: object
      description: Writable non-financial asset attributes. `purchase_cost` and `asset_class` are changed via dedicated operations.
      required: [name, category_id]
      properties:
        name: { type: string }
        category_id: { type: string, format: uuid }
        brand_id: { type: [string, "null"], format: uuid }
        model_id: { type: [string, "null"], format: uuid }
        room_id: { type: [string, "null"], format: uuid }
        unit_id: { type: [string, "null"], format: uuid }
        vendor_id: { type: [string, "null"], format: uuid }
        serial_number: { type: [string, "null"] }
        po_number: { type: [string, "null"] }
        funding_source: { type: [string, "null"] }
        purchase_date: { type: [string, "null"], format: date, description: "YYYY-MM-DD" }
        warranty_expiry: { type: [string, "null"], format: date, description: "YYYY-MM-DD" }
        notes: { type: [string, "null"] }

    AssetList:
      type: object
      required: [data, total, limit, offset]
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/Asset" } }
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }

    AssetCreatePayload:
      type: object
      description: >-
        Shape of `SubmitRequest.payload` when `type=asset_create`. Stored as-is
        in `approval_requests.payload` and unmarshaled by the asset_create
        executor on final approve to create the asset row.
      required: [name, category_id, office_id, asset_class]
      properties:
        name: { type: string }
        category_id: { type: string, format: uuid }
        office_id: { type: string, format: uuid }
        room_id: { type: [string, "null"], format: uuid }
        asset_class:
          type: string
          enum: [tangible, intangible]
        purchase_cost:
          type: [string, "null"]
          description: Decimal string (IDR).
        purchase_date: { type: [string, "null"], format: date, description: "YYYY-MM-DD" }
        serial_number: { type: [string, "null"] }
        brand_id: { type: [string, "null"], format: uuid }
        model_id: { type: [string, "null"], format: uuid }
        unit_id: { type: [string, "null"], format: uuid }
        vendor_id: { type: [string, "null"], format: uuid }
        po_number: { type: [string, "null"] }
        funding_source: { type: [string, "null"] }
        warranty_expiry: { type: [string, "null"], format: date, description: "YYYY-MM-DD" }
        notes: { type: [string, "null"] }

    SubmitRequest:
      type: object
      description: Body for POST /requests.
      required: [type, amount, office_id]
      properties:
        type:
          type: string
          enum: [asset_create, asset_disposal, valuation_exclusion]
        amount:
          type: string
          description: >-
            Decimal string (IDR). Determines which threshold steps apply.
            For asset_create it must numerically equal payload.purchase_cost
            (or 0 when the payload has no purchase_cost); a mismatch is
            rejected with 400 so the maker cannot understate the amount to
            route the request through a lower approval band.
        office_id:
          type: string
          format: uuid
          description: Office initiating the request.
        target_id:
          type: [string, "null"]
          format: uuid
          description: Optional reference to the target entity (e.g. asset id for disposal).
        payload:
          type: [object, "null"]
          additionalProperties: true
          description: >-
            Arbitrary request payload (e.g. asset details for asset_create —
            see the AssetCreatePayload schema for its shape).
        reason:
          type: [string, "null"]
          description: Optional narrative justification.

    DecideRequest:
      type: object
      description: Optional body for POST /requests/{id}/approve or /reject. The decision is determined by the route; only an optional note is read.
      properties:
        note:
          type: [string, "null"]
          description: Optional decision note.

    Request:
      type: object
      description: An approval request record.
      required: [id, type, status, current_step, requested_by_id, created_at]
      properties:
        id: { type: string, format: uuid }
        type:
          type: string
          enum: [asset_create, asset_disposal, asset_transfer, assignment, maintenance, valuation_exclusion]
        status:
          type: string
          enum: [pending, approved, rejected, cancelled]
        amount:
          type: string
          description: Decimal string (IDR).
        current_step: { type: integer }
        office_id: { type: [string, "null"], format: uuid }
        target_id: { type: [string, "null"], format: uuid }
        target_entity: { type: [string, "null"] }
        reason: { type: [string, "null"] }
        requested_by_id: { type: string, format: uuid }
        requested_by_name:
          type: [string, "null"]
          description: Resolved maker display name (null if the user was deleted).
        requested_by_role:
          type: [string, "null"]
          description: Resolved maker role name.
        office_name:
          type: [string, "null"]
          description: Resolved originating office name.
        decided_by_id: { type: [string, "null"], format: uuid }
        decision_note: { type: [string, "null"] }
        created_at: { type: [string, "null"], format: date-time }

    RequestStep:
      type: object
      description: One approval-chain step of a request.
      properties:
        step_order: { type: integer }
        required_level:
          type: string
          enum: [office, office_subtree, wilayah, pusat]
        approver_id: { type: [string, "null"], format: uuid }
        approver_name: { type: [string, "null"] }
        decision:
          type: string
          enum: [pending, approved, rejected, cancelled]
        note: { type: [string, "null"] }
        decided_at: { type: [string, "null"], format: date-time }

    RequestDetail:
      allOf:
        - $ref: "#/components/schemas/Request"
        - type: object
          properties:
            payload:
              type: [object, "null"]
              additionalProperties: true
              description: >-
                Raw request payload as submitted (AssetCreatePayload /
                DisposalPayload / TransferPayload shape by type). Absent when
                masked by field permissions.
            steps:
              type: array
              description: Ordered approval-step history for this request.
              items: { $ref: "#/components/schemas/RequestStep" }

    RequestList:
      type: object
      required: [data, total, limit, offset]
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/Request" } }
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }

    RequestInbox:
      type: object
      required: [data, total]
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/Request" } }
        total: { type: integer }

    Threshold:
      type: object
      description: A single approval-threshold rule mapping request type + amount range to a required approver level.
      required: [id, request_type, amount_from, required_level, step_order, is_active]
      properties:
        id: { type: string, format: uuid }
        request_type:
          type: string
          enum: [asset_create, asset_disposal, asset_transfer, assignment, maintenance, valuation_exclusion]
        amount_from:
          type: string
          description: Lower bound (IDR decimal string, inclusive).
        amount_to:
          type: [string, "null"]
          description: Upper bound (IDR decimal string, inclusive). Null means no upper bound.
        required_level:
          type: string
          enum: [office, office_subtree, wilayah, pusat]
        step_order: { type: integer }
        is_active: { type: boolean }
        created_at: { type: [string, "null"], format: date-time }

    ThresholdRequest:
      type: object
      description: Body for POST/PUT /approval-thresholds.
      required: [request_type, amount_from, required_level, step_order]
      properties:
        request_type:
          type: string
          enum: [asset_create, asset_disposal, asset_transfer, assignment, maintenance, valuation_exclusion]
          description: Immutable after creation (ignored on PUT).
        amount_from:
          type: string
          description: Lower bound (IDR decimal string).
        amount_to:
          type: [string, "null"]
          description: Upper bound (IDR decimal string). Omit or null for no upper bound.
        required_level:
          type: string
          enum: [office, office_subtree, wilayah, pusat]
        step_order:
          type: integer
          description: Order of this step within the threshold chain (1-based).
        is_active:
          type: boolean
          default: false

    ThresholdList:
      type: object
      required: [data, total]
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/Threshold" } }
        total: { type: integer }

    ThresholdPreviewStep:
      type: object
      required: [step_order, required_level]
      properties:
        step_order: { type: integer }
        required_level:
          type: string
          enum: [office, office_subtree, wilayah, pusat]

    ThresholdPreview:
      type: object
      required: [steps]
      properties:
        steps: { type: array, items: { $ref: "#/components/schemas/ThresholdPreviewStep" } }

    Transfer:
      type: object
      description: |
        An inter-office asset transfer (mutasi). Created at final approval of its
        `asset_transfer` request with status `approved`; then `approved` → `in_transit`
        (ship) → either `received` (destination accepts; the asset relocates there) or
        `returned` (destination declines; terminal — the asset never moved).
      required: [id, asset_id, from_office_id, to_office_id, status, requested_by_id, request_id, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        asset_id: { type: string, format: uuid }
        from_office_id: { type: string, format: uuid }
        to_office_id: { type: string, format: uuid }
        to_room_id: { type: [string, "null"], format: uuid }
        status:
          type: string
          enum: [approved, in_transit, received, returned]
        reason: { type: [string, "null"] }
        requested_by_id: { type: string, format: uuid }
        approved_by_id: { type: [string, "null"], format: uuid }
        shipped_date: { type: [string, "null"], format: date }
        received_date: { type: [string, "null"], format: date }
        received_by_id: { type: [string, "null"], format: uuid }
        bast_no: { type: [string, "null"] }
        request_id: { type: [string, "null"], format: uuid }
        condition_sent:
          type: [string, "null"]
          enum: [baik, rusak_ringan, rusak_berat]
          description: Asset physical condition at the time of transfer.
        transfer_date: { type: [string, "null"], format: date }
        return_note: { type: [string, "null"] }
        asset_name: { type: [string, "null"] }
        asset_tag: { type: [string, "null"] }
        from_office_name: { type: [string, "null"] }
        to_office_name: { type: [string, "null"] }
        to_room_name: { type: [string, "null"] }
        requested_by_name: { type: [string, "null"] }
        received_by_name: { type: [string, "null"] }
        created_at: { type: [string, "null"], format: date-time }
        updated_at: { type: [string, "null"], format: date-time }

    TransferSubmitRequest:
      type: object
      description: Body for POST /transfers.
      required: [asset_id, to_office_id]
      properties:
        asset_id: { type: string, format: uuid }
        to_office_id: { type: string, format: uuid }
        to_room_id: { type: [string, "null"], format: uuid }
        reason: { type: [string, "null"] }
        condition_sent:
          type: [string, "null"]
          enum: [baik, rusak_ringan, rusak_berat]
          description: Asset physical condition at the time of transfer.
        transfer_date:
          type: [string, "null"]
          format: date
          description: 'Date of transfer. Format: YYYY-MM-DD.'

    TransferShipRequest:
      type: object
      description: Body for POST /transfers/{id}/ship. Entirely optional.
      properties:
        shipped_date:
          type: [string, "null"]
          format: date
          description: 'Defaults to today if omitted. Format: YYYY-MM-DD.'

    RejectReceiveRequest:
      type: object
      description: Body for POST /transfers/{id}/reject-receive.
      properties:
        note: { type: [string, "null"] }

    TransferList:
      type: object
      required: [data, total, limit, offset]
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/Transfer" } }
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }

    Assignment:
      type: object
      description: |
        An asset check-out/check-in to an employee (peminjaman). Created either directly
        by a Manager (`POST /assignments`, status `active` immediately) or at final
        approval of an `assignment` request submitted via `POST /assignments/borrow`;
        then `active` → `returned` (check-in).
      required: [id, asset_id, employee_id, assigned_by_id, checkout_date, status, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        asset_id: { type: string, format: uuid }
        employee_id: { type: string, format: uuid }
        assigned_by_id: { type: string, format: uuid }
        checkout_date: { type: string, format: date-time }
        due_date: { type: [string, "null"], format: date }
        checkin_date: { type: [string, "null"], format: date-time }
        condition_out:
          type: [string, "null"]
          enum: [baik, rusak_ringan, rusak_berat]
          description: Asset physical condition at check-out time.
        condition_in:
          type: [string, "null"]
          enum: [baik, rusak_ringan, rusak_berat]
          description: Asset physical condition at check-in time.
        status:
          type: string
          enum: [active, returned]
        notes: { type: [string, "null"] }
        asset_name: { type: [string, "null"] }
        asset_tag: { type: [string, "null"] }
        employee_name: { type: [string, "null"] }
        assigned_by_name: { type: [string, "null"] }
        office_name: { type: [string, "null"] }
        created_at: { type: [string, "null"], format: date-time }
        updated_at: { type: [string, "null"], format: date-time }

    AssignmentCheckoutRequest:
      type: object
      description: Body for POST /assignments.
      required: [asset_id, employee_id, checkout_date]
      properties:
        asset_id: { type: string, format: uuid }
        employee_id: { type: string, format: uuid }
        checkout_date:
          type: string
          format: date
          description: 'Format: YYYY-MM-DD.'
        due_date:
          type: [string, "null"]
          format: date
          description: 'Optional expected return date. Format: YYYY-MM-DD.'
        condition_out:
          type: [string, "null"]
          enum: [baik, rusak_ringan, rusak_berat]
        notes: { type: [string, "null"] }

    AssignmentCheckinRequest:
      type: object
      description: Body for POST /assignments/{id}/checkin. Entirely optional.
      properties:
        checkin_date:
          type: [string, "null"]
          format: date
          description: 'Defaults to now if omitted. Format: YYYY-MM-DD.'
        condition_in:
          type: [string, "null"]
          enum: [baik, rusak_ringan, rusak_berat]
        needs_maintenance:
          type: boolean
          default: false
          description: When true, flags the asset for a maintenance follow-up after check-in.

    AssignmentBorrowRequest:
      type: object
      description: Body for POST /assignments/borrow.
      required: [asset_id]
      properties:
        asset_id: { type: string, format: uuid }
        due_date:
          type: [string, "null"]
          format: date
          description: 'Optional expected return date. Format: YYYY-MM-DD.'
        condition_out:
          type: [string, "null"]
          enum: [baik, rusak_ringan, rusak_berat]
        notes: { type: [string, "null"] }

    AssignmentList:
      type: object
      required: [data, total, limit, offset]
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/Assignment" } }
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }

    MaintenanceSchedule:
      type: object
      description: |
        A preventive maintenance schedule for an asset. `asset_name`, `asset_tag`,
        `office_name`, and `category_name` are only present on the enriched
        list responses (`GET /maintenance/schedules`), not on create/update.
      required: [id, asset_id, interval_months, next_due_date, is_active, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        asset_id: { type: string, format: uuid }
        maintenance_category_id: { type: [string, "null"], format: uuid }
        interval_months: { type: integer, minimum: 1 }
        last_done_date: { type: [string, "null"], format: date }
        next_due_date: { type: [string, "null"], format: date }
        is_active: { type: boolean }
        asset_name: { type: [string, "null"] }
        asset_tag: { type: [string, "null"] }
        office_name: { type: [string, "null"] }
        category_name: { type: [string, "null"] }
        created_at: { type: [string, "null"], format: date-time }
        updated_at: { type: [string, "null"], format: date-time }

    MaintenanceScheduleList:
      type: object
      required: [data, total, limit, offset]
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/MaintenanceSchedule" } }
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }

    MaintenanceCreateScheduleRequest:
      type: object
      description: Body for POST /maintenance/schedules.
      required: [asset_id, interval_months, start_date]
      properties:
        asset_id: { type: string, format: uuid }
        maintenance_category_id: { type: [string, "null"], format: uuid }
        interval_months: { type: integer, minimum: 1 }
        start_date:
          type: string
          format: date
          description: 'Seeds the first next_due_date. Format: YYYY-MM-DD.'

    MaintenanceUpdateScheduleRequest:
      type: object
      description: Body for PATCH /maintenance/schedules/{id}. Entirely optional.
      properties:
        maintenance_category_id: { type: [string, "null"], format: uuid }
        interval_months: { type: integer, minimum: 1 }
        is_active: { type: boolean }

    MaintenanceRecord:
      type: object
      description: |
        A maintenance record (preventive or corrective) for an asset. `asset_name`,
        `asset_tag`, `office_name`, `category_name`, `problem_name`, `vendor_name`,
        and `reported_by_name` are only present on enriched responses (list/get/
        by-asset), not on create/update.
      required: [id, asset_id, type, status, description, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        asset_id: { type: string, format: uuid }
        schedule_id: { type: [string, "null"], format: uuid }
        maintenance_category_id: { type: [string, "null"], format: uuid }
        problem_category_id: { type: [string, "null"], format: uuid }
        type:
          type: string
          enum: [preventive, corrective]
        status:
          type: string
          enum: [scheduled, in_progress, completed, cancelled]
        scheduled_date: { type: [string, "null"], format: date }
        completed_date: { type: [string, "null"], format: date }
        cost:
          type: [string, "null"]
          description: Decimal string (IDR).
        vendor_id: { type: [string, "null"], format: uuid }
        performed_by: { type: [string, "null"] }
        description: { type: string }
        reported_by_id: { type: [string, "null"], format: uuid }
        asset_name: { type: [string, "null"] }
        asset_tag: { type: [string, "null"] }
        office_name: { type: [string, "null"] }
        category_name: { type: [string, "null"] }
        problem_name: { type: [string, "null"] }
        vendor_name: { type: [string, "null"] }
        reported_by_name: { type: [string, "null"] }
        created_at: { type: [string, "null"], format: date-time }
        updated_at: { type: [string, "null"], format: date-time }

    MaintenanceRecordList:
      type: object
      required: [data, total, limit, offset]
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/MaintenanceRecord" } }
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }

    MaintenanceCreateRecordRequest:
      type: object
      description: Body for POST /maintenance/records (Tambah Catatan slideover).
      required: [asset_id, type, description]
      properties:
        asset_id: { type: string, format: uuid }
        schedule_id: { type: [string, "null"], format: uuid }
        maintenance_category_id: { type: [string, "null"], format: uuid }
        problem_category_id: { type: [string, "null"], format: uuid }
        type:
          type: string
          enum: [preventive, corrective]
        status:
          type: string
          enum: [scheduled, in_progress, completed, cancelled]
          description: Defaults to `scheduled` when omitted.
        scheduled_date: { type: [string, "null"], format: date }
        completed_date:
          type: [string, "null"]
          format: date
          description: Defaults to today when the record is created directly as `completed`.
        cost: { type: [string, "null"], description: Decimal string (IDR). }
        vendor_id: { type: [string, "null"], format: uuid }
        description: { type: string }

    MaintenanceUpdateRecordRequest:
      type: object
      description: Body for PATCH /maintenance/records/{id} (edit slideover). Entirely optional.
      properties:
        status:
          type: [string, "null"]
          enum: [scheduled, in_progress, completed, cancelled]
        maintenance_category_id: { type: [string, "null"], format: uuid }
        scheduled_date: { type: [string, "null"], format: date }
        completed_date:
          type: [string, "null"]
          format: date
          description: Defaults to today when the record transitions to `completed` for the first time and no date is supplied.
        cost: { type: [string, "null"], description: Decimal string (IDR). }
        vendor_id: { type: [string, "null"], format: uuid }
        description: { type: [string, "null"] }

    MaintenanceAttentionItem:
      type: object
      description: |
        An `under_maintenance` asset with no active maintenance record yet
        (the "Perlu Tindak Lanjut" queue).
      required: [id, asset_tag, name, office_id]
      properties:
        id: { type: string, format: uuid }
        asset_tag: { type: string }
        name: { type: string }
        office_id: { type: string, format: uuid }
        office_name: { type: [string, "null"] }

    Disposal:
      type: object
      description: |
        An asset disposal (sale, auction, donation, or write-off). Created only once its
        `asset_disposal` approval request is approved; `gain_loss` is computed in SQL from
        `proceeds` minus `book_value_at_disposal`.
      required: [id, asset_id, method, disposal_date, request_id, created_by_id, created_at, updated_at, asset_name, asset_tag]
      properties:
        id: { type: string, format: uuid }
        asset_id: { type: string, format: uuid }
        method:
          type: string
          enum: [sale, auction, donation, write_off]
        disposal_date: { type: string, format: date }
        proceeds:
          type: [string, "null"]
          description: Decimal string (IDR).
        book_value_at_disposal:
          type: [string, "null"]
          description: Decimal string (IDR).
        gain_loss:
          type: [string, "null"]
          description: Decimal string (IDR). Computed as proceeds minus book_value_at_disposal.
        bast_no: { type: [string, "null"] }
        approved_by_id: { type: [string, "null"], format: uuid }
        request_id: { type: [string, "null"], format: uuid }
        created_by_id: { type: [string, "null"], format: uuid }
        asset_name: { type: string }
        asset_tag: { type: string }
        office_name: { type: [string, "null"] }
        created_by_name: { type: [string, "null"] }
        created_at: { type: [string, "null"], format: date-time }
        updated_at: { type: [string, "null"], format: date-time }

    DisposalSubmitRequest:
      type: object
      description: |
        Body for POST /disposals. book_value_at_disposal is not part of this request —
        the server computes it (and the approval amount) from the depreciation schedule
        as of disposal_date's month (last commercial closing, falling back to
        purchase_cost, then "0"); a caller cannot supply or override it.
      required: [asset_id, method, disposal_date]
      properties:
        asset_id: { type: string, format: uuid }
        method:
          type: string
          enum: [sale, auction, donation, write_off]
        disposal_date: { type: string, format: date }
        proceeds:
          type: [string, "null"]
          description: Decimal string (IDR).
        bast_no: { type: [string, "null"] }
        reason: { type: [string, "null"] }

    DisposalList:
      type: object
      required: [data, total, limit, offset]
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/Disposal" } }
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }

    StockOpnameSession:
      type: object
      description: |
        A physical stock-take session for one office/period. `total`, `found`,
        `pending`, and `variance` are item-result KPI counters, present on
        `GET .../sessions/{id}` (single-session responses) but omitted when
        listing (`GET .../sessions`).
      required: [id, office_id, name, period, status, started_by_id, started_at, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        office_id: { type: string, format: uuid }
        name: { type: [string, "null"] }
        period:
          type: [string, "null"]
          format: date
          description: 'Normalized to the first of the month. Format: YYYY-MM-DD.'
        status:
          type: string
          enum: [open, counting, reconciling, closed]
        started_by_id: { type: string, format: uuid }
        started_at: { type: [string, "null"], format: date-time }
        closed_by_id: { type: [string, "null"], format: uuid }
        closed_at: { type: [string, "null"], format: date-time }
        office_name: { type: [string, "null"] }
        started_by_name: { type: [string, "null"] }
        closed_by_name: { type: [string, "null"] }
        total:
          type: integer
          description: Item-result KPI, present only on the single-session (get) response.
        found:
          type: integer
          description: Item-result KPI, present only on the single-session (get) response.
        pending:
          type: integer
          description: Item-result KPI, present only on the single-session (get) response.
        variance:
          type: integer
          description: Item-result KPI, present only on the single-session (get) response.
        created_at: { type: [string, "null"], format: date-time }
        updated_at: { type: [string, "null"], format: date-time }

    StockOpnameSessionCreateRequest:
      type: object
      description: Body for POST /stock-opname/sessions.
      required: [office_id, period]
      properties:
        office_id: { type: string, format: uuid }
        name: { type: [string, "null"] }
        period:
          type: string
          description: '"YYYY-MM" (normalized to the first of the month) or "YYYY-MM-DD".'
          example: "2026-07"

    StockOpnameSessionList:
      type: object
      required: [data, total, limit, offset]
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/StockOpnameSession" } }
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }

    StockOpnameItem:
      type: object
      description: One asset's snapshot/count within a stock-opname session.
      required: [id, session_id, asset_id, expected, result]
      properties:
        id: { type: string, format: uuid }
        session_id: { type: string, format: uuid }
        asset_id: { type: string, format: uuid }
        asset_name: { type: [string, "null"] }
        asset_tag: { type: [string, "null"] }
        office_name: { type: [string, "null"] }
        room_name: { type: [string, "null"] }
        floor_name: { type: [string, "null"] }
        expected:
          type: boolean
          description: False for an item inserted by an unexpected scan (not part of the original snapshot).
        result:
          type: string
          enum: [found, not_found, damaged, misplaced, pending]
        note: { type: [string, "null"] }
        counted_by_name: { type: [string, "null"] }
        counted_at: { type: [string, "null"], format: date-time }
        followup_request_id: { type: [string, "null"], format: uuid }
        followup_record_id:
          type: [string, "null"]
          format: uuid
          description: Set instead of followup_request_id when the follow-up is a `damaged` item's maintenance record.

    StockOpnameItemList:
      type: object
      required: [data, total, limit, offset]
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/StockOpnameItem" } }
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }

    StockOpnameScanRequest:
      type: object
      description: Body for POST /stock-opname/sessions/{id}/scan.
      required: [asset_tag]
      properties:
        asset_tag: { type: string }

    StockOpnameScanResult:
      type: object
      description: The resolved item (existing match or newly inserted unexpected find).
      required: [id, session_id, asset_id, expected, result]
      properties:
        id: { type: string, format: uuid }
        session_id: { type: string, format: uuid }
        asset_id: { type: string, format: uuid }
        expected: { type: boolean }
        result:
          type: string
          enum: [found, not_found, damaged, misplaced, pending]

    StockOpnameSetResultRequest:
      type: object
      description: Body for PATCH /stock-opname/sessions/{id}/items/{itemId}.
      required: [result]
      properties:
        result:
          type: string
          enum: [found, not_found, damaged, misplaced, pending]
        note: { type: [string, "null"] }

    StockOpnameItemResultResponse:
      type: object
      required: [id, session_id, asset_id, expected, result]
      properties:
        id: { type: string, format: uuid }
        session_id: { type: string, format: uuid }
        asset_id: { type: string, format: uuid }
        expected: { type: boolean }
        result:
          type: string
          enum: [found, not_found, damaged, misplaced, pending]
        note: { type: [string, "null"] }
        counted_at: { type: [string, "null"], format: date-time }

    StockOpnameFollowupRequest:
      type: object
      description: |
        Body for POST /stock-opname/sessions/{id}/items/{itemId}/follow-up.
        `to_office_id` is required when the item's result is `misplaced`
        (ignored for `not_found`, which always creates a write-off disposal).
        `reason` becomes the disposal/transfer reason for not_found/misplaced,
        or the maintenance record's description for `damaged`.
      properties:
        to_office_id: { type: [string, "null"], format: uuid }
        to_room_id: { type: [string, "null"], format: uuid }
        reason: { type: [string, "null"] }

    StockOpnameFollowupResponse:
      type: object
      description: |
        `request_id` is set for `asset_disposal`/`asset_transfer` (not_found/
        misplaced); `record_id` is set instead for `maintenance_record`
        (damaged).
      required: [type]
      properties:
        request_id: { type: string, format: uuid }
        record_id: { type: string, format: uuid }
        type:
          type: string
          enum: [asset_disposal, asset_transfer, maintenance_record]
          description: The kind of follow-up created.

    Attachment:
      type: object
      description: |
        An asset attachment (photo or document). Storage-internal fields (`object_key`,
        `thumbnail_key`) are intentionally omitted; use `has_thumbnail` to conditionally
        render thumbnails via `GET /assets/{id}/attachments/{aid}/thumbnail`.
      required: [id, asset_id, kind, original_filename, size_bytes, mime_type, has_thumbnail, created_at]
      properties:
        id: { type: string, format: uuid }
        asset_id: { type: string, format: uuid }
        kind:
          type: string
          enum: [photo, document]
        original_filename: { type: string }
        size_bytes:
          type: integer
          format: int64
        mime_type: { type: string }
        has_thumbnail: { type: boolean }
        created_at: { type: string, format: date-time }

    AssetDocument:
      type: object
      description: |
        A document record attached to an asset (e.g. BAST acquisition, BAST transfer, invoice).
        Storage-internal fields (`object_key`) are intentionally omitted; use `has_file` to
        conditionally offer a download via `GET /assets/{id}/documents/{docId}/file`.
      required: [id, asset_id, doc_type, has_file, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        asset_id: { type: string, format: uuid }
        doc_type:
          type: string
          enum: [bast_acquisition, bast_transfer, bast_disposal, invoice, contract, other]
        doc_no:
          type: string
          nullable: true
        doc_date:
          type: string
          format: date
          nullable: true
        counterparty:
          type: string
          nullable: true
        related_request_id:
          type: string
          format: uuid
          nullable: true
        related_transfer_id:
          type: string
          format: uuid
          nullable: true
        related_disposal_id:
          type: string
          format: uuid
          nullable: true
        has_file: { type: boolean }
        created_by_id:
          type: string
          format: uuid
          nullable: true
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    DocumentCreateRequest:
      type: object
      required: [doc_type]
      properties:
        doc_type:
          type: string
          enum: [bast_acquisition, bast_transfer, bast_disposal, invoice, contract, other]
        doc_no:
          type: string
          nullable: true
        doc_date:
          type: string
          format: date
          nullable: true
        counterparty:
          type: string
          nullable: true
        related_request_id:
          type: string
          format: uuid
          nullable: true

    DocumentUpdateRequest:
      type: object
      required: [doc_type]
      properties:
        doc_type:
          type: string
          enum: [bast_acquisition, bast_transfer, bast_disposal, invoice, contract, other]
        doc_no:
          type: string
          nullable: true
        doc_date:
          type: string
          format: date
          nullable: true
        counterparty:
          type: string
          nullable: true
        related_request_id:
          type: string
          format: uuid
          nullable: true

    LabelRequest:
      type: object
      description: |
        Request body for `POST /assets/labels`. Supply either `asset_ids` or `tags`
        (or both). All dimensional fields are in millimetres. When `size` is a known
        preset the individual `w_mm`/`h_mm` fields are ignored; supply them when using
        a custom size.
      properties:
        asset_ids:
          type: array
          items: { type: string, format: uuid }
          description: Asset UUIDs to include in the label sheet.
        tags:
          type: array
          items: { type: string }
          description: Asset tags (barcode values) to include.
        template:
          type: string
          enum: [btn, generic]
          default: btn
          description: Label template. `btn` uses the Bank BTN house style; `generic` is a plain layout.
        layout:
          type: string
          enum: [roll, sheet]
          default: roll
          description: "`roll` outputs a single-column continuous roll; `sheet` tiles labels in a grid."
        size:
          type: string
          description: Named preset size (e.g. `50x30`). When omitted, supply `w_mm` and `h_mm`.
        w_mm:
          type: number
          format: double
          description: Label width in mm (used when `size` is absent or unknown).
        h_mm:
          type: number
          format: double
          description: Label height in mm (used when `size` is absent or unknown).
        media_w_mm:
          type: number
          format: double
          description: Media (paper/roll) width in mm — required for `sheet` layout.
        columns:
          type: integer
          description: Number of label columns per row (`sheet` layout only).
        mode:
          type: string
          enum: [barcode, qr, both]
          default: barcode
          description: Which symbol to print on each label.
        fields:
          type: object
          description: Optional fields to print on each label alongside the barcode.
          properties:
            name:
              type: boolean
              description: Print the asset name.
            office:
              type: boolean
              description: Print the office name.

    Role:
      type: object
      description: A configurable role in the identity & authorization layer.
      required: [id, code, name, is_system, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        code: { type: string }
        name: { type: string }
        description: { type: [string, "null"] }
        is_system:
          type: boolean
          description: System roles cannot be updated or deleted.
        created_at: { type: [string, "null"], format: date-time }
        updated_at: { type: [string, "null"], format: date-time }

    RoleCreateRequest:
      type: object
      required: [code, name]
      properties:
        code:
          type: string
          description: Unique short identifier for the role (e.g. `branch_manager`).
        name:
          type: string
          description: Human-readable display name.
        description: { type: [string, "null"] }

    RoleUpdateRequest:
      type: object
      required: [name]
      properties:
        code:
          type: string
          description: Unique short identifier. Omit to keep the existing value.
        name:
          type: string
          description: Human-readable display name.
        description: { type: [string, "null"] }

    RoleList:
      type: object
      required: [data, total]
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/Role" }
        total: { type: integer }

    PermissionSet:
      type: object
      description: The full set of permission keys assigned to a role.
      required: [permissions]
      properties:
        permissions:
          type: array
          items:
            type: string
          description: |
            Permission keys from the catalog (e.g. `asset.view`, `role.manage`).
            All supplied keys must appear in the catalog returned by `GET /authz/catalog`.

    ScopePolicySet:
      type: object
      description: The full set of data-scope policies for a role.
      required: [policies]
      properties:
        policies:
          type: array
          items:
            $ref: "#/components/schemas/ScopePolicy"

    ScopePolicy:
      type: object
      required: [module, scope_level]
      properties:
        module:
          type: string
          description: |
            Module key (e.g. `assets`, `offices`, `employees`, `requests`) or
            `*` for the default catch-all policy.
        scope_level:
          type: string
          enum: [global, office_subtree, office, own]
          description: Data visibility level for this role and module.

    FieldPermissionSet:
      type: object
      description: The full set of field-permission entries for a role.
      required: [fields]
      properties:
        fields:
          type: array
          items:
            $ref: "#/components/schemas/FieldPermission"

    FieldPermission:
      type: object
      required: [entity, field, can_view, can_edit]
      properties:
        entity:
          type: string
          description: Entity name the restriction applies to (e.g. `assets`).
        field:
          type: string
          description: Field name within the entity (e.g. `purchase_cost`).
        can_view:
          type: boolean
          description: Whether the role may read this field.
        can_edit:
          type: boolean
          description: Whether the role may write this field.

    AuthzCatalog:
      type: object
      description: |
        The canonical authorization catalog. Returned by `GET /authz/catalog` for
        use by admin screens to populate permission pickers, scope-level dropdowns,
        and module selectors.
      required: [permissions, scope_levels, scope_modules]
      properties:
        permissions:
          type: array
          description: Permission groups, each containing assignable permission keys.
          items:
            $ref: "#/components/schemas/PermissionGroup"
        scope_levels:
          type: array
          description: Valid data-scope level values.
          items:
            type: string
          examples:
            - ["global", "office_subtree", "office", "own"]
        scope_modules:
          type: array
          description: Known data-scope module strings (plus `*` for the default policy).
          items:
            type: string
          examples:
            - ["*", "offices", "employees", "assets", "requests"]

    PermissionGroup:
      type: object
      required: [group, items]
      properties:
        group:
          type: string
          description: Display group name (e.g. `Aset`, `Sistem`).
        items:
          type: array
          items:
            $ref: "#/components/schemas/PermissionItem"

    PermissionItem:
      type: object
      required: [key, label]
      properties:
        key:
          type: string
          description: The permission key used in `role_permissions` and `RequirePermission`.
        label:
          type: string
          description: Human-readable label in Indonesian (used by the admin UI).

    DepreciationPeriod:
      type: object
      description: |
        One row of `GET /depreciation/periods`, and also the response body of
        `POST /depreciation/periods/{period}/compute`: either a persisted period row, or (list
        endpoint only) the synthetic current-calendar-month row when it has never been
        computed (`status: open`, all counts/amounts zero).
      required: [period, status, asset_count, total_amount, skipped_count]
      properties:
        period:
          type: string
          description: 'Format: YYYY-MM.'
        status:
          type: string
          enum: [open, computed, closed]
        asset_count:
          type: integer
          description: Number of assets with a nonzero commercial depreciation amount posted for this period.
        total_amount:
          type: string
          description: |
            Decimal string (IDR). Sum of commercial depreciation amounts posted for this
            period; empty string for the synthetic never-computed current-month row.
        skipped_count:
          type: integer
          description: 'Assets skipped this run — reasons: not capitalized, disposed, missing purchase_cost/purchase_date, or missing depreciation parameters (no method/useful life on asset or category).'

    DepreciationScheduleRow:
      type: object
      required: [asset_id, asset_name, asset_tag, category_name, office_name, method, life_months, opening, amount, accumulated, closing, impaired, fully_depreciated]
      properties:
        asset_id: { type: string, format: uuid }
        asset_name: { type: string }
        asset_tag: { type: string }
        category_name: { type: string }
        office_name: { type: [string, "null"] }
        method:
          type: string
          enum: [straight_line, declining_balance]
        life_months: { type: integer }
        opening:
          type: string
          description: Decimal string (IDR).
        amount:
          type: string
          description: Decimal string (IDR).
        accumulated:
          type: string
          description: Decimal string (IDR).
        closing:
          type: string
          description: Decimal string (IDR).
        impaired:
          type: boolean
          description: True when the asset carries a positive impairment_loss.
        fully_depreciated:
          type: boolean
          description: |
            True for a synthetic row: the asset had no entry posted for the requested period
            because it already reached full depreciation in an earlier period. For these rows
            `amount` is "0.00" and `opening`/`closing` both equal the asset's current book value.

    DepreciationScheduleResponse:
      type: object
      required: [kpi, rows, totals]
      properties:
        kpi:
          type: object
          description: Dashboard KPI tiles, summed across every in-scope row (not just the current page — this endpoint is unpaginated).
          required: [total_cost, total_accumulated, total_book_value, period_expense]
          properties:
            total_cost: { type: string, description: Decimal string (IDR). }
            total_accumulated: { type: string, description: Decimal string (IDR). }
            total_book_value: { type: string, description: Decimal string (IDR). }
            period_expense: { type: string, description: Decimal string (IDR). Sum of `amount` across rows. }
        rows:
          type: array
          items: { $ref: "#/components/schemas/DepreciationScheduleRow" }
        totals:
          type: object
          description: Table footer totals (sum of the `rows` array's own columns).
          required: [opening, amount, accumulated, closing]
          properties:
            opening: { type: string, description: Decimal string (IDR). }
            amount: { type: string, description: Decimal string (IDR). }
            accumulated: { type: string, description: Decimal string (IDR). }
            closing: { type: string, description: Decimal string (IDR). }

    DepreciationJournalRow:
      type: object
      required: [account_code, account_name, debit, credit]
      properties:
        account_code:
          type: string
          description: GL account code, or "-" when the category has none configured (or for the credit row's fallback).
        account_name: { type: string }
        debit:
          type: string
          description: Decimal string (IDR). "0.00" on the single credit row.
        credit:
          type: string
          description: Decimal string (IDR). "0.00" on every debit row.

    DepreciationJournalResponse:
      type: object
      required: [rows, total_debit, total_credit, balanced]
      properties:
        rows:
          type: array
          description: One debit row per distinct category GL account, plus one credit row for the configured accumulated-depreciation account.
          items: { $ref: "#/components/schemas/DepreciationJournalRow" }
        total_debit: { type: string, description: Decimal string (IDR). }
        total_credit: { type: string, description: Decimal string (IDR). }
        balanced:
          type: boolean
          description: Always true — the credit is constructed as exactly the sum of the debits.

    AssetDepreciationEntry:
      type: object
      required: [basis, period, opening, amount, closing, method]
      properties:
        basis:
          type: string
          enum: [commercial, fiscal]
        period:
          type: string
          description: 'Format: YYYY-MM.'
        opening:
          type: string
          description: Decimal string (IDR).
        amount:
          type: string
          description: Decimal string (IDR).
        closing:
          type: string
          description: Decimal string (IDR).
        method:
          type: string
          enum: [straight_line, declining_balance]

    AssetDepreciationResponse:
      type: object
      description: |
        Response body of `GET /assets/{id}/depreciation`. When the caller's role is denied
        view on `assets.book_value`, the response is masked: `masked: true`,
        `computed_book_value: null`, `entries: []`.
      required: [masked, computed_book_value, entries]
      properties:
        masked: { type: boolean }
        computed_book_value:
          type: [string, "null"]
          description: Decimal string (IDR). The asset's current computed commercial book value; null when masked.
        entries:
          type: array
          description: Every posted entry for the asset, both bases, oldest first.
          items: { $ref: "#/components/schemas/AssetDepreciationEntry" }

    ImpairmentRequest:
      type: object
      description: Body for `POST /assets/{id}/impairment` (PSAK 48 impairment test / write-down).
      required: [recoverable_amount, reason]
      properties:
        recoverable_amount:
          type: string
          description: |
            Decimal string (IDR), plain (no exponents/fractions/signs). Must be non-negative
            and strictly less than the asset's current book value.
        reason:
          type: string
          description: Caller-supplied justification, recorded in the audit trail.

    ImpairmentResponse:
      type: object
      description: The asset's money fields after applying the impairment write-down.
      required: [book_value, impairment_loss, accumulated_depreciation]
      properties:
        book_value:
          type: [string, "null"]
          description: Decimal string (IDR). Dropped to recoverable_amount.
        impairment_loss:
          type: [string, "null"]
          description: Decimal string (IDR). Accumulates the shortfall (previous book value minus recoverable_amount).
        accumulated_depreciation:
          type: string
          description: Decimal string (IDR). Unaffected by impairment — it is not a depreciation expense.

    SearchItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string, description: 'Display title. For requests: the office name (frontend composes "type · office").' }
        subtitle: { type: string, description: 'Secondary line: asset tag / employee code / office code / email / short request id.' }
        status: { type: [string, "null"], description: 'Entity status enum (assets, requests) or null.' }
        asset_tag: { type: string, description: 'Present on assets items only.' }
        request_type: { type: string, description: 'Present on requests items only (shared.request_type enum).' }

    SearchGroup:
      type: object
      properties:
        type: { type: string, enum: [assets, employees, offices, users, requests] }
        total: { type: integer, description: 'Full match count for the group (items are capped at 5).' }
        items:
          type: array
          items: { $ref: "#/components/schemas/SearchItem" }

    DashboardTrends:
      type: object
      description: Period-over-period percent deltas vs. the equal-length preceding window. Each field is null when the prior window has no baseline to compare against (e.g. zero prior value).
      properties:
        acquisition_pct: { type: [number, "null"] }
        book_value_pct: { type: [number, "null"] }
        maintenance_cost_pct: { type: [number, "null"] }

    DashboardKpi:
      type: object
      required: [total_assets, acquisition_value, book_value, overdue_assets, maintenance_due, maintenance_cost, trends]
      properties:
        total_assets: { type: integer }
        acquisition_value: { type: string, description: Decimal string (IDR). }
        book_value: { type: string, description: Decimal string (IDR). }
        overdue_assets: { type: integer, description: 'Assets past their depreciation useful-life end still carrying book value, or similar overdue condition.' }
        maintenance_due: { type: integer, description: 'Active maintenance schedules due within a fixed 7-day window from today (including already-overdue ones) — independent of the `period`/date filters.' }
        maintenance_cost: { type: string, description: Decimal string (IDR). Total maintenance cost within the window. }
        trends: { $ref: "#/components/schemas/DashboardTrends" }

    StatusCount:
      type: object
      required: [status, count]
      properties:
        status: { type: string, enum: [available, assigned, under_maintenance, in_transfer, retired, disposed, lost] }
        count: { type: integer }

    NamedCount:
      type: object
      required: [name, count]
      properties:
        name: { type: [string, "null"], description: 'null represents the "no room"/unassigned bucket; the frontend localizes the label.' }
        count: { type: integer }

    MaintenanceDueItem:
      type: object
      required: [id, asset_name, asset_tag, category_name, next_due_date]
      properties:
        id: { type: string, format: uuid }
        asset_name: { type: string }
        asset_tag: { type: string }
        category_name: { type: [string, "null"] }
        next_due_date: { type: string, format: date }

    DashboardSummary:
      type: object
      description: Response body of `GET /dashboard/summary` and `GET /dashboard/export`.
      required: [office_name, kpi, by_status, by_category, location_kind, by_location, maintenance_due_list, excluded_count]
      properties:
        office_name: { type: [string, "null"], description: 'The drill-down office name when `office_id` is supplied, else null (caller''s full scope).' }
        kpi: { $ref: "#/components/schemas/DashboardKpi" }
        by_status:
          type: array
          items: { $ref: "#/components/schemas/StatusCount" }
        by_category:
          type: array
          items: { $ref: "#/components/schemas/NamedCount" }
        location_kind: { type: string, enum: [office, room], description: Whether `by_location` breaks down by office or by room (depends on caller scope breadth). }
        by_location:
          type: array
          items: { $ref: "#/components/schemas/NamedCount" }
        maintenance_due_list:
          type: array
          description: 'Schedules due within a fixed 7-day window from today (including already-overdue ones) — independent of the `period`/date filters.'
          items: { $ref: "#/components/schemas/MaintenanceDueItem" }
        excluded_count: { type: integer, description: 'Assets flagged `excluded_from_valuation` — counted in `total_assets`/`by_status` but excluded from the `acquisition_value`/`book_value` money sums.' }

    ReportKpi:
      type: object
      required: [key, value]
      properties:
        key: { type: string, description: 'Stable per-type key, e.g. `total_assets`, `period_expense`, `avg_utilization`, `total_cost`, `total`, `total_disposals`, `sessions`. See the per-type `Kpis` list in `internal/report/service.go` for the full key set.' }
        value: { type: string, description: Pre-stringified count or decimal money string. }

    ChartBar:
      type: object
      required: [label, value]
      properties:
        label: { type: string }
        value: { type: string, description: Decimal string (money) or plain number string. }

    AssetRow:
      type: object
      description: '`rows` item shape when `type=assets`.'
      required: [asset_tag, name, category_name, status, purchase_cost, accum_deprec, book_value]
      properties:
        asset_tag: { type: string }
        name: { type: string }
        category_name: { type: string }
        status: { type: string, enum: [available, assigned, under_maintenance, in_transfer, retired, disposed, lost] }
        purchase_cost: { type: string, description: Decimal string (IDR). }
        accum_deprec: { type: string, description: Decimal string (IDR). }
        book_value: { type: string, description: Decimal string (IDR). }

    DeprRow:
      type: object
      description: '`rows` item shape when `type=depreciation`.'
      required: [period, opening, amount, closing]
      properties:
        period: { type: string, description: 'Format: YYYY-MM.' }
        opening: { type: string, description: Decimal string (IDR). }
        amount: { type: string, description: Decimal string (IDR). }
        closing: { type: string, description: Decimal string (IDR). }

    UtilRow:
      type: object
      description: '`rows` item shape when `type=utilization`.'
      required: [name, asset_tag, category_name, days_loaned, loan_count, utilization_pct]
      properties:
        name: { type: string }
        asset_tag: { type: string }
        category_name: { type: string }
        days_loaned: { type: integer }
        loan_count: { type: integer }
        utilization_pct: { type: number }

    MaintRow:
      type: object
      description: '`rows` item shape when `type=maintenance`.'
      required: [asset_name, category_name, type, actions, total_cost]
      properties:
        asset_name: { type: string }
        category_name: { type: string }
        type: { type: string, enum: [preventive, corrective] }
        actions: { type: integer }
        total_cost: { type: string, description: Decimal string (IDR). }

    TransferRow:
      type: object
      description: '`rows` item shape when `type=transfers`. Nullable source columns (`shipped_date`, `received_date`, `bast_no`) serialize as `""` (empty string), not `null` — they are plain `string`, not nullable.'
      required: [asset_name, asset_tag, from_office, to_office, status, shipped_date, received_date, bast_no]
      properties:
        asset_name: { type: string }
        asset_tag: { type: string }
        from_office: { type: string }
        to_office: { type: string }
        status: { type: string }
        shipped_date: { type: string, description: 'Format YYYY-MM-DD, or "" when not yet shipped.' }
        received_date: { type: string, description: 'Format YYYY-MM-DD, or "" when not yet received.' }
        bast_no: { type: string, description: 'BAST document number, or "" when none attached.' }

    DisposalRow:
      type: object
      description: '`rows` item shape when `type=disposals`.'
      required: [asset_name, asset_tag, method, disposal_date, book_value, proceeds, gain_loss]
      properties:
        asset_name: { type: string }
        asset_tag: { type: string }
        method: { type: string }
        disposal_date: { type: string, format: date }
        book_value: { type: string, description: Decimal string (IDR). }
        proceeds: { type: string, description: Decimal string (IDR). }
        gain_loss: { type: string, description: 'Decimal string (IDR). Positive is a gain, negative a loss.' }

    OpnameRow:
      type: object
      description: '`rows` item shape when `type=opname`.'
      required: [session_id, name, office_name, period, status, total_items, variance]
      properties:
        session_id: { type: string, format: uuid }
        name: { type: string }
        office_name: { type: string }
        period: { type: string }
        status: { type: string }
        total_items: { type: integer }
        variance: { type: integer }

    ReportResult:
      type: object
      description: |
        Response body of `GET /reports/{type}` and the `variant=table` (default) branch of
        `GET /reports/{type}/export`. `rows` is a free-form array whose item shape depends on
        `type`: `assets` → `AssetRow`, `depreciation` → `DeprRow`, `utilization` → `UtilRow`,
        `maintenance` → `MaintRow`, `transfers` → `TransferRow`, `disposals` → `DisposalRow`,
        `opname` → `OpnameRow`.
      required: [type, kpis, chart, rows, totals, row_count, truncated]
      properties:
        type: { type: string, enum: [assets, depreciation, utilization, maintenance, transfers, disposals, opname] }
        kpis:
          type: array
          items: { $ref: "#/components/schemas/ReportKpi" }
        chart:
          type: array
          items: { $ref: "#/components/schemas/ChartBar" }
        rows:
          type: array
          items: {}
          description: 'Per-type row objects — see the schema description above for the `type` → row-schema mapping.'
        totals:
          type: object
          additionalProperties: { type: string }
          description: Column-keyed TOTAL row (decimal strings), mirroring the exported table's tfoot.
        row_count: { type: integer, description: Total matching rows before the cap/truncation is applied. }
        truncated: { type: boolean, description: 'true when `row_count` exceeds the 1000-row JSON cap (the JSON endpoint only; export lifts the cap).' }

    GlRow:
      type: object
      required: [account_code, account_name, debit, credit]
      properties:
        account_code: { type: string }
        account_name: { type: string }
        debit: { type: string, description: Decimal string (IDR). }
        credit: { type: string, description: Decimal string (IDR). }

    GlRecapResult:
      type: object
      description: Rendered by the `variant=gl_recap` branch of `GET /reports/disposals/export` (file only — not exposed as a JSON endpoint).
      required: [rows, total_debit, total_credit, balanced]
      properties:
        rows:
