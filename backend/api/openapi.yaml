openapi: 3.1.0
info:
  title: Inventra API
  version: 0.1.0
  description: |
    Asset management API for Inventra (see docs/PRD.md, docs/DATABASE.md).

    **Auth:** Bearer JWT. Obtain tokens via `POST /api/v1/auth/login`, then send
    `Authorization: Bearer <access_token>`. Access tokens are short-lived;
    rotate with `POST /api/v1/auth/refresh`. `POST /api/v1/auth/logout` revokes
    the current access token and the supplied refresh token.
  contact:
    name: Inventra
    url: https://github.com/ragbuaj/inventra
  license:
    name: MIT

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: Health
    description: Liveness & readiness probes
  - name: Auth
    description: Authentication & session
  - name: Users
    description: User management (requires the user.manage permission)
  - name: Authorization Admin
    description: |
      Superadmin management of the configurable authorization layer: roles,
      role-permissions, data-scope policies, and field-permissions.
      Role CRUD requires `role.manage`; scope management requires `scope.manage`;
      field-permission management requires `fieldperm.manage`. System roles
      (`is_system: true`) cannot be updated or deleted (returns 409).
  - name: Master Data
    description: |
      Reference master data. Read is open to authenticated users; writes require
      `masterdata.global.manage`. `categories` (documented in full) and `brands`
      (representative of the generic reference CRUD) are shown here.

      The following reference resources share the **same generic CRUD contract**
      as `brands` (`GET/POST /api/v1/{resource}`, `GET/PUT/DELETE /api/v1/{resource}/{id}`),
      differing only in their writable fields:
      `office-types` (field `tier`: `pusat|wilayah|office|null`), `departments`, `positions`,
      `units`, `maintenance-categories`, `problem-categories`, `brands`, `vendors`, `provinces`,
      `cities` (field `province_id`), `models` (field `brand_id`).

      **Offices & employees** (documented in full) are data-scoped per row.
      **Floors** (`GET /api/v1/floors?office_id=...`) and **rooms**
      (`GET /api/v1/rooms?floor_id=...`) are nested, office-scoped location
      resources (writes require `masterdata.office.manage`); see the Bruno
      collection for examples.
  - name: Assets
    description: |
      Asset core. Reads require the `asset.view` permission; writes require `asset.manage`.
      Sensitive financial fields are subject to per-role field-permission masking.
  - name: Requests
    description: |
      Approval requests (maker-checker workflow). Submitting requires `request.create`;
      inbox/decide actions require `request.decide`; listing is open to any authenticated user.
  - name: Approval Thresholds
    description: |
      Value-tiered approval-threshold configuration. All operations require
      the `approval.config.manage` permission.
  - name: Transfers
    description: |
      Inter-office asset transfers (mutasi). A transfer row is created only once an
      `asset_transfer` approval request is approved (see the Requests tag); it then moves
      `approved` → `in_transit` → either `received` or `returned` (destination declines).
      Reads require `transfer.view`; writes (`submit`, `ship`, `receive`, `reject-receive`)
      require `transfer.manage`. Receiving optionally attaches
      a BAST (`bast_transfer`) document via `POST /assets/{id}/documents` semantics.
  - name: Disposals
    description: |
      Asset disposal (sale, auction, donation, or write-off). A `disposals` row is created
      only once an `asset_disposal` approval request is approved (see the Requests tag),
      with `gain_loss` computed from `proceeds` and `book_value_at_disposal`. Reads require
      `disposal.view`; writes (`submit`, `document`) require `disposal.manage`. Attaching the
      BAST creates a `bast_disposal` asset document (see `POST /assets/{id}/documents`
      semantics) and optionally persists `bast_no` on the disposal.
  - name: Depreciation
    description: |
      Monthly depreciation compute/close, per-asset/portfolio schedules, and the
      general-ledger journal — computed on **two bases**: commercial (PSAK 16, straight-line
      or declining-balance per category) and fiscal (PMK 72/2023). Reading periods,
      schedule, and journal (incl. export) requires `depreciation.view`; the schedule and
      journal (+ export) are additionally scoped to the `depreciation` data-scope module,
      while the periods list is a global (non-office-scoped) read of period aggregates.
      Computing/closing a period and recording an impairment (PSAK 48 write-down) require
      `depreciation.manage`. **Closing a period is immutable** — a later compute never
      regenerates entries at or before the closed watermark. `GET /assets/{id}/depreciation`
      instead reuses the `assets` data scope and masks `book_value`-derived fields per the
      caller's field permissions.
  - name: Audit
    description: Read-only audit trail (requires the `audit.view` permission)
  - name: Stock Opname
    description: |
      Physical stock-take (stock opname): a session snapshots every in-scope,
      non-disposed asset of an office, then drives it through
      `open` → `counting` (start) → `reconciling` (reconcile) → `closed` (close).
      While `counting`, items are recorded via barcode `scan` and/or a manual
      `PATCH .../items/{itemId}` result (`found`, `not_found`, `damaged`,
      `misplaced`, `pending`). A variance item (`not_found`, `misplaced`, or
      `damaged`) can be routed to a follow-up via
      `POST .../items/{itemId}/follow-up`: `not_found` creates an
      `asset_disposal` (write_off) approval request, `misplaced` creates an
      `asset_transfer` approval request to the supplied destination
      office/room (reusing the disposal/transfer modules' own submit logic
      and their scope/state guards), and `damaged` creates a scheduled
      corrective `maintenance_records` row directly (no approval workflow).
      The report
      endpoint renders the session as a downloadable Berita Acara (PDF or
      xlsx). Reads require `stockopname.view`; writes (create, start, scan,
      set result, reconcile, follow-up, close) require `stockopname.manage`.
      Sessions and items are scoped to the caller's offices (data-scope module
      `stockopname`).
  - name: Assignments
    description: |
      Asset check-out/check-in to employees (peminjaman). A Manager can directly
      `checkout` an asset to an employee (`assignment.manage`); a Staf instead
      submits a `POST /assignments/borrow` request, which creates an `assignment`
      approval request (see the Requests tag) — an `assignments` row with status
      `active` is only created once that request is approved. `checkin` closes an
      active assignment (`returned`), optionally flagging the asset for
      maintenance. Reads require `assignment.view`; direct checkout/checkin
      require `assignment.manage`; the borrow submit and available-asset picker
      require `request.create`. Assignments are scoped to the caller's offices
      (data-scope module `assignments`).
  - name: Maintenance
    description: |
      Preventive maintenance schedules and the maintenance record state
      machine. A schedule (`interval_months` + `next_due_date`) drives when an
      asset is next due for preventive maintenance; a record (`preventive` or
      `corrective`) tracks one maintenance episode through
      `scheduled` → `in_progress` → `completed`/`cancelled`. Landing on
      `in_progress` flags the asset `under_maintenance`; landing on
      `completed` advances the linked schedule's `last_done_date`/
      `next_due_date` and releases the asset back to `available` once no
      other active record holds it. `GET /maintenance/attention` lists
      `under_maintenance` assets with no active record yet (e.g. flagged by an
      assignment check-in's `needs_maintenance`). A Staf instead submits
      `POST /maintenance/reports` (multipart, optional photo), which creates a
      `maintenance` approval request (see the Requests tag) — a record is only
      created once that request is approved. Reads require `maintenance.view`;
      schedule/record writes require `maintenance.manage`; the damage-report
      submit requires `request.create`. Schedules and records are scoped to
      the caller's offices (data-scope module `maintenance`).
  - name: Search
    description: Global search (command palette) across assets, employees, offices, users, and approval requests.
  - name: Report
    description: |
      Read-only reporting: the dashboard summary and 7 canned reports (`assets`,
      `depreciation`, `utilization`, `maintenance`, `transfers`, `disposals`, `opname`), each
      available as JSON or as an xlsx/PDF download. Every endpoint accepts the shared
      `period`/`date_from`+`date_to`, `office_id`, and `category_id` filters and is scoped to
      the caller's offices (data-scope module `report`); an `office_id` outside the caller's
      scope is rejected with 403 before any data is read. JSON reads require `report.view`;
      every export (including the GL recap variant) requires `report.export`.
      `GET /dashboard/summary` is the only cached endpoint (90s TTL, keyed by role + scope +
      office filter + period) — `GET /dashboard/export` and both `/reports/:type` endpoints
      always compute fresh so a download never serves a stale snapshot.

paths:
  /health:
    get:
      tags: [Health]
      operationId: healthLiveness
      summary: Liveness probe
      description: Returns ok if the process is up. No external dependencies.
      security: []
      responses:
        "200":
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"

  /health/ready:
    get:
      tags: [Health]
      operationId: healthReadiness
      summary: Readiness probe
      description: Verifies PostgreSQL and Redis are reachable.
      security: []
      responses:
        "200":
          description: All dependencies reachable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Readiness"
        "503":
          description: One or more dependencies unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Readiness"

  /api/v1/auth/login:
    post:
      tags: [Auth]
      operationId: authLogin
      summary: Login with email and password
      description: Verifies credentials and issues an access token; sets the refresh token as an `inventra_refresh` HttpOnly cookie.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Tokens issued
          headers:
            Set-Cookie:
              schema: { type: string }
              description: Sets the `inventra_refresh` HttpOnly cookie.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Invalid email or password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: User is not active
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      operationId: authRefresh
      summary: Rotate refresh token for a new token pair
      description: >
        Rotates the session using the `inventra_refresh` HttpOnly cookie set at
        login. No request body. Responds 401 if the cookie is missing or invalid.
      security: []
      responses:
        "200":
          description: New token pair issued; the old refresh token is invalidated
          headers:
            Set-Cookie:
              schema: { type: string }
              description: Sets the `inventra_refresh` HttpOnly cookie.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/auth/google:
    get:
      tags: [Auth]
      operationId: authGoogleStart
      summary: Start Google sign-in
      description: Redirects (302) to Google's consent screen. No body.
      security: []
      responses:
        "302":
          description: Redirect to the Google consent screen.
          headers:
            Location:
              schema: { type: string }

  /api/v1/auth/google/callback:
    get:
      tags: [Auth]
      operationId: authGoogleCallback
      summary: Google sign-in callback
      description: >
        Validates state, exchanges the code, verifies the ID token, links the
        account (link-only), sets the `inventra_refresh` HttpOnly cookie, and
        redirects (302) to the SPA at `/login?oauth=success` (or `?oauth=error&reason=...`).
      security: []
      parameters:
        - { in: query, name: code, schema: { type: string } }
        - { in: query, name: state, schema: { type: string } }
        - { in: query, name: error, schema: { type: string } }
      responses:
        "302":
          description: Redirect back to the SPA.
          headers:
            Location:
              schema: { type: string }
            Set-Cookie:
              schema: { type: string }
              description: On success, sets the inventra_refresh HttpOnly cookie.

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      operationId: authLogout
      summary: Revoke the current access token and the refresh cookie
      description: Denylists the current access token until expiry and clears the `inventra_refresh` HttpOnly cookie. No request body.
      security:
        - bearerJWT: []
      responses:
        "200":
          description: Logged out
          headers:
            Set-Cookie:
              schema: { type: string }
              description: Clears the `inventra_refresh` HttpOnly cookie.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    examples: ["logged_out"]
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/me:
    get:
      tags: [Auth]
      operationId: authMe
      summary: Current authenticated user
      description: Returns the profile of the user identified by the access token.
      security:
        - bearerJWT: []
      responses:
        "200":
          description: The current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/auth/permissions:
    get:
      tags: [Auth]
      operationId: authPermissions
      summary: Effective RBAC permissions of the caller
      description: Returns the action permission keys granted to the caller's role.
      security:
        - bearerJWT: []
      responses:
        "200":
          description: Permission keys
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PermissionsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/scope/{module}:
    get:
      tags: [Auth]
      operationId: authScope
      summary: Effective data scope of the caller for a module
      description: |
        Resolves the caller's data-access scope (`global`, `office_subtree`,
        `office`, or `own`) for the given module, including the office subtree
        when applicable.
      security:
        - bearerJWT: []
      parameters:
        - name: module
          in: path
          required: true
          description: Module key (e.g. `asset`, `requests`), or `*` for the default.
          schema:
            type: string
      responses:
        "200":
          description: Effective scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Scope"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/users:
    get:
      tags: [Users]
      operationId: listUsers
      summary: List users
      description: Requires the `user.manage` permission (Superadmin by default).
      security:
        - bearerJWT: []
      parameters:
        - name: search
          in: query
          schema: { type: string }
          description: Filter by name or email (case-insensitive).
        - name: limit
          in: query
          schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
        - name: offset
          in: query
          schema: { type: integer, default: 0, minimum: 0 }
      responses:
        "200":
          description: A page of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserList"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [Users]
      operationId: createUser
      summary: Create a user
      description: Requires the `user.manage` permission.
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: Created user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Email already in use
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/users/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Users]
      operationId: getUser
      summary: Get a user by id
      description: Requires the `user.manage` permission.
      security:
        - bearerJWT: []
      responses:
        "200":
          description: The user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    put:
      tags: [Users]
      operationId: updateUser
      summary: Update a user (full replace of mutable fields)
      description: Replaces name, role, status, office, and employee. Requires the `user.manage` permission.
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    delete:
      tags: [Users]
      operationId: deleteUser
      summary: Soft-delete a user
      description: Marks the user deleted (soft delete). Requires the `user.manage` permission.
      security:
        - bearerJWT: []
      responses:
        "204": { description: Deleted }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/categories/tree:
    get:
      tags: [Master Data]
      operationId: listCategoryTree
      summary: Category tree (full)
      description: Returns the full non-deleted category set, unpaginated, for client-side tree building. Readable by any authenticated user.
      security:
        - bearerJWT: []
      responses:
        "200":
          description: Full category list
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Category"
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/categories:
    get:
      tags: [Master Data]
      operationId: listCategories
      summary: List asset categories
      description: Readable by any authenticated user.
      security:
        - bearerJWT: []
      parameters:
        - { name: search, in: query, schema: { type: string } }
        - { name: limit, in: query, schema: { type: integer, default: 20, minimum: 1, maximum: 100 } }
        - { name: offset, in: query, schema: { type: integer, default: 0, minimum: 0 } }
      responses:
        "200":
          description: A page of categories
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CategoryList" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [Master Data]
      operationId: createCategory
      summary: Create an asset category
      description: Requires the `masterdata.global.manage` permission.
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CategoryRequest" }
      responses:
        "201":
          description: Created category
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Category" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Duplicate code
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/categories/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Master Data]
      operationId: getCategory
      summary: Get a category by id
      description: Readable by any authenticated user.
      security:
        - bearerJWT: []
      responses:
        "200":
          description: The category
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Category" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    put:
      tags: [Master Data]
      operationId: updateCategory
      summary: Update a category (full replace)
      description: Requires the `masterdata.global.manage` permission.
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CategoryRequest" }
      responses:
        "200":
          description: Updated category
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Category" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    delete:
      tags: [Master Data]
      operationId: deleteCategory
      summary: Soft-delete a category
      description: Requires the `masterdata.global.manage` permission.
      security:
        - bearerJWT: []
      responses:
        "204": { description: Deleted }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/brands:
    get:
      tags: [Master Data]
      operationId: listBrands
      summary: List brands (representative reference resource)
      description: Readable by any authenticated user. See the Master Data tag for the full list of resources sharing this contract.
      security: [{ bearerJWT: [] }]
      parameters:
        - { name: search, in: query, schema: { type: string } }
        - { name: limit, in: query, schema: { type: integer, default: 20, minimum: 1, maximum: 100 } }
        - { name: offset, in: query, schema: { type: integer, default: 0, minimum: 0 } }
      responses:
        "200":
          description: A page of records
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RefList" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [Master Data]
      operationId: createBrand
      summary: Create a brand
      description: Requires the `masterdata.global.manage` permission.
      security: [{ bearerJWT: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RefRequest" }
      responses:
        "201":
          description: Created record
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RefItem" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Duplicate unique value
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/brands/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Master Data]
      operationId: getBrand
      summary: Get a brand by id
      description: Readable by any authenticated user.
      security: [{ bearerJWT: [] }]
      responses:
        "200":
          description: The record
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RefItem" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    put:
      tags: [Master Data]
      operationId: updateBrand
      summary: Update a brand (full replace)
      description: Requires the `masterdata.global.manage` permission.
      security: [{ bearerJWT: [] }]
      requestBody:
