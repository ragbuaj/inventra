openapi: 3.1.0
info:
  title: Inventra API
  version: 0.1.0
  description: |
    Asset management API for Inventra (see docs/PRD.md, docs/DATABASE.md).

    **Auth:** Bearer JWT. Obtain tokens via `POST /api/v1/auth/login`, then send
    `Authorization: Bearer <access_token>`. Access tokens are short-lived;
    rotate with `POST /api/v1/auth/refresh`. `POST /api/v1/auth/logout` revokes
    the current access token and the supplied refresh token.
  contact:
    name: Inventra
    url: https://github.com/ragbuaj/inventra
  license:
    name: MIT

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: Health
    description: Liveness & readiness probes
  - name: Auth
    description: Authentication & session
  - name: Users
    description: User management (requires the user.manage permission)

paths:
  /health:
    get:
      tags: [Health]
      operationId: healthLiveness
      summary: Liveness probe
      description: Returns ok if the process is up. No external dependencies.
      security: []
      responses:
        "200":
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"

  /health/ready:
    get:
      tags: [Health]
      operationId: healthReadiness
      summary: Readiness probe
      description: Verifies PostgreSQL and Redis are reachable.
      security: []
      responses:
        "200":
          description: All dependencies reachable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Readiness"
        "503":
          description: One or more dependencies unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Readiness"

  /api/v1/auth/login:
    post:
      tags: [Auth]
      operationId: authLogin
      summary: Login with email and password
      description: Verifies credentials and issues an access + refresh token pair.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Tokens issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Invalid email or password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: User is not active
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      operationId: authRefresh
      summary: Rotate refresh token for a new token pair
      description: Validates the refresh token, rotates it (single-use), and issues a new pair.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: New token pair issued; the old refresh token is invalidated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      operationId: authLogout
      summary: Revoke the current access token and a refresh token
      description: Denylists the current access token until expiry and deletes the supplied refresh token.
      security:
        - bearerJWT: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    examples: ["logged_out"]
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/me:
    get:
      tags: [Auth]
      operationId: authMe
      summary: Current authenticated user
      description: Returns the profile of the user identified by the access token.
      security:
        - bearerJWT: []
      responses:
        "200":
          description: The current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/auth/permissions:
    get:
      tags: [Auth]
      operationId: authPermissions
      summary: Effective RBAC permissions of the caller
      description: Returns the action permission keys granted to the caller's role.
      security:
        - bearerJWT: []
      responses:
        "200":
          description: Permission keys
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PermissionsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/scope/{module}:
    get:
      tags: [Auth]
      operationId: authScope
      summary: Effective data scope of the caller for a module
      description: |
        Resolves the caller's data-access scope (`global`, `office_subtree`,
        `office`, or `own`) for the given module, including the office subtree
        when applicable.
      security:
        - bearerJWT: []
      parameters:
        - name: module
          in: path
          required: true
          description: Module key (e.g. `asset`, `requests`), or `*` for the default.
          schema:
            type: string
      responses:
        "200":
          description: Effective scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Scope"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/users:
    get:
      tags: [Users]
      operationId: listUsers
      summary: List users
      description: Requires the `user.manage` permission (Superadmin by default).
      security:
        - bearerJWT: []
      parameters:
        - name: search
          in: query
          schema: { type: string }
          description: Filter by name or email (case-insensitive).
        - name: limit
          in: query
          schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
        - name: offset
          in: query
          schema: { type: integer, default: 0, minimum: 0 }
      responses:
        "200":
          description: A page of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserList"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [Users]
      operationId: createUser
      summary: Create a user
      description: Requires the `user.manage` permission.
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: Created user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Email already in use
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/users/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Users]
      operationId: getUser
      summary: Get a user by id
      description: Requires the `user.manage` permission.
      security:
        - bearerJWT: []
      responses:
        "200":
          description: The user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    put:
      tags: [Users]
      operationId: updateUser
      summary: Update a user (full replace of mutable fields)
      description: Replaces name, role, status, office, and employee. Requires the `user.manage` permission.
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    delete:
      tags: [Users]
      operationId: deleteUser
      summary: Soft-delete a user
      description: Marks the user deleted (soft delete). Requires the `user.manage` permission.
      security:
        - bearerJWT: []
      responses:
        "204": { description: Deleted }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

components:
  securitySchemes:
    bearerJWT:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    BadRequest:
      description: Malformed request body
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Missing, invalid, or revoked token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Authenticated but lacking the required permission
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Human-readable error message
      examples:
        - error: invalid email or password

    Health:
      type: object
      required: [status, service, env]
      properties:
        status:
          type: string
          examples: ["ok"]
        service:
          type: string
          examples: ["inventra-api"]
        env:
          type: string
          examples: ["development"]

    Readiness:
      type: object
      required: [status, checks]
      properties:
        status:
          type: string
          enum: [ready, not_ready]
        checks:
          type: object
          properties:
            postgres:
              type: string
              description: '"ok" or an error message'
            redis:
              type: string
              description: '"ok" or an error message'

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          examples: ["admin@inventra.local"]
        password:
          type: string
          format: password
          minLength: 1
          examples: ["admin12345"]

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    LogoutRequest:
      type: object
      properties:
        refresh_token:
          type: string
          description: Optional; when supplied, this refresh token is also revoked.

    TokenResponse:
      type: object
      required: [access_token, refresh_token, token_type, expires_in]
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          examples: ["Bearer"]
        expires_in:
          type: integer
          description: Access-token lifetime in seconds
          examples: [900]

    User:
      type: object
      required: [id, name, email, role_id, status, google_linked]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        role_id:
          type: string
          format: uuid
        office_id:
          type: [string, "null"]
          format: uuid
        employee_id:
          type: [string, "null"]
          format: uuid
        status:
          type: string
          enum: [active, inactive, suspended]
        avatar_url:
          type: [string, "null"]
        google_linked:
          type: boolean
        created_at:
          type: [string, "null"]
          format: date-time
        updated_at:
          type: [string, "null"]
          format: date-time

    CreateUserRequest:
      type: object
      required: [name, email, role_id]
      properties:
        name: { type: string }
        email: { type: string, format: email }
        password:
          type: string
          format: password
          description: Optional; when omitted the user can only sign in via Google.
        role_id: { type: string, format: uuid }
        office_id: { type: [string, "null"], format: uuid }
        employee_id: { type: [string, "null"], format: uuid }

    UpdateUserRequest:
      type: object
      required: [name, role_id, status]
      properties:
        name: { type: string }
        role_id: { type: string, format: uuid }
        status: { type: string, enum: [active, inactive, suspended] }
        office_id: { type: [string, "null"], format: uuid }
        employee_id: { type: [string, "null"], format: uuid }

    UserList:
      type: object
      required: [data, total, limit, offset]
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/User" }
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }

    PermissionsResponse:
      type: object
      required: [permissions]
      properties:
        permissions:
          type: array
          items:
            type: string
          examples:
            - ["asset.read", "request.create", "report.view"]

    Scope:
      type: object
      required: [level]
      properties:
        level:
          type: string
          enum: [global, office_subtree, office, own]
        office_ids:
          type: array
          description: Offices in scope (for office / office_subtree levels).
          items:
            type: string
            format: uuid
