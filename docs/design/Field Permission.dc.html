<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;}
body{margin:0;}
input::placeholder{color:var(--text-dimmed);}
::-webkit-scrollbar{width:9px;height:9px;}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:9px;border:2px solid transparent;background-clip:padding-box;}
:root{
  --bg:#f8fafc; --bg-base:#ffffff; --bg-muted:#f1f5f9; --bg-el:#ffffff;
  --border:#e2e8f0; --border-strong:#cbd5e1;
  --text:#0f172a; --text-muted:#64748b; --text-dimmed:#94a3b8;
  --primary:#16a34a; --primary-hover:#15803d; --primary-fg:#ffffff;
  --primary-soft-bg:#dcfce7; --primary-soft-text:#15803d;
  --success:#16a34a; --warning:#d97706; --warning-soft-bg:#fef3c7; --warning-soft-text:#b45309;
  --error:#dc2626; --info:#2563eb; --info-soft-bg:#dbeafe; --info-soft-text:#1d4ed8;
  --neutral-soft-bg:#eef2f6; --neutral-soft-text:#475569;
  --ring:color-mix(in srgb, var(--primary) 28%, transparent);
  --shadow:0 1px 2px rgba(15,23,42,.06),0 1px 3px rgba(15,23,42,.08);
  --shadow-lg:0 18px 50px rgba(15,23,42,.18);
}
[data-theme="dark"]{
  --bg:#020617; --bg-base:#0b1220; --bg-muted:#1e293b; --bg-el:#0f172a;
  --border:#1e293b; --border-strong:#334155;
  --text:#f1f5f9; --text-muted:#94a3b8; --text-dimmed:#64748b;
  --primary:#22c55e; --primary-hover:#16a34a; --primary-fg:#052e16;
  --primary-soft-bg:#14331f; --primary-soft-text:#4ade80;
  --success:#22c55e; --warning:#f59e0b; --warning-soft-bg:#3a2a08; --warning-soft-text:#fbbf24;
  --error:#ef4444; --info:#3b82f6; --info-soft-bg:#13243f; --info-soft-text:#60a5fa;
  --neutral-soft-bg:#1e293b; --neutral-soft-text:#cbd5e1;
  --shadow:0 1px 2px rgba(0,0,0,.4); --shadow-lg:0 18px 50px rgba(0,0,0,.6);
}
</style>
</helmet>

<div ref="{{ rootRef }}" data-theme="{{ theme }}" style="font-family:Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased;color:var(--text);">
  <div style="display:flex;height:100vh;overflow:hidden;background:var(--bg);">

    <!-- SIDEBAR -->
    <aside style="width:{{ sidebarW }};flex:none;display:flex;flex-direction:column;background:var(--bg-base);border-right:1px solid var(--border);transition:width .2s ease;overflow:hidden;">
      <div style="display:flex;align-items:center;gap:11px;height:61px;padding:0 18px;border-bottom:1px solid var(--border);flex:none;">
        <div style="width:34px;height:34px;border-radius:9px;background:var(--primary);display:flex;align-items:center;justify-content:center;color:var(--primary-fg);flex:none;"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8V6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v2"/><path d="M3 8h18v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 13h6"/></svg></div>
        <sc-if value="{{ expanded }}" hint-placeholder-val="{{ true }}"><span style="font:700 18px Inter;letter-spacing:-.01em;white-space:nowrap;">Inventra</span></sc-if>
      </div>
      <nav style="flex:1;overflow-y:auto;overflow-x:hidden;padding:12px;">
        <sc-for list="{{ nav }}" as="g" hint-placeholder-count="2">
          <sc-if value="{{ expanded }}" hint-placeholder-val="{{ true }}"><div style="padding:14px 12px 6px;font:600 10px 'JetBrains Mono',monospace;letter-spacing:.14em;text-transform:uppercase;color:var(--text-dimmed);white-space:nowrap;">{{ g.label }}</div></sc-if>
          <sc-if value="{{ collapsed }}" hint-placeholder-val="{{ false }}"><div style="height:1px;background:var(--border);margin:10px 8px;"></div></sc-if>
          <sc-for list="{{ g.items }}" as="it" hint-placeholder-count="4">
            <button title="{{ it.label }}" style="position:relative;display:flex;align-items:center;justify-content:{{ navJustify }};gap:11px;width:100%;padding:9px 12px;margin-bottom:2px;font-family:Inter;font-size:14px;font-weight:{{ it.weight }};color:{{ it.fg }};background:{{ it.bg }};border:none;border-radius:9px;cursor:pointer;text-align:left;box-shadow:inset 3px 0 0 {{ it.accent }};white-space:nowrap;" style-hover="background:{{ it.hoverBg }};">
              {{ it.icon }}
              <sc-if value="{{ expanded }}" hint-placeholder-val="{{ true }}"><span style="flex:1;overflow:hidden;text-overflow:ellipsis;">{{ it.label }}</span></sc-if>
            </button>
          </sc-for>
        </sc-for>
      </nav>
    </aside>

    <!-- MAIN -->
    <div style="flex:1;display:flex;flex-direction:column;min-width:0;">
      <header style="display:flex;align-items:center;gap:14px;height:61px;flex:none;padding:0 20px;background:var(--bg-base);border-bottom:1px solid var(--border);">
        <button onClick="{{ toggleCollapse }}" title="Collapse" style="display:flex;align-items:center;justify-content:center;width:36px;height:36px;flex:none;color:var(--text-muted);background:transparent;border:1px solid var(--border);border-radius:9px;cursor:pointer;" style-hover="background:var(--bg-muted);color:var(--text);"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/></svg></button>
        <div style="display:flex;align-items:center;gap:6px;font:400 12px Inter;color:var(--text-muted);"><span>Inventra</span><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--text-dimmed)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg><span>{{ bcSetting }}</span><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--text-dimmed)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg><span style="color:var(--text);font-weight:500;">{{ pageTitle }}</span></div>
        <div style="flex:1;"></div>
        <div style="display:flex;align-items:center;gap:8px;flex:none;">
          <div style="display:flex;gap:2px;padding:3px;background:var(--bg-muted);border-radius:9px;">
            <button onClick="{{ setId }}" style="padding:5px 9px;font:600 12px Inter;color:{{ idFg }};background:{{ idBg }};border:none;border-radius:6px;cursor:pointer;">ID</button>
            <button onClick="{{ setEn }}" style="padding:5px 9px;font:600 12px Inter;color:{{ enFg }};background:{{ enBg }};border:none;border-radius:6px;cursor:pointer;">EN</button>
          </div>
          <button onClick="{{ toggleTheme }}" title="Tema" style="display:flex;align-items:center;justify-content:center;width:36px;height:36px;color:var(--text-muted);background:transparent;border:1px solid var(--border);border-radius:9px;cursor:pointer;" style-hover="background:var(--bg-muted);color:var(--text);">
            <sc-if value="{{ isDark }}" hint-placeholder-val="{{ false }}"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg></sc-if>
            <sc-if value="{{ isLight }}" hint-placeholder-val="{{ true }}"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg></sc-if>
          </button>
          <div style="display:flex;align-items:center;gap:8px;padding:4px 8px 4px 4px;background:transparent;border:1px solid var(--border);border-radius:999px;"><span style="width:30px;height:30px;border-radius:50%;background:var(--primary);color:var(--primary-fg);display:flex;align-items:center;justify-content:center;font:700 12px Inter;">SA</span><span style="display:flex;color:var(--text-dimmed);"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></span></div>
        </div>
      </header>

      <main style="flex:1;overflow-y:auto;padding:24px 28px 40px;">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:16px;">
          <div><h1 style="margin:0 0 5px;font:700 23px Inter;letter-spacing:-.02em;">{{ pageTitle }}</h1><p style="margin:0;max-width:620px;font:400 14px/1.55 Inter;color:var(--text-muted);">{{ pageSub }}</p></div>
          <div style="display:flex;align-items:center;gap:12px;">
            <sc-if value="{{ dirty }}" hint-placeholder-val="{{ false }}"><span style="display:inline-flex;align-items:center;gap:6px;font:500 12.5px Inter;color:var(--warning-soft-text);"><span style="width:7px;height:7px;border-radius:50%;background:var(--warning);"></span>{{ unsavedLbl }}</span></sc-if>
            <button onClick="{{ save }}" disabled="{{ saveDisabled }}" style="display:inline-flex;align-items:center;gap:7px;padding:9px 16px;font:600 13.5px Inter;color:var(--primary-fg);background:{{ saveBg }};border:1px solid {{ saveBg }};border-radius:9px;cursor:{{ saveCursor }};opacity:{{ saveOpacity }};" style-hover="background:var(--primary-hover);"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>{{ saveLbl }}</button>
          </div>
        </div>

        <!-- controls -->
        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px;">
          <div style="display:flex;align-items:center;gap:9px;"><span style="font:500 13px Inter;color:var(--text-muted);">{{ entityLbl }}</span><div style="position:relative;"><select value="{{ entity }}" onChange="{{ onEntity }}" style="appearance:none;padding:9px 34px 9px 13px;font:600 13.5px Inter;color:var(--text);background:var(--bg-base);border:1px solid var(--border-strong);border-radius:9px;outline:none;cursor:pointer;" style-focus="border-color:var(--primary);box-shadow:0 0 0 3px var(--ring);"><sc-for list="{{ entityOpts }}" as="o" hint-placeholder-count="4"><option value="{{ o.v }}">{{ o.label }}</option></sc-for></select><span style="position:absolute;right:11px;top:50%;transform:translateY(-50%);color:var(--text-dimmed);pointer-events:none;display:flex;"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></span></div></div>
          <div style="position:relative;flex:1;min-width:200px;max-width:320px;">
            <span style="position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text-dimmed);display:flex;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg></span>
            <input value="{{ q }}" onInput="{{ onSearch }}" placeholder="{{ searchPh }}" style="width:100%;padding:9px 12px 9px 35px;font:400 14px Inter;color:var(--text);background:var(--bg-base);border:1px solid var(--border-strong);border-radius:9px;outline:none;" style-focus="border-color:var(--primary);box-shadow:0 0 0 3px var(--ring);" />
          </div>
          <div style="display:flex;align-items:center;gap:14px;margin-left:auto;">
            <span style="display:inline-flex;align-items:center;gap:6px;font:500 12px Inter;color:var(--text-muted);"><span style="width:18px;height:18px;border-radius:5px;background:var(--info-soft-bg);color:var(--info-soft-text);display:flex;align-items:center;justify-content:center;"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg></span>{{ viewLbl }}</span>
            <span style="display:inline-flex;align-items:center;gap:6px;font:500 12px Inter;color:var(--text-muted);"><span style="width:18px;height:18px;border-radius:5px;background:var(--primary-soft-bg);color:var(--primary-soft-text);display:flex;align-items:center;justify-content:center;"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg></span>{{ editLbl }}</span>
          </div>
        </div>

        <!-- matrix -->
        <div style="background:var(--bg-base);border:1px solid var(--border);border-radius:13px;box-shadow:var(--shadow);overflow:hidden;">
          <div style="overflow-x:auto;border-radius:13px;">
            <table style="width:100%;border-collapse:collapse;white-space:nowrap;">
              <thead><tr style="background:var(--bg-muted);">
                <th style="text-align:left;padding:12px 16px;font:600 12px Inter;text-transform:uppercase;color:var(--text-muted);position:sticky;left:0;background:var(--bg-muted);z-index:2;min-width:230px;">{{ thField }}</th>
                <sc-for list="{{ roleCols }}" as="c" hint-placeholder-count="5"><th style="text-align:center;padding:12px 14px;font:600 11.5px Inter;text-transform:uppercase;color:var(--text-muted);border-left:1px solid var(--border);">{{ c }}</th></sc-for>
              </tr></thead>
              <tbody>
                <sc-for list="{{ rows }}" as="r" hint-placeholder-count="8">
                  <tr style="border-top:1px solid var(--border);" style-hover="background:var(--bg-muted);">
                    <td style="padding:11px 16px;position:sticky;left:0;background:var(--bg-base);z-index:1;">
                      <div style="display:flex;align-items:center;gap:9px;">
                        <div style="min-width:0;"><div style="font:600 12.5px 'JetBrains Mono',monospace;color:var(--text);">{{ r.code }}</div><div style="font:400 11.5px Inter;color:var(--text-dimmed);">{{ r.label }}</div></div>
                        <sc-if value="{{ r.isDefault }}" hint-placeholder-val="{{ true }}"><span title="Mengikuti default" style="padding:2px 8px;font:600 10px Inter;border-radius:999px;background:var(--neutral-soft-bg);color:var(--neutral-soft-text);">default</span></sc-if>
                        <sc-if value="{{ r.explicit }}" hint-placeholder-val="{{ false }}"><button onClick="{{ r.reset }}" title="Kembalikan ke default" style="display:flex;padding:4px;color:var(--text-dimmed);background:transparent;border:none;border-radius:6px;cursor:pointer;" style-hover="background:var(--bg-muted);color:var(--text);"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 1 3 6.7"/><path d="M3 21v-5h5"/></svg></button></sc-if>
                      </div>
                    </td>
                    <sc-for list="{{ r.cells }}" as="c" hint-placeholder-count="5">
                      <td style="padding:9px 12px;border-left:1px solid var(--border);text-align:center;">
                        <div style="display:inline-flex;gap:5px;opacity:{{ c.opacity }};">
                          <button onClick="{{ c.toggleV }}" title="Lihat" style="display:inline-flex;align-items:center;gap:4px;padding:4px 8px;border-radius:7px;background:{{ c.vBg }};border:{{ c.vBorder }};color:{{ c.vFg }};cursor:pointer;font:600 11px Inter;"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>L</button>
                          <button onClick="{{ c.toggleE }}" title="Edit" style="display:inline-flex;align-items:center;gap:4px;padding:4px 8px;border-radius:7px;background:{{ c.eBg }};border:{{ c.eBorder }};color:{{ c.eFg }};cursor:pointer;font:600 11px Inter;"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>E</button>
                        </div>
                      </td>
                    </sc-for>
                  </tr>
                </sc-for>
              </tbody>
            </table>
          </div>
          <sc-if value="{{ noRows }}" hint-placeholder-val="{{ false }}"><div style="padding:44px;text-align:center;font:400 13.5px Inter;color:var(--text-dimmed);">{{ noFieldMsg }}</div></sc-if>
        </div>
        <div style="margin-top:14px;display:flex;align-items:flex-start;gap:8px;font:400 12.5px/1.5 Inter;color:var(--text-dimmed);max-width:780px;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex:none;margin-top:2px;"><circle cx="12" cy="12" r="9"/><path d="M12 11v5M12 8h.01"/></svg><span>{{ footNote }}</span></div>
      </main>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;theme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;light&quot;,&quot;dark&quot;],&quot;default&quot;:&quot;light&quot;,&quot;tsType&quot;:&quot;'light' | 'dark'&quot;},&quot;lang&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;id&quot;,&quot;en&quot;],&quot;default&quot;:&quot;id&quot;,&quot;tsType&quot;:&quot;'id' | 'en'&quot;},&quot;entity&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;aset&quot;,&quot;pegawai&quot;,&quot;user&quot;,&quot;pengajuan&quot;],&quot;default&quot;:&quot;aset&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;collapsed&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;primaryColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#16a34a&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
const ICONS={
  dashboard:[['rect',{x:3,y:3,width:7,height:9,rx:1}],['rect',{x:14,y:3,width:7,height:5,rx:1}],['rect',{x:14,y:12,width:7,height:9,rx:1}],['rect',{x:3,y:16,width:7,height:5,rx:1}]],
  box:[['path',{d:'M21 8V6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v2'}],['path',{d:'M3 8h18v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z'}],['path',{d:'M9 13h6'}]],
  clipboard:[['rect',{x:5,y:4,width:14,height:17,rx:2}],['path',{d:'M9 4V3h6v1'}],['path',{d:'M9 13l2 2 4-4'}]],
  wrench:[['path',{d:'M14.7 6.3a4 4 0 0 0-5.4 5.4L3 18v3h3l6.3-6.3a4 4 0 0 0 5.4-5.4l-2.7 2.7-2-2z'}]],
  approval:[['path',{d:'M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11'}],['path',{d:'M9 11l3 3 8-8'}]],
  chart:[['path',{d:'M3 3v18h18'}],['path',{d:'M7 16v-5M12 16V8M17 16v-3'}]],
  database:[['path',{d:'M12 3c4.4 0 8 1.3 8 3s-3.6 3-8 3-8-1.3-8-3 3.6-3 8-3z'}],['path',{d:'M4 6v6c0 1.7 3.6 3 8 3s8-1.3 8-3V6'}],['path',{d:'M4 12v6c0 1.7 3.6 3 8 3s8-1.3 8-3v-6'}]],
  settings:[['circle',{cx:12,cy:12,r:3}],['path',{d:'M19.4 15a1.6 1.6 0 0 0 .3 1.8 2 2 0 1 1-2.8 2.8 1.6 1.6 0 0 0-2.7 1.1V21a2 2 0 0 1-4 0 1.6 1.6 0 0 0-2.7-1.1 2 2 0 1 1-2.8-2.8A1.6 1.6 0 0 0 3 13.6a2 2 0 0 1 0-3.2A1.6 1.6 0 0 0 4.6 7a2 2 0 1 1 2.8-2.8A1.6 1.6 0 0 0 10 4.6V3a2 2 0 0 1 4 0 1.6 1.6 0 0 0 2.7 1.1A2 2 0 1 1 19.5 7a1.6 1.6 0 0 0-1 2.4 2 2 0 0 1 0 3.2z'}]],
};
function mk(key,size){const d=ICONS[key]||ICONS.box;return React.createElement('svg',{width:size||16,height:size||16,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:1.9,strokeLinecap:'round',strokeLinejoin:'round',style:{flex:'none'}},d.map((x,i)=>React.createElement(x[0],{...x[1],key:i})));}
const L=(id,en)=>({id,en});
const NAV=[
  { label:L('Operasional','Operational'), items:[
    { label:L('Dashboard','Dashboard'), icon:'dashboard' },{ label:L('Aset','Assets'), icon:'box' },{ label:L('Penugasan','Assignments'), icon:'clipboard' },
    { label:L('Maintenance','Maintenance'), icon:'wrench' },{ label:L('Pengajuan','Requests'), icon:'approval' },{ label:L('Laporan','Reports'), icon:'chart' },
  ]},
  { label:L('Administrasi','Administration'), items:[{ label:L('Master Data','Master Data'), icon:'database' },{ label:L('Pengaturan','Settings'), icon:'settings', active:true }]},
];
const ROLE_KEYS=['super','kakanwil','kaunit','manager','staf'];
const ROLE_LBL={super:L('Superadmin','Superadmin'),kakanwil:L('Ka. Kanwil','Reg. Head'),kaunit:L('Ka. Unit','Unit Head'),manager:L('Manager','Manager'),staf:L('Staf','Staff')};
// field: [code, idLabel, enLabel]
const ENTITIES=[
  { key:'aset', label:L('Aset','Assets'), fields:[
    ['nama',L('Nama aset','Asset name')],['kategori',L('Kategori','Category')],['brand_model',L('Brand / Model','Brand / Model')],['kantor',L('Kantor','Office')],['lokasi',L('Lokasi','Location')],['vendor',L('Vendor','Vendor')],['tanggal_beli',L('Tanggal beli','Buy date')],['harga_beli',L('Harga beli','Buy price')],['nilai_buku',L('Nilai buku','Book value')],['metode_depresiasi',L('Metode depresiasi','Depreciation method')],['kondisi',L('Kondisi','Condition')] ],
    rules:{ harga_beli:{super:{view:true,edit:true},kakanwil:{view:false,edit:false},kaunit:{view:false,edit:false},manager:{view:true,edit:false},staf:{view:false,edit:false}},
      nilai_buku:{super:{view:true,edit:true},kakanwil:{view:false,edit:false},kaunit:{view:false,edit:false},manager:{view:false,edit:false},staf:{view:false,edit:false}} } },
  { key:'pegawai', label:L('Pegawai','Employee'), fields:[
    ['nip',L('NIP','NIP')],['nama',L('Nama','Name')],['departemen',L('Departemen','Department')],['jabatan',L('Jabatan','Title')],['kantor',L('Kantor','Office')],['email',L('Email','Email')],['telepon',L('Telepon','Phone')],['gaji_pokok',L('Gaji pokok','Base salary')] ],
    rules:{ gaji_pokok:{super:{view:true,edit:true},kakanwil:{view:false,edit:false},kaunit:{view:false,edit:false},manager:{view:false,edit:false},staf:{view:false,edit:false}} } },
  { key:'user', label:L('User','User'), fields:[
    ['nama',L('Nama','Name')],['email',L('Email','Email')],['peran',L('Peran','Role')],['kantor',L('Kantor penempatan','Assigned office')],['pegawai_tertaut',L('Pegawai tertaut','Linked employee')],['status',L('Status','Status')],['metode_login',L('Metode login','Login method')] ],
    rules:{} },
  { key:'pengajuan', label:L('Pengajuan','Request'), fields:[
    ['tipe',L('Tipe','Type')],['pengaju',L('Pengaju','Requester')],['kantor',L('Kantor','Office')],['nilai_sebelum',L('Nilai sebelum','Value before')],['nilai_sesudah',L('Nilai sesudah','Value after')],['alasan',L('Alasan','Reason')],['lampiran',L('Lampiran','Attachment')],['status',L('Status','Status')] ],
    rules:{ nilai_sebelum:{super:{view:true,edit:true},kakanwil:{view:true,edit:false},kaunit:{view:true,edit:false},manager:{view:false,edit:false},staf:{view:false,edit:false}},
      nilai_sesudah:{super:{view:true,edit:true},kakanwil:{view:true,edit:false},kaunit:{view:true,edit:false},manager:{view:false,edit:false},staf:{view:false,edit:false}} } },
];
const CH={
  id:{ bcSetting:'Pengaturan', pageTitle:'Field-Permission', pageSub:'Tetapkan field mana yang boleh dilihat dan diedit tiap peran, per entitas. Field tanpa aturan eksplisit mengikuti default sistem.',
    unsavedLbl:'Perubahan belum disimpan', saveLbl:'Simpan', entityLbl:'Entitas', searchPh:'Cari field…', viewLbl:'Lihat (L)', editLbl:'Edit (E)', thField:'Field',
    noFieldMsg:'Tidak ada field yang cocok.', footNote:'Contoh pada entitas Aset: harga_beli hanya dapat dilihat oleh Superadmin & Manager (diedit Superadmin), sedangkan nilai_buku hanya untuk Superadmin. Klik ikon putar untuk mengembalikan field ke default.' },
  en:{ bcSetting:'Settings', pageTitle:'Field Permission', pageSub:'Set which fields each role may view and edit, per entity. Fields without explicit rules follow the system default.',
    unsavedLbl:'Unsaved changes', saveLbl:'Save', entityLbl:'Entity', searchPh:'Search field…', viewLbl:'View (L)', editLbl:'Edit (E)', thField:'Field',
    noFieldMsg:'No matching field.', footNote:'Example on the Asset entity: harga_beli is viewable only by Superadmin & Manager (edited by Superadmin), while nilai_buku is Superadmin-only. Click the reset icon to revert a field to default.' },
};

class Component extends DCLogic {
  constructor(props){
    super(props);
    this.rootRef=React.createRef();
    const data={}; ENTITIES.forEach(e=>{ data[e.key]={}; Object.keys(e.rules).forEach(fc=>{ data[e.key][fc]={...e.rules[fc]}; }); });
    this.state={
      theme:(props.theme==='dark'?'dark':'light'), lang:(props.lang==='en'?'en':'id'), collapsed:!!props.collapsed,
      entity:(props.entity&&ENTITIES.find(e=>e.key===props.entity)?props.entity:'aset'),
      data, q:'', dirty:false,
    };
    this._tt=false;this._tl=false;this._tc=false;
  }
  componentDidMount(){ this.applyPrimary(); }
  componentDidUpdate(){ this.applyPrimary(); }
  applyPrimary(){ const c=this.props.primaryColor,el=this.rootRef.current; if(el&&c) el.style.setProperty('--primary',c); }
  effTheme(){ return this._tt?this.state.theme:(this.props.theme||'light'); }
  effLang(){ return this._tl?this.state.lang:(this.props.lang||'id'); }
  effCollapsed(){ return this._tc?this.state.collapsed:!!this.props.collapsed; }
  ensure(ent,fc){ const e=this.state.data[ent]; if(e[fc]) return; const m={}; ROLE_KEYS.forEach(r=>m[r]={view:true,edit:true}); this.state.data[ent][fc]=m; }
  toggleCell(fc,role,kind){
    const ent=this.state.entity;
    this.setState(s=>{ const ed={...(s.data[ent]||{})}; let rule=ed[fc]; if(!rule){ rule={}; ROLE_KEYS.forEach(r=>rule[r]={view:true,edit:true}); } else { rule={...rule}; }
      const cur={...(rule[role]||{view:false,edit:false})};
      if(kind==='view'){ cur.view=!cur.view; if(!cur.view) cur.edit=false; }
      else { cur.edit=!cur.edit; if(cur.edit) cur.view=true; }
      rule[role]=cur; ed[fc]=rule;
      return { data:{...s.data,[ent]:ed}, dirty:true };
    });
  }
  resetField(fc){ const ent=this.state.entity; this.setState(s=>{ const ed={...(s.data[ent]||{})}; delete ed[fc]; return {data:{...s.data,[ent]:ed},dirty:true}; }); }
  renderVals(){
    const s=this.state; const theme=this.effTheme(),lang=this.effLang(),collapsed=this.effCollapsed();
    const isDark=theme==='dark'; const ch=CH[lang];
    const nav=NAV.map(g=>({label:g.label[lang],items:g.items.map(it=>({
      label:it.label[lang],icon:mk(it.icon),
      bg:it.active?'var(--primary-soft-bg)':'transparent',fg:it.active?'var(--primary-soft-text)':'var(--text-muted)',
      weight:it.active?'600':'500',accent:it.active?'var(--primary)':'transparent',hoverBg:it.active?'var(--primary-soft-bg)':'var(--bg-muted)',
    }))}));
    const ent=ENTITIES.find(e=>e.key===s.entity);
    const ed=s.data[s.entity]||{};
    const q=s.q.trim().toLowerCase();
    const fields=ent.fields.filter(f=>!q||f[0].toLowerCase().includes(q)||f[1][lang].toLowerCase().includes(q));

    const vStyle=(on)=> on?{bg:'var(--info-soft-bg)',fg:'var(--info-soft-text)',border:'1px solid transparent'}:{bg:'transparent',fg:'var(--text-dimmed)',border:'1px solid var(--border-strong)'};
    const eStyle=(on)=> on?{bg:'var(--primary-soft-bg)',fg:'var(--primary-soft-text)',border:'1px solid transparent'}:{bg:'transparent',fg:'var(--text-dimmed)',border:'1px solid var(--border-strong)'};

    const rows=fields.map(f=>{
      const fc=f[0]; const rule=ed[fc]; const explicit=!!rule;
      const cells=ROLE_KEYS.map(rk=>{ const cv= explicit? (rule[rk]||{view:false,edit:false}) : {view:true,edit:true};
        const vs=vStyle(cv.view), es=eStyle(cv.edit);
        return { opacity: explicit?'1':'.5',
          vBg:vs.bg, vFg:vs.fg, vBorder:vs.border, eBg:es.bg, eFg:es.fg, eBorder:es.border,
          toggleV:()=>this.toggleCell(fc,rk,'view'), toggleE:()=>this.toggleCell(fc,rk,'edit') };
      });
      return { code:fc, label:f[1][lang], isDefault:!explicit, explicit, reset:()=>this.resetField(fc), cells };
    });

    return {
      rootRef:this.rootRef, theme, isDark, isLight:!isDark,
      sidebarW:collapsed?'76px':'264px', expanded:!collapsed, collapsed, navJustify:collapsed?'center':'flex-start',
      toggleCollapse:()=>{this._tc=true;this.setState(x=>({collapsed:!this.effCollapsed()}));},
      toggleTheme:()=>{this._tt=true;const cur=this.effTheme();this.setState({theme:cur==='light'?'dark':'light'});},
      setId:()=>{this._tl=true;this.setState({lang:'id'});}, setEn:()=>{this._tl=true;this.setState({lang:'en'});},
      idBg:lang==='id'?'var(--bg-base)':'transparent', idFg:lang==='id'?'var(--text)':'var(--text-muted)',
      enBg:lang==='en'?'var(--bg-base)':'transparent', enFg:lang==='en'?'var(--text)':'var(--text-muted)',
      nav, bcSetting:ch.bcSetting, pageTitle:ch.pageTitle, pageSub:ch.pageSub,
      dirty:s.dirty, unsavedLbl:ch.unsavedLbl, saveLbl:ch.saveLbl, save:()=>{ if(s.dirty) this.setState({dirty:false}); },
      saveDisabled:!s.dirty, saveBg:s.dirty?'var(--primary)':'var(--text-dimmed)', saveCursor:s.dirty?'pointer':'not-allowed', saveOpacity:s.dirty?'1':'.55',
      entityLbl:ch.entityLbl, entity:s.entity, entityOpts:ENTITIES.map(e=>({v:e.key,label:e.label[lang]})), onEntity:(e)=>this.setState({entity:e.target.value,q:''}),
      q:s.q, onSearch:(e)=>this.setState({q:e.target.value}), searchPh:ch.searchPh, viewLbl:ch.viewLbl, editLbl:ch.editLbl,
      thField:ch.thField, roleCols:ROLE_KEYS.map(r=>ROLE_LBL[r][lang]),
      rows, noRows:rows.length===0, noFieldMsg:ch.noFieldMsg, footNote:ch.footNote,
    };
  }
}
</script>
</body>
</html>
