<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;}
body{margin:0;}
input::placeholder,textarea::placeholder{color:var(--text-dimmed);}
::-webkit-scrollbar{width:9px;height:9px;}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:9px;border:2px solid transparent;background-clip:padding-box;}
:root{
  --bg:#f8fafc; --bg-base:#ffffff; --bg-muted:#f1f5f9; --bg-el:#ffffff;
  --border:#e2e8f0; --border-strong:#cbd5e1;
  --text:#0f172a; --text-muted:#64748b; --text-dimmed:#94a3b8;
  --primary:#16a34a; --primary-hover:#15803d; --primary-fg:#ffffff;
  --primary-soft-bg:#dcfce7; --primary-soft-text:#15803d;
  --success:#16a34a; --warning:#d97706; --warning-soft-bg:#fef3c7; --warning-soft-text:#b45309;
  --error:#dc2626; --error-soft-bg:#fee2e2; --error-soft-text:#b91c1c;
  --info:#2563eb; --info-soft-bg:#dbeafe; --info-soft-text:#1d4ed8;
  --neutral-soft-bg:#eef2f6; --neutral-soft-text:#475569;
  --ring:color-mix(in srgb, var(--primary) 28%, transparent);
  --shadow:0 1px 2px rgba(15,23,42,.06),0 1px 3px rgba(15,23,42,.08);
  --shadow-lg:0 18px 50px rgba(15,23,42,.18);
}
[data-theme="dark"]{
  --bg:#020617; --bg-base:#0b1220; --bg-muted:#1e293b; --bg-el:#0f172a;
  --border:#1e293b; --border-strong:#334155;
  --text:#f1f5f9; --text-muted:#94a3b8; --text-dimmed:#64748b;
  --primary:#22c55e; --primary-hover:#16a34a; --primary-fg:#052e16;
  --primary-soft-bg:#14331f; --primary-soft-text:#4ade80;
  --success:#22c55e; --warning:#f59e0b; --warning-soft-bg:#3a2a08; --warning-soft-text:#fbbf24;
  --error:#ef4444; --error-soft-bg:#3a1414; --error-soft-text:#f87171;
  --info:#3b82f6; --info-soft-bg:#13243f; --info-soft-text:#60a5fa;
  --neutral-soft-bg:#1e293b; --neutral-soft-text:#cbd5e1;
  --shadow:0 1px 2px rgba(0,0,0,.4); --shadow-lg:0 18px 50px rgba(0,0,0,.6);
}
</style>
</helmet>

<div ref="{{ rootRef }}" data-theme="{{ theme }}" style="font-family:Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased;color:var(--text);">
  <div style="display:flex;height:100vh;overflow:hidden;background:var(--bg);">

    <!-- SIDEBAR -->
    <aside style="width:{{ sidebarW }};flex:none;display:flex;flex-direction:column;background:var(--bg-base);border-right:1px solid var(--border);transition:width .2s ease;overflow:hidden;">
      <div style="display:flex;align-items:center;gap:11px;height:61px;padding:0 18px;border-bottom:1px solid var(--border);flex:none;">
        <div style="width:34px;height:34px;border-radius:9px;background:var(--primary);display:flex;align-items:center;justify-content:center;color:var(--primary-fg);flex:none;"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8V6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v2"/><path d="M3 8h18v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 13h6"/></svg></div>
        <sc-if value="{{ expanded }}" hint-placeholder-val="{{ true }}"><span style="font:700 18px Inter;letter-spacing:-.01em;white-space:nowrap;">Inventra</span></sc-if>
      </div>
      <nav style="flex:1;overflow-y:auto;overflow-x:hidden;padding:12px;">
        <sc-for list="{{ nav }}" as="g" hint-placeholder-count="2">
          <sc-if value="{{ expanded }}" hint-placeholder-val="{{ true }}"><div style="padding:14px 12px 6px;font:600 10px 'JetBrains Mono',monospace;letter-spacing:.14em;text-transform:uppercase;color:var(--text-dimmed);white-space:nowrap;">{{ g.label }}</div></sc-if>
          <sc-if value="{{ collapsed }}" hint-placeholder-val="{{ false }}"><div style="height:1px;background:var(--border);margin:10px 8px;"></div></sc-if>
          <sc-for list="{{ g.items }}" as="it" hint-placeholder-count="4">
            <button title="{{ it.label }}" style="position:relative;display:flex;align-items:center;justify-content:{{ navJustify }};gap:11px;width:100%;padding:9px 12px;margin-bottom:2px;font-family:Inter;font-size:14px;font-weight:{{ it.weight }};color:{{ it.fg }};background:{{ it.bg }};border:none;border-radius:9px;cursor:pointer;text-align:left;box-shadow:inset 3px 0 0 {{ it.accent }};white-space:nowrap;" style-hover="background:{{ it.hoverBg }};">
              {{ it.icon }}
              <sc-if value="{{ expanded }}" hint-placeholder-val="{{ true }}"><span style="flex:1;overflow:hidden;text-overflow:ellipsis;">{{ it.label }}</span></sc-if>
            </button>
          </sc-for>
        </sc-for>
      </nav>
    </aside>

    <!-- MAIN -->
    <div style="flex:1;display:flex;flex-direction:column;min-width:0;">
      <header style="display:flex;align-items:center;gap:14px;height:61px;flex:none;padding:0 20px;background:var(--bg-base);border-bottom:1px solid var(--border);">
        <button onClick="{{ toggleCollapse }}" title="Collapse" style="display:flex;align-items:center;justify-content:center;width:36px;height:36px;flex:none;color:var(--text-muted);background:transparent;border:1px solid var(--border);border-radius:9px;cursor:pointer;" style-hover="background:var(--bg-muted);color:var(--text);"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/></svg></button>
        <div style="display:flex;align-items:center;gap:6px;font:400 12px Inter;color:var(--text-muted);"><span>Inventra</span><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--text-dimmed)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg><span>{{ bcSetting }}</span><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--text-dimmed)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg><span style="color:var(--text);font-weight:500;">{{ pageTitle }}</span></div>
        <div style="flex:1;"></div>
        <div style="display:flex;align-items:center;gap:8px;flex:none;">
          <div style="display:flex;gap:2px;padding:3px;background:var(--bg-muted);border-radius:9px;">
            <button onClick="{{ setId }}" style="padding:5px 9px;font:600 12px Inter;color:{{ idFg }};background:{{ idBg }};border:none;border-radius:6px;cursor:pointer;">ID</button>
            <button onClick="{{ setEn }}" style="padding:5px 9px;font:600 12px Inter;color:{{ enFg }};background:{{ enBg }};border:none;border-radius:6px;cursor:pointer;">EN</button>
          </div>
          <button onClick="{{ toggleTheme }}" title="Tema" style="display:flex;align-items:center;justify-content:center;width:36px;height:36px;color:var(--text-muted);background:transparent;border:1px solid var(--border);border-radius:9px;cursor:pointer;" style-hover="background:var(--bg-muted);color:var(--text);">
            <sc-if value="{{ isDark }}" hint-placeholder-val="{{ false }}"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg></sc-if>
            <sc-if value="{{ isLight }}" hint-placeholder-val="{{ true }}"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg></sc-if>
          </button>
          <div style="display:flex;align-items:center;gap:8px;padding:4px 8px 4px 4px;background:transparent;border:1px solid var(--border);border-radius:999px;"><span style="width:30px;height:30px;border-radius:50%;background:var(--primary);color:var(--primary-fg);display:flex;align-items:center;justify-content:center;font:700 12px Inter;">SA</span><span style="display:flex;color:var(--text-dimmed);"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></span></div>
        </div>
      </header>

      <div style="flex:1;display:flex;min-width:0;overflow:hidden;">

        <!-- LEFT: ROLES -->
        <div style="width:280px;flex:none;border-right:1px solid var(--border);background:var(--bg-base);display:flex;flex-direction:column;overflow:hidden;">
          <div style="flex:none;padding:16px 16px 12px;"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;"><div style="font:700 15px Inter;">{{ rolesTitle }}</div></div><div style="font:400 12px Inter;color:var(--text-muted);">{{ rolesSub }}</div></div>
          <div style="flex:1;overflow-y:auto;padding:0 10px;">
            <sc-for list="{{ roleRows }}" as="r" hint-placeholder-count="5">
              <button onClick="{{ r.on }}" style="display:flex;align-items:center;gap:10px;width:100%;padding:10px 11px;margin-bottom:3px;border-radius:9px;border:1px solid {{ r.bd }};background:{{ r.bg }};cursor:pointer;text-align:left;" style-hover="border-color:var(--primary);">
                <span style="width:32px;height:32px;border-radius:8px;background:{{ r.iconBg }};color:{{ r.iconFg }};display:flex;align-items:center;justify-content:center;flex:none;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l8 3v6c0 5-3.5 8-8 9-4.5-1-8-4-8-9V6z"/></svg></span>
                <div style="flex:1;min-width:0;"><div style="font:600 13.5px Inter;color:{{ r.fg }};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ r.nama }}</div><div style="font:400 11.5px Inter;color:var(--text-dimmed);">{{ r.permCount }}</div></div>
                <sc-if value="{{ r.system }}" hint-placeholder-val="{{ false }}"><span title="Peran sistem" style="display:flex;color:var(--text-dimmed);flex:none;"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span></sc-if>
              </button>
            </sc-for>
            <button onClick="{{ openAdd }}" style="display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:10px;margin:6px 0 14px;border-radius:9px;border:1.5px dashed var(--border-strong);background:transparent;color:var(--text-muted);font:600 13px Inter;cursor:pointer;" style-hover="border-color:var(--primary);color:var(--primary);"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>{{ addRoleLbl }}</button>
          </div>
        </div>

        <!-- RIGHT: MATRIX -->
        <div style="flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg);">
          <div style="flex:none;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;padding:18px 28px;border-bottom:1px solid var(--border);background:var(--bg-base);">
            <div style="min-width:0;">
              <div style="display:flex;align-items:center;gap:9px;flex-wrap:wrap;"><h1 style="margin:0;font:700 19px Inter;letter-spacing:-.01em;">{{ selNama }}</h1><sc-if value="{{ selSystem }}" hint-placeholder-val="{{ false }}"><span style="display:inline-flex;align-items:center;gap:5px;padding:3px 10px;font:600 11.5px Inter;border-radius:999px;background:var(--neutral-soft-bg);color:var(--neutral-soft-text);"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>{{ systemBadge }}</span></sc-if><sc-if value="{{ selCustom }}" hint-placeholder-val="{{ true }}"><span style="padding:3px 10px;font:600 11.5px Inter;border-radius:999px;background:var(--primary-soft-bg);color:var(--primary-soft-text);">{{ customBadge }}</span></sc-if></div>
              <div style="font:400 13px Inter;color:var(--text-muted);margin-top:3px;">{{ selDesc }}</div>
            </div>
            <div style="display:flex;align-items:center;gap:12px;">
              <sc-if value="{{ dirty }}" hint-placeholder-val="{{ false }}"><span style="display:inline-flex;align-items:center;gap:6px;font:500 12.5px Inter;color:var(--warning-soft-text);"><span style="width:7px;height:7px;border-radius:50%;background:var(--warning);"></span>{{ unsavedLbl }}</span></sc-if>
              <button onClick="{{ saveChanges }}" disabled="{{ saveDisabled }}" style="display:inline-flex;align-items:center;gap:7px;padding:9px 16px;font:600 13.5px Inter;color:var(--primary-fg);background:{{ saveBg }};border:1px solid {{ saveBg }};border-radius:9px;cursor:{{ saveCursor }};opacity:{{ saveOpacity }};" style-hover="background:var(--primary-hover);"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>{{ saveLbl }}</button>
            </div>
          </div>

          <div style="flex:1;overflow-y:auto;padding:22px 28px;">
            <sc-if value="{{ selSystem }}" hint-placeholder-val="{{ false }}">
              <div style="display:flex;gap:11px;align-items:center;padding:12px 14px;margin-bottom:18px;border-radius:11px;background:var(--neutral-soft-bg);border:1px solid var(--border);"><span style="color:var(--text-muted);flex:none;display:flex;"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span><span style="font:500 13px/1.45 Inter;color:var(--text-muted);">{{ lockNote }}</span></div>
            </sc-if>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
              <sc-for list="{{ modules }}" as="m" hint-placeholder-count="6">
                <div style="background:var(--bg-base);border:1px solid var(--border);border-radius:13px;box-shadow:var(--shadow);overflow:hidden;">
                  <div style="display:flex;align-items:center;gap:10px;padding:13px 15px;border-bottom:1px solid var(--border);">
                    <span style="width:30px;height:30px;border-radius:8px;background:var(--primary-soft-bg);color:var(--primary-soft-text);display:flex;align-items:center;justify-content:center;flex:none;">{{ m.icon }}</span>
                    <div style="flex:1;min-width:0;"><div style="font:600 14px Inter;">{{ m.label }}</div><div style="font:400 11.5px Inter;color:var(--text-dimmed);">{{ m.countLabel }}</div></div>
                    <sc-if value="{{ m.showAll }}" hint-placeholder-val="{{ true }}"><button onClick="{{ m.toggleAll }}" style="font:600 11.5px Inter;color:var(--primary);background:transparent;border:none;cursor:pointer;padding:4px 6px;border-radius:6px;" style-hover="background:var(--primary-soft-bg);">{{ m.allLabel }}</button></sc-if>
                  </div>
                  <div style="padding:6px 8px;">
                    <sc-for list="{{ m.perms }}" as="p" hint-placeholder-count="4">
                      <button onClick="{{ p.toggle }}" style="display:flex;align-items:center;gap:11px;width:100%;padding:9px 8px;border-radius:8px;background:transparent;border:none;cursor:{{ p.cursor }};text-align:left;" style-hover="background:var(--bg-muted);">
                        <span style="width:36px;height:20px;border-radius:99px;background:{{ p.track }};position:relative;flex:none;transition:background .15s;opacity:{{ p.opacity }};"><span style="position:absolute;top:2px;left:{{ p.knob }};width:16px;height:16px;border-radius:50%;background:#fff;transition:left .15s;box-shadow:0 1px 2px rgba(0,0,0,.3);"></span></span>
                        <span style="flex:1;min-width:0;"><span style="display:block;font:500 13px Inter;color:{{ p.labelColor }};">{{ p.label }}</span><span style="display:block;font:400 11px 'JetBrains Mono',monospace;color:var(--text-dimmed);">{{ p.code }}</span></span>
                      </button>
                    </sc-for>
                  </div>
                </div>
              </sc-for>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- ADD ROLE MODAL -->
  <sc-if value="{{ addOpen }}" hint-placeholder-val="{{ false }}">
    <div onClick="{{ closeAdd }}" style="position:fixed;inset:0;z-index:60;background:rgba(2,6,23,.5);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;padding:24px;">
      <div onClick="{{ stop }}" style="width:100%;max-width:440px;background:var(--bg-el);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow-lg);overflow:hidden;">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--border);"><div><div style="font:600 16px Inter;">{{ addTitle }}</div><div style="font:400 12.5px Inter;color:var(--text-muted);margin-top:2px;">{{ addSub }}</div></div><button onClick="{{ closeAdd }}" style="display:flex;padding:5px;color:var(--text-muted);background:transparent;border:none;border-radius:7px;cursor:pointer;" style-hover="background:var(--bg-muted);color:var(--text);"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div>
        <div style="padding:20px;display:flex;flex-direction:column;gap:15px;">
          <div><label style="display:block;font:500 13px Inter;margin-bottom:6px;">{{ lRoleName }} <span style="color:var(--error);">*</span></label><input value="{{ arNama }}" onInput="{{ onArNama }}" placeholder="{{ phRole }}" style="width:100%;padding:10px 12px;font:400 14px Inter;color:var(--text);background:var(--bg-base);border:1px solid {{ arNamaBorder }};border-radius:10px;outline:none;" style-focus="border-color:var(--primary);box-shadow:0 0 0 3px var(--ring);" /><sc-if value="{{ arNamaErr }}" hint-placeholder-val="{{ false }}"><div style="margin-top:5px;font:400 12px Inter;color:var(--error);">{{ reqMsg }}</div></sc-if></div>
          <div><label style="display:block;font:500 13px Inter;margin-bottom:6px;">{{ lCopy }}</label><div style="position:relative;"><select value="{{ arCopy }}" onChange="{{ onArCopy }}" style="width:100%;appearance:none;padding:10px 32px 10px 12px;font:400 14px Inter;color:var(--text);background:var(--bg-base);border:1px solid var(--border-strong);border-radius:10px;outline:none;cursor:pointer;" style-focus="border-color:var(--primary);box-shadow:0 0 0 3px var(--ring);"><option value="">{{ copyNone }}</option><sc-for list="{{ copyOpts }}" as="o" hint-placeholder-count="4"><option value="{{ o.key }}">{{ o.label }}</option></sc-for></select><span style="position:absolute;right:11px;top:50%;transform:translateY(-50%);color:var(--text-dimmed);pointer-events:none;display:flex;"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></span></div><div style="margin-top:5px;font:400 11.5px Inter;color:var(--text-dimmed);">{{ copyNote }}</div></div>
          <div><label style="display:block;font:500 13px Inter;margin-bottom:6px;">{{ lDesc }}</label><input value="{{ arDesc }}" onInput="{{ onArDesc }}" placeholder="{{ phDesc }}" style="width:100%;padding:10px 12px;font:400 14px Inter;color:var(--text);background:var(--bg-base);border:1px solid var(--border-strong);border-radius:10px;outline:none;" style-focus="border-color:var(--primary);box-shadow:0 0 0 3px var(--ring);" /></div>
        </div>
        <div style="display:flex;justify-content:flex-end;gap:10px;padding:14px 20px;border-top:1px solid var(--border);"><button onClick="{{ closeAdd }}" style="padding:9px 15px;font:500 14px Inter;color:var(--text);background:var(--bg-base);border:1px solid var(--border-strong);border-radius:9px;cursor:pointer;" style-hover="background:var(--bg-muted);">{{ cancelLbl }}</button><button onClick="{{ createRole }}" style="padding:9px 18px;font:600 14px Inter;color:var(--primary-fg);background:var(--primary);border:1px solid var(--primary);border-radius:9px;cursor:pointer;" style-hover="background:var(--primary-hover);">{{ createLbl }}</button></div>
      </div>
    </div>
  </sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;theme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;light&quot;,&quot;dark&quot;],&quot;default&quot;:&quot;light&quot;,&quot;tsType&quot;:&quot;'light' | 'dark'&quot;},&quot;lang&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;id&quot;,&quot;en&quot;],&quot;default&quot;:&quot;id&quot;,&quot;tsType&quot;:&quot;'id' | 'en'&quot;},&quot;collapsed&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;primaryColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#16a34a&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
const ICONS={
  dashboard:[['rect',{x:3,y:3,width:7,height:9,rx:1}],['rect',{x:14,y:3,width:7,height:5,rx:1}],['rect',{x:14,y:12,width:7,height:9,rx:1}],['rect',{x:3,y:16,width:7,height:5,rx:1}]],
  box:[['path',{d:'M21 8V6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v2'}],['path',{d:'M3 8h18v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z'}],['path',{d:'M9 13h6'}]],

  wrench:[['path',{d:'M14.7 6.3a4 4 0 0 0-5.4 5.4L3 18v3h3l6.3-6.3a4 4 0 0 0 5.4-5.4l-2.7 2.7-2-2z'}]],
