---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install base packages
  ansible.builtin.apt:
    name:
      - ufw
      - unattended-upgrades
      - ca-certificates
      - curl
      - gnupg
      - git
    state: present

- name: Create swapfile (idempotent via creates)
  ansible.builtin.command:
    cmd: "fallocate -l {{ swap_size_mb }}M /swapfile"
    creates: /swapfile
  register: swap_created

- name: Secure swapfile perms
  ansible.builtin.file:
    path: /swapfile
    owner: root
    group: root
    mode: "0600"

- name: Make swap
  ansible.builtin.command: mkswap /swapfile  # noqa: no-handler
  when: swap_created is changed
  changed_when: true

- name: Enable swap in fstab
  ansible.posix.mount:
    path: none
    src: /swapfile
    fstype: swap
    opts: sw
    state: present

- name: Activate swap now
  ansible.builtin.command: swapon /swapfile  # noqa: no-handler
  when: swap_created is changed
  changed_when: true

- name: Enable unattended-upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
    owner: root
    group: root
    mode: "0644"

- name: Create deploy user
  ansible.builtin.user:
    name: "{{ deploy_user }}"
    groups: sudo
    append: true
    shell: /bin/bash
    create_home: true

- name: Install deploy authorized key
  ansible.posix.authorized_key:
    user: "{{ deploy_user }}"
    key: "{{ deploy_pubkey }}"
    state: present

- name: Allow OpenSSH through ufw
  community.general.ufw:
    rule: allow
    name: OpenSSH

- name: Allow HTTP/HTTPS through ufw
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: ["80", "443"]

- name: Enable ufw with default deny incoming
  community.general.ufw:
    state: enabled
    policy: deny
    direction: incoming

- name: Harden SSH (key-only, no root)
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/10-hardening.conf
    content: |
      PasswordAuthentication no
      PermitRootLogin no
    owner: root
    group: root
    mode: "0644"
  notify: Restart ssh
